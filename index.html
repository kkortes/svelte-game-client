<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Brawlers</title>
  <link rel="icon" href="/static/favicon.png" />
  <link rel="stylesheet" href="/css/index.css" />

  <script type="module">
    import vibe from '/nodemodules/@ape-egg/vibe/index.js';
    import appState from '/js/app.js';
    import config from '/js/config.js';
    import { getCookie } from '/js/helpers.js';
    import { init as initRouter, navigate, retryNavigation } from '/js/router.js';
    import { init as initKeystrokes } from '/js/keystrokes.js';
    import { init as initCombatLoop } from '/js/combat-loop.js';
    import { init as initSocket } from '/js/connectSocket.js';
    import { init as initAmbient } from '/js/ambient.js';
    import CHARACTERS from '/js/constants/CHARACTERS.js';
    import ABILITIES from '/js/constants/ABILITIES.js';
    import EQUIPMENT from '/js/constants/EQUIPMENT.js';
    import { calculateCombatStatsByCharacter } from '/js/utils.js';
    import { getLevelByExperience, getCurrentExperienceAtLevel, getExperienceForNextLevel, getExperienceReward } from '/js/level.js';
    import { ALL_FIGHTS } from '/js/constants/FIGHTS.js';
    import { INITIAL_COMBAT } from '/js/app.js';
    import { Howl } from '/js/lib/howler.js';
    import AUDIO from '/js/audio.js';
    import { equip, unequip, dismantle, correctHealth } from '/js/equipment.js';

    // Make navigate, audio, and game functions available globally
    window.navigate = navigate;
    window.Howl = Howl;
    window.AUDIO = AUDIO;
    window.CHARACTERS = CHARACTERS;
    window.ABILITIES_FN = ABILITIES;
    window.EQUIPMENT_FN = EQUIPMENT;
    window.calculateCombatStatsByCharacter = calculateCombatStatsByCharacter;
    window.equipItem = equip;
    window.unequipItem = unequip;
    window.dismantleItem = dismantle;

    window.claimCombatReward = () => {
      const combat = $.combat;
      if (!combat?.duration || combat._rewarded) return;

      const fight = ALL_FIGHTS.find(f => f.id === combat.fightId);
      if (fight) {
        const xp = getExperienceReward(fight.characters.length, fight.minLevel, fight.maxLevel, fight.boss);
        $.experience += xp;

        if (fight.boss && combat.winningTeam?.index === 0) {
          if (fight.minLevel > $.bossHighscore) $.bossHighscore = fight.minLevel;
        }
      }

      try {
        new Howl({ src: [AUDIO['Victory Stinger 1']], volume: $.settings.volume.sfx * $.settings.volume.master }).play();
      } catch { }

      combat._rewarded = true;
      $.overlay = '';
      $.combat = JSON.parse(JSON.stringify(INITIAL_COMBAT));
      $.liveTeams = [];
      $.elapsedMilliseconds = 0;
      $.combatRewardXp = 0;
      $.combatRewardBoss = false;
    };

    window.closeCombatOverlay = () => {
      try {
        new Howl({ src: [AUDIO['Stinger - Ominous Timpani']], volume: $.settings.volume.sfx * $.settings.volume.master }).play();
      } catch { }
      $.overlay = '';
      $.combat = JSON.parse(JSON.stringify(INITIAL_COMBAT));
      $.liveTeams = [];
      $.elapsedMilliseconds = 0;
      $.combatRewardXp = 0;
      $.combatRewardBoss = false;
    };

    window.selectBrawler = (e, uuid, index) => {
      if ($.maxBrawlers) {
        e.preventDefault();
        e.stopPropagation();
        if ($.selectedBrawlers.includes(uuid)) {
          $.selectedBrawlers = $.selectedBrawlers.filter(id => id !== uuid);
        } else if ($.selectedBrawlers.length < $.maxBrawlers) {
          $.selectedBrawlers.push(uuid);
        }
        if (window.updateFightSlots) updateFightSlots();
      }
    };

    window.$ = vibe({
      ...appState,
      showSequence: false,
      authMode: 'login',
      authEmail: config.IS_DEV ? config.AUTO_EMAIL : '',
      authPassword: config.IS_DEV ? config.AUTO_PASSWORD : '',
      authRememberMe: config.IS_DEV,
      authCodeOfConduct: config.IS_DEV,
      authError: '',
      sidebarLevel: 1,
      sidebarXpCurrent: 0,
      sidebarXpNeeded: 100,
      sidebarXpPct: 0,
      sidebarChars: [],
      sidebarMaxChars: 1,
      healTimer: 120,
      healTimerPct: 0,
      isDev: config.IS_DEV,
      audio: AUDIO
    }, { debug: true });

    // Media queries
    const queries = {
      desktop: '(min-width: 1200px)',
      tablet: '(min-width: 768px) and (max-width: 1199px)',
      smartphone: '(max-width: 767px)',
      landscape: '(orientation: landscape)',
      portrait: '(orientation: portrait)',
      hoverable: '(hover: hover)'
    };

    const mqls = {};
    const updateMedia = () => {
      const media = {};
      Object.keys(mqls).forEach(key => { media[key] = mqls[key].matches; });
      try { $.mqs = media; } catch { }
    };
    Object.keys(queries).forEach(key => {
      mqls[key] = window.matchMedia(queries[key]);
      mqls[key].addEventListener('change', updateMedia);
    });

    // Clear selection on route change — handled in router instead of afterUpdate

    // Initialize services
    initKeystrokes();
    initCombatLoop();
    initSocket();
    initAmbient();

    // Restore token from cookie after boot, load game state once socket connects
    const cookie = getCookie();
    $.on('ready', () => {
      updateMedia();
      if (cookie?.token) $.token = cookie.token;

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !$.gameKeyboardDisabled) {
          if ($.dialog) { $.dialog = undefined; return; }
          if ($.showAccountProgression) { $.showAccountProgression = false; return; }
          // Toggle GameMenu — close if open, open if closed (matching original)
          $.overlay = $.overlay ? '' : 'GameMenu';
        }
      });

      // Client clock — sync server time from snapshot + performance delta
      setInterval(() => {
        if ($.serverTimestampSnapshot) {
          $.serverTimestamp = $.serverTimestampSnapshot + (performance.now() - $.syncPerformanceNow);
        }
      }, 250);

      // Heal timer — syncs to server clock even-minute boundaries (matching original RefillHealthTimer)
      const MINUTES_TO_REFILL = 2;
      const FULL_TIME = MINUTES_TO_REFILL * 60 * 1000;

      setInterval(() => {
        if (!$.serverTimestamp || !$.token || $.characters.length === 0) return;

        const now = new Date($.serverTimestampSnapshot);
        const minutes = now.getMinutes();
        const nextMarkMinute = minutes + (MINUTES_TO_REFILL - (minutes % MINUTES_TO_REFILL));
        const nextMark = new Date(now);
        nextMark.setMinutes(nextMarkMinute, 0, 0);

        const timeToRefill = nextMark.getTime() - $.serverTimestamp;
        $.healTimer = Math.max(0, Math.ceil(timeToRefill / 1000));
        $.healTimerPct = Math.round(((FULL_TIME - timeToRefill) / FULL_TIME) * 100);

        if (timeToRefill < 0) {
          $.characters.forEach(ref => {
            try {
              const char = CHARACTERS(ref, true);
              const stats = calculateCombatStatsByCharacter(char);
              const heal = Math.ceil(stats.maxHealth * 0.33);
              ref.overrides.combatStats.currentHealth = Math.min(char.combatStats.currentHealth + heal, stats.maxHealth);
            } catch { }
          });
          $.serverTimestampSnapshot = $.serverTimestamp;
          $.syncPerformanceNow = performance.now();
        }
      }, 1000);
    });
    $.on('afterUpdate', (current, prev) => {
      // Load game state when socket first connects
      if (current.socket && !prev.socket && current.token) {
        loadGameState(current.token);
      }

      // When token changes (login), retry router navigation
      // (page-content is inside <!-- if token --> and may not have existed earlier)
      if (current.token && !prev.token) {
        retryNavigation();
      }

      // Hydrate sidebar derived values
      try {
        const level = getLevelByExperience(current.experience || 0);
        if (level !== current.sidebarLevel) $.sidebarLevel = level;

        const xpCur = getCurrentExperienceAtLevel(current.experience || 0);
        const xpNeeded = getExperienceForNextLevel(level);
        if (xpCur !== current.sidebarXpCurrent) $.sidebarXpCurrent = xpCur;
        if (xpNeeded !== current.sidebarXpNeeded) $.sidebarXpNeeded = xpNeeded;

        const xpPct = level >= 25 ? 100 : Math.round((xpCur / Math.max(1, xpNeeded)) * 100);
        if (xpPct !== current.sidebarXpPct) $.sidebarXpPct = xpPct;

        const maxChars = Math.floor((current.accountRewards || 1) / 5) + 1;
        if (maxChars !== current.sidebarMaxChars) $.sidebarMaxChars = maxChars;

        const chars = (current.characters || []).map(ref => {
          try {
            const char = CHARACTERS(ref, true);
            const stats = calculateCombatStatsByCharacter(char);
            const ABILITIES = window.ABILITIES_FN;
            const abilities = ABILITIES ? char.abilities.map(a => {
              try { const h = ABILITIES(a, true); return { icon: h.icon, ticks: h.ticks }; }
              catch { return null; }
            }).filter(Boolean) : [];
            return {
              name: char.name, image: char.image,
              currentHealth: char.combatStats.currentHealth,
              maxHealth: stats.maxHealth,
              healthPct: Math.max(0, Math.round((char.combatStats.currentHealth / stats.maxHealth) * 100)),
              abilities
            };
          } catch { return null; }
        }).filter(Boolean);

        if (JSON.stringify(chars) !== JSON.stringify(current.sidebarChars)) {
          $.sidebarChars = chars;
        }
        // Compute combat reward preview when combat ends (for victory screen)
        if (current.elapsedMilliseconds >= current.combat?.duration && current.combat?.duration > 0 && !current.combatRewardXp) {
          const fight = ALL_FIGHTS.find(f => f.id === current.combat.fightId);
          if (fight && current.combat.winningTeam?.index === 0) {
            $.combatRewardXp = getExperienceReward(fight.characters.length, fight.minLevel, fight.maxLevel, fight.boss);
            $.combatRewardBoss = fight.boss && fight.minLevel > current.bossHighscore;
          }
        }

        // Level-up detection — auto-show account progression
        const prevLevel = getLevelByExperience(prev.experience || 0);
        if (level > prevLevel && prev.experience > 0) {
          $.showAccountProgression = true;
          // Recalculate health on level-up (matching original AccountProgression)
          $.characters.forEach(c => { try { correctHealth(c); } catch { } });
          // Play level-up sound
          try {
            new Howl({ src: [AUDIO['Fire & Shimmer']], volume: ($.settings?.volume?.sfx || 0.5) * ($.settings?.volume?.master || 0.5) }).play();
          } catch { }
        }
      } catch { }

      // Sync data-src → src on images (avoids 404 from Vibe's pre-hydration literal @[...] in src)
      document.querySelectorAll('img[data-src]').forEach(img => {
        const ds = img.dataset.src;
        if (ds && !ds.includes('@[') && img.src !== ds && !img.src.endsWith(ds)) img.src = ds;
      });
    });

    window.claimAccountReward = (lvl) => {
      if (lvl > $.accountRewards && lvl <= $.sidebarLevel) {
        $.coins += 100;
        $.accountRewards = lvl;
      }
    };

    // Auth handlers
    window.loadGameState = async (token) => {
      try {
        const { gameState, serverTimestampSnapshot } = await $.socket.sendAsync('user/authenticate', {
          token, clientVersion: '0.1.0', isDev: config.IS_DEV
        });
        if (gameState) {
          if (gameState.characters) $.characters = gameState.characters;
          if (gameState.inventory) $.inventory = gameState.inventory;
          if (gameState.experience) $.experience = gameState.experience;
          if (gameState.coins !== undefined) $.coins = gameState.coins;
          if (gameState.accountRewards) $.accountRewards = gameState.accountRewards;
        }
        if (serverTimestampSnapshot) {
          $.serverTimestampSnapshot = serverTimestampSnapshot;
          $.syncPerformanceNow = performance.now();
        }
      } catch (e) {
        console.info('Failed to load game state:', e?.message || e);
      }
    };

    window.authLogin = async () => {
      $.authError = '';
      if (!$.authCodeOfConduct) {
        $.authError = 'You must agree to the Code of Conduct in order to play';
        return;
      }
      try {
        const t = await $.socket.sendAsync('user/login', { email: $.authEmail, password: $.authPassword });
        if ($.authRememberMe) {
          const future = new Date();
          future.setDate(future.getDate() + 30);
          document.cookie = `token=${t}; Expires=${future};`;
        } else {
          document.cookie = `token=${t};`;
        }
        $.token = t;
        await loadGameState(t);
      } catch (e) {
        $.authError = e?.message || e?.error || 'Login failed';
      }
    };

    window.authRegister = async () => {
      $.authError = '';
      try {
        await $.socket.sendAsync('user/register', { email: $.authEmail, password: $.authPassword });
        $.authMode = 'login';
        $.authError = '';
      } catch (e) {
        $.authError = e?.message || e?.error || 'Registration failed';
      }
    };

    $.on('ready', () => {
      initRouter();

      // Armory equipment tooltips via event delegation
      document.addEventListener('mouseenter', (e) => {
        if (!e.target?.closest) return;
        const row = e.target.closest('[armory-row]');
        if (!row) return;
        const eqLink = row.querySelector('eq-link');
        if (!eqLink) return;

        const rows = [...row.parentElement.querySelectorAll('[armory-row]')];
        const idx = rows.indexOf(row);
        const itemRef = $.inventory[idx];
        if (!itemRef) return;

        try {
          const item = EQUIPMENT(itemRef, true);
          const rect = eqLink.getBoundingClientRect();
          $.tooltip = {
            x: rect.left + rect.width / 2, y: rect.top, visible: true,
            props: {
              name: item.name, level: item.level,
              combatStats: item.combatStats, slotsIn: item.slotsIn,
              description: item.description
            }
          };
        } catch { }
      }, true);

      document.addEventListener('mouseleave', (e) => {
        if (e.target?.closest?.('[armory-row]') && $.tooltip) $.tooltip.visible = false;
      }, true);
    });
  </script>
</head>

<body battle-brawlers vibe vibe-fouc stylecheat>
  <!-- if isDev -->
  <crow up devbar glass>
    <crow vertical left g-1 p-2>
      <button devbar-btn onclick="document.dispatchEvent(new CustomEvent('pauseCombat'))">Pause
        combat</button>
      <button devbar-btn onclick="document.dispatchEvent(new CustomEvent('resumeCombat'))">Resume
        combat</button>
      <span text-xs>Elapsed ms: @[elapsedMilliseconds.toFixed(0)]</span>
      <span text-xs>Duration: @[combat.duration]</span>
    </crow>
    <crow vertical left p-2>
      <span text-xs>Server: @[new Date(serverTimestampSnapshot).toLocaleString()]</span>
      <crow vertical up left mt-2>
        <a href="/debug" devbar-link>Debug</a>
        <a href="/ability-scaling" devbar-link>Ability Scaling</a>
        <a href="/equipment-scaling" devbar-link>Equipment Scaling</a>
        <a href="/character-scaling" devbar-link>Character Scaling</a>
      </crow>
    </crow>
    <crow vertical left g-1 p-2>
      <crow g-1>
        <button devbar-btn
          onclick="$.characters.forEach(c => { try { const ch = CHARACTERS(c, true); const s = calculateCombatStatsByCharacter(ch); c.overrides.combatStats.currentHealth = s.maxHealth; } catch {} }); $.characters = [...$.characters]">Heal
          party</button>
        <button devbar-btn
          onclick="$.characters.forEach(c => { try { const ch = CHARACTERS(c, true); c.overrides.combatStats.currentHealth = ch.combatStats.currentHealth - 5; } catch {} }); $.characters = [...$.characters]">Damage
          party</button>
      </crow>
      <crow g-1>
        <button devbar-btn onclick="$.experience += 40">Gain exp</button>
        <button devbar-btn onclick="$.experience = 0">Reset exp</button>
      </crow>
      <crow g-1>
        <button devbar-btn onclick="$.coins += 100">Gain coins</button>
        <button devbar-btn onclick="$.coins = 0">Reset coins</button>
      </crow>
      <crow g-1>
        <button devbar-btn onclick="$.bossHighscore += 1">Increase boss</button>
        <button devbar-btn onclick="$.bossHighscore = 0">Reset boss</button>
      </crow>
      <button devbar-btn onclick="$.characters = []">Reset characters</button>
      <button devbar-btn onclick="$.accountRewards = 1">Reset rewards</button>
    </crow>
  </crow>
  <!-- /if -->

  <component src="/components/Layout.html"></component>

  <!-- OVERLAY LAYER -->
  <component src="/components/Combat.html"></component>

  <!-- if overlay === 'GameMenu' -->
  <overlay-backdrop onclick="$.overlay = ''">
    <spacer></spacer>
    <overlay-panel overlay-sm onclick="event.stopPropagation()">
      <component src="/components/GameMenu.html"></component>
    </overlay-panel>
    <spacer></spacer>
  </overlay-backdrop>
  <!-- /if -->

  <component src="/components/CodeOfConduct.html"></component>

  <component src="/components/ReleaseNotes.html"></component>

  <component src="/components/Dialog.html"></component>

  <component src="/components/AccountProgression.html"></component>

  <!-- TOOLTIP LAYER -->
  <component src="/components/Tooltip.html"></component>

  <!-- NOTIFICATIONS -->
  <component src="/components/Notifications.html"></component>

  <!-- TOPBAR -->
  <component src="/components/Topbar.html"></component>

  <style>
    [battle-brawlers] overlay-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      grid-template-rows: calc(var(--unit) * 20) 1fr calc(var(--unit) * 20);
      place-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
      box-shadow: inset 0 0 10vw rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(1px);
      animation: overlayIn 200ms ease-out 75ms both;
    }

    [battle-brawlers] dialog-backdrop {
      animation: overlayIn 150ms ease-out both;
    }

    @keyframes overlayIn {
      from { opacity: 0; transform: scale(0.95); }
    }

    /* Custom element display modes */
    combat-panel,
    combat-arena,
    combatant-slot,
    combatant-card,
    combatant-sprite,
    combatant-statuses,
    combat-result,
    combat-rewards,
    combat-floater,
    hp-track,
    hp-fill,
    armor-track,
    armor-fill,
    progress-track,
    progress-fill,
    game-frame,
    menu-label,
    dialog-backdrop,
    progression-panel,
    progression-scroll,
    progression-rewards,
    tooltip-layer,
    tooltip-stats,
    spacer {
      display: block;
    }

    [battle-brawlers] overlay-panel {
      display: block;
      position: relative;
      max-width: calc(var(--unit) * 175);
      min-width: calc(var(--unit) * 80);
      width: calc(100% - var(--unit) * 24);
      max-height: 90vh;
      overflow-y: auto;
      text-align: left;
    }

    [battle-brawlers] overlay-panel[overlay-sm] {
      max-width: calc(var(--unit) * 80);
    }

    [battle-brawlers] game-frame {
      border: calc(var(--unit) * 0.75) solid;
      border-image-source: url('/static/images/ui/frame.png');
      border-image-slice: 3;
      border-image-repeat: repeat;
      background: rgba(0, 0, 0, 0.75);
      box-shadow: inset 0 0 100px rgb(0 0 0 / 80%);
      color: rgb(156, 163, 175);
    }

    [battle-brawlers] [close-btn] {
      all: unset;
      position: absolute;
      top: calc(var(--unit) * -3);
      right: calc(var(--unit) * -3);
      width: calc(var(--unit) * 6);
      height: calc(var(--unit) * 6);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: rgb(220, 38, 38);
      font-size: 0.75rem;
    }

    [battle-brawlers] menu-label {
      width: calc(var(--unit) * 40);
      flex: none;
    }

    [battle-brawlers] [menu-divider] {
      border: 0;
      height: calc(var(--unit) * 0.25);
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2), transparent);
      margin: var(--unit) 0;
      width: 100%;
    }

    [battle-brawlers] [game-frame-title] {
      position: relative;
      margin: calc(var(--unit) * -0.75) 0 0 0;
      padding: 0 calc(var(--unit) * 2);
      height: calc(var(--unit) * 8.25);
      background-image: url('/static/images/ui/frame-header.jpg');
      background-position: left calc(var(--unit) * 0.5);
      background-repeat: repeat-x;
      font-family: var(--font-heading);
      color: rgb(156, 163, 175);
    }

    [battle-brawlers] [stretch] {
      align-items: stretch;
    }

    [battle-brawlers] [range-input] {
      width: 60%;
    }

    [battle-brawlers] [devbar] {
      position: sticky;
      top: 0;
      z-index: 50;
      font-size: 0.75rem;
      width: 100%;
    }

    [battle-brawlers] [devbar-btn] {
      all: unset;
      cursor: pointer;
      font-size: 0.7rem;
      padding: calc(var(--unit) * 0.5) calc(var(--unit) * 2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
    }

    [battle-brawlers] [devbar-btn]:hover {
      background: var(--background);
    }

    [battle-brawlers] [devbar-link] {
      padding: calc(var(--unit) * 0.5) calc(var(--unit) * 2);
      font-size: 0.75rem;
      color: var(--muted-foreground);
      text-decoration: none;
      border: 1px solid transparent;
      border-bottom: none;
    }

    [battle-brawlers] [devbar-link]:hover {
      color: var(--foreground);
    }
  </style>
</body>

</html>
