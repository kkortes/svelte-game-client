<armory-panel>
  <h5 cinzel m-0>ARMORY</h5>

  <crow vertical up left mt-2>
    <!-- each inventory as item, idx -->
    <crow justify-between w-full g-2 armory-row>
      <eq-link data-tier="@[item.overrides?.level >= 25 ? 'red' : item.overrides?.level >= 20 ? 'orange' : item.overrides?.level >= 15 ? 'purple' : item.overrides?.level >= 10 ? 'blue' : item.overrides?.level >= 5 ? 'green' : 'gray']">
        <eq-bg-center></eq-bg-center>
        <eq-bg-left></eq-bg-left>
        <eq-bg-right></eq-bg-right>
        <crow eq-name left>@[item.overrides?.name || item.id]</crow>
      </eq-link>
      <!-- if routeParams.characterIndex !== undefined -->
      <button tertiary text-xs onclick="import('/js/equipment.js').then(m => m.equip($.inventory[@[idx]]))">Equip</button>
      <!-- /if -->
      <!-- if route === '/vendor' -->
      <!-- if item.overrides?.cost > 0 -->
      <button tertiary text-xs armory-refund onclick="
        $.dialog = { dialogId: 'confirm', props: { text: 'Refund this item?', confirm: () => { $.coins += $.inventory[@[idx]].overrides?.cost || 0; $.inventory.splice(@[idx], 1); $.inventory = [...$.inventory]; } } }
      ">Refund</button>
      <!-- /if -->
      <!-- if !item.overrides?.cost -->
      <button tertiary text-xs armory-refund onclick="
        $.dialog = { dialogId: 'confirm', props: { text: 'Dismantle this item?', confirm: () => { $.inventory.splice(@[idx], 1); $.inventory = [...$.inventory]; } } }
      ">Dismantle</button>
      <!-- /if -->
      <!-- /if -->
    </crow>
    <!-- /each -->
  </crow>

  <!-- if inventory.length === 0 -->
  <p text-sm text-muted mt-2>No items</p>
  <!-- /if -->

  <style>
    armory-panel [armory-row] {
      padding: 4px 0;
    }

    armory-panel [armory-refund] {
      color: var(--destructive);
    }
  </style>
</armory-panel>
