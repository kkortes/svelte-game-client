<script type="module">
  if ($.vibeStateInspector === undefined) $.vibeStateInspector = false;
  if ($.vibeStateInspectorEverOpened === undefined) $.vibeStateInspectorEverOpened = false;

  // Latch: once the inspector has been opened, keep the DataInspector
  // mounted forever so the close animation runs (the conditional that
  // gates mounting can't unmount mid-CSS-transition). First open pays the
  // mount cost; subsequent toggles are pure CSS transform on <state-inspector>.
  const unsub = $.on('afterUpdate', () => {
    if ($.vibeStateInspector && !$.vibeStateInspectorEverOpened) {
      $.vibeStateInspectorEverOpened = true;
    }
  });
</script>

<state-inspector open="@[vibeStateInspector]">
  <state-inspector-panel>
    <!-- if vibeStateInspectorEverOpened -->
    <component src="/components/remote/DataInspector.html" data="@[$]"></component>
    <!-- /if -->
  </state-inspector-panel>
</state-inspector>

<style>
  state-inspector {
    position: fixed;
    top: calc(calc(var(--unit) * 8.5));
    right: 0;
    bottom: 0;
    width: calc(calc(var(--unit) * 100));
    max-width: 90vw;
    z-index: 50;
    pointer-events: none;
    transform: translateX(100%);
    transition: transform 200ms ease-out;
  }

  state-inspector[open] {
    transform: translateX(0);
    pointer-events: auto;
  }

  state-inspector-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }
</style>
