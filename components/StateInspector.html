<script type="module">
  if ($.inspectorData === undefined) $.inspectorData = '';
  if ($.vibeStateInspector === undefined) $.vibeStateInspector = false;

  let lastJson = '';
  const refresh = () => {
    if (!$.vibeStateInspector) return;
    const { inspectorData, vibeStateInspector, dataInspectorSections, dataInspectorJson, dataInspectorCount, ...rest } = $;
    const json = JSON.stringify(rest);
    if (json === lastJson) return;
    lastJson = json;
    $.inspectorData = JSON.parse(json);
  };
  $.on('afterUpdate', refresh);
</script>

<state-inspector open="@[vibeStateInspector]">
  <state-inspector-panel>
    <component src="/components/DataInspector.html" data="@[inspectorData]"></component>
  </state-inspector-panel>
</state-inspector>

<style>
  state-inspector {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: calc(var(--unit) * 100);
    max-width: 90vw;
    z-index: 50;
    pointer-events: none;
    transform: translateX(100%);
    transition: transform 200ms ease-out;
  }

  state-inspector[open] {
    transform: translateX(0);
    pointer-events: auto;
  }

  state-inspector-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }
</style>
