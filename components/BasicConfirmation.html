<card dialog-card p-6 sm:p="2" relative>
  <button tertiary absolute t="1" r="1" dialog-close onclick="dismissOverlay()">
    <icon cross></icon>
  </button>

  <typography>
    <p>@[dialogProps?.text || 'Are you sure?']</p>
  </typography>
  <crow g-2 right mt-4>
    <button tertiary onclick="dismissOverlay()">Cancel</button>
    <button primary
      onclick="if($.dialogProps?.confirm) $.dialogProps.confirm(); dismissOverlay();">Confirm</button>
  </crow>
</card>
