<script type="module">
  import CHARACTERS, { ALL_CHARACTERS } from '/js/constants/CHARACTERS.js';
  import EQUIPMENT from '/js/constants/EQUIPMENT.js';
  import { calculateCombatStatsByCharacter } from '/js/utils.js';
  import { slotsInPrettyName } from '/js/equipment.js';

  const state = {
    charChoices: Object.keys(ALL_CHARACTERS),
    chosenChar: 'elfMale',
    charScaling: true,
    equipScaling: true,
    charPool: [],
    charEquipmentSlots: [],
  };

  const computePool = (chosenChar, charScaling, equipScaling) =>
    Array.from({ length: 25 }, (_, i) => {
      const level = i + 1;
      const ref = CHARACTERS(chosenChar, false, {
        overrides: {
          level: charScaling ? level : 1,
          equipment: {
            mainHand: { overrides: { level: equipScaling ? level : 0 } },
            offHand: { overrides: { level: equipScaling ? level : 0 } },
            armor: { overrides: { level: equipScaling ? level : 0 } },
          },
        },
      });
      const hydrated = CHARACTERS(ref, true);
      const stats = calculateCombatStatsByCharacter(hydrated);
      return {
        level,
        name: hydrated.name,
        charLevel: hydrated.level || 0,
        maxHealth: stats.maxHealth || 0,
        maxArmor: stats.maxArmor || 0,
        damage: stats.damage || 0,
      };
    });

  const computeSlots = (chosenChar, charScaling, equipScaling) => {
    const topRef = CHARACTERS(chosenChar, false, {
      overrides: {
        level: charScaling ? 25 : 1,
        equipment: {
          mainHand: { overrides: { level: equipScaling ? 25 : 0 } },
          offHand: { overrides: { level: equipScaling ? 25 : 0 } },
          armor: { overrides: { level: equipScaling ? 25 : 0 } },
        },
      },
    });
    const top = CHARACTERS(topRef, true);
    const mainHandHydrated = top.equipment.mainHand
      ? EQUIPMENT(top.equipment.mainHand, true)
      : null;

    return Object.entries(top.equipment).map(([slot, eq]) => {
      const h = eq ? EQUIPMENT(eq, true) : null;
      const real = !!h?.id;
      const isTwoHandOff = slot === 'offHand' && mainHandHydrated?.slotsIn === 'twoHand';
      return {
        slot,
        slotLabel: slotsInPrettyName(slot),
        emptyFist: (slot === 'mainHand' || slot === 'offHand') && !real && !isTwoHandOff,
        twoHandName: isTwoHandOff ? mainHandHydrated.name : '',
        hasEquipment: real && !isTwoHandOff,
        name: h?.name || '',
        level: h?.level || 0,
        empty: !real && !isTwoHandOff && slot !== 'mainHand' && slot !== 'offHand',
      };
    });
  };

  state.charPool = computePool(state.chosenChar, state.charScaling, state.equipScaling);
  state.charEquipmentSlots = computeSlots(state.chosenChar, state.charScaling, state.equipScaling);
  component(state);

  const id = Object.keys(window.__vibeComponents).find((k) => window.__vibeComponents[k] === state);
  const s = $[id];

  const recompute = () => {
    computePool(s.chosenChar, s.charScaling, s.equipScaling).forEach((c, i) =>
      Object.assign(s.charPool[i], c),
    );
    computeSlots(s.chosenChar, s.charScaling, s.equipScaling).forEach((slot, i) =>
      Object.assign(s.charEquipmentSlots[i], slot),
    );
  };

  window.changeChar = (value) => {
    s.chosenChar = value;
    recompute();
  };
  window.toggleCharScaling = (checked) => {
    s.charScaling = checked;
    recompute();
  };
  window.toggleEquipScaling = (checked) => {
    s.equipScaling = checked;
    recompute();
  };
</script>

<crow vertical g="4" left>
  <component src="/components/TitleBar.html" title="Character Scaling"></component>
  <hr />

  <crow left g="4">
    <label crow left g="2" for="charScaling" text-sm>
      <input type="checkbox" id="charScaling" checked onchange="toggleCharScaling(this.checked)" />
      Character scaling
    </label>
    <label crow left g="2" for="equipScaling" text-sm>
      <input
        type="checkbox"
        id="equipScaling"
        checked
        onchange="toggleEquipScaling(this.checked)"
      />
      Equipment scaling
    </label>
  </crow>

  <label>
    <select onchange="changeChar(this.value)">
      <!-- each this.charChoices as choice -->
      <option value="@[choice]">@[choice]</option>
      <!-- /each -->
    </select>
  </label>

  <crow vertical left g="2" w="full">
    <!-- each this.charPool as ch -->
    <crow left justify-between g="2" w="full">
      <crow left g="2">
        <span>level @[ch.level]</span>
        <component src="/components/EquipmentLink.html" level="@[ch.charLevel]" name="@[ch.name]">
        </component>
      </crow>
      <component
        src="/components/CoreStats.html"
        hp="@[ch.maxHealth]"
        armor="@[ch.maxArmor]"
        damage="@[ch.damage]"
      ></component>
    </crow>
    <!-- /each -->
  </crow>

  <crow vertical left g="2" w="full" p="4" char-equipment-block>
    <h5>Equipment</h5>
    <hr />
    <!-- each this.charEquipmentSlots as s -->
    <crow left justify-between g="2" w="full">
      <crow left g="2">
        <span f="none" slot-label w="20">@[s.slotLabel]</span>
        <!-- if s.hasEquipment -->
        <component src="/components/EquipmentLink.html" level="@[s.level]" name="@[s.name]">
        </component>
        <!-- /if -->
        <!-- if s.emptyFist -->
        <span text-muted>Fist</span>
        <!-- /if -->
        <!-- if s.twoHandName -->
        <span text-muted>@[s.twoHandName]</span>
        <!-- /if -->
        <!-- if s.empty -->
        <span text-muted>-</span>
        <!-- /if -->
      </crow>
    </crow>
    <!-- /each -->
  </crow>
</crow>
