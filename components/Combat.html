<script type="module">
  window.claimCombatReward = () => {
    const combat = $.combat;
    if (!combat?.duration || combat._rewarded) return;

    const fight = (window.ALL_FIGHTS || []).find(f => f.id === combat.fightId);
    if (fight) {
      const xp = window.getExperienceReward
        ? window.getExperienceReward(fight.characters.length, fight.minLevel, fight.maxLevel, fight.boss)
        : ($.combatRewardXp || 0);
      $.experience += xp;

      if (fight.boss && combat.winningTeam?.index === 0) {
        if (fight.minLevel > $.bossHighscore) $.bossHighscore = fight.minLevel;
      }
    }

    try {
      new window.Howl({
        src: [window.AUDIO['Victory Stinger 1']],
        volume: $.settings.volume.sfx * $.settings.volume.master
      }).play();
    } catch { }

    combat._rewarded = true;
    $.overlay = '';
    $.combat = JSON.parse(JSON.stringify(window.INITIAL_COMBAT || { teamsStartState: [], teamsEndState: [], events: [], duration: 0, winningTeam: undefined, fightId: undefined, audio: [] }));
    $.liveTeams = [];
    $.combatTeam0 = [];
    $.combatTeam1 = [];
    $.combatCards = [];
    $.elapsedMilliseconds = 0;
    $.combatRewardXp = 0;
    $.combatRewardBoss = false;
    $.combatEnded = false;
    $.combatOutcome = '';
  };

  window.closeCombatOverlay = () => {
    try {
      new window.Howl({
        src: [window.AUDIO['Stinger - Ominous Timpani']],
        volume: $.settings.volume.sfx * $.settings.volume.master
      }).play();
    } catch { }
    $.overlay = '';
    $.combat = JSON.parse(JSON.stringify(window.INITIAL_COMBAT || { teamsStartState: [], teamsEndState: [], events: [], duration: 0, winningTeam: undefined, fightId: undefined, audio: [] }));
    $.liveTeams = [];
    $.combatTeam0 = [];
    $.combatTeam1 = [];
    $.combatCards = [];
    $.elapsedMilliseconds = 0;
    $.combatRewardXp = 0;
    $.combatRewardBoss = false;
    $.combatEnded = false;
    $.combatOutcome = '';
  };

  // Compute end-of-combat derived values on each update tick.
  $.on('afterUpdate', (current, prev) => {
    const ended = current.elapsedMilliseconds >= current.combat?.duration && current.combat?.duration > 0;

    if (ended !== current.combatEnded) $.combatEnded = ended;

    if (ended) {
      const winIdx = current.combat.winningTeam?.index;
      const outcome = winIdx === 0 ? 'victory' : winIdx === undefined ? 'draw' : 'defeat';
      if (outcome !== current.combatOutcome) $.combatOutcome = outcome;

      if (!current.combatRewardXp && window.ALL_FIGHTS) {
        const fight = window.ALL_FIGHTS.find((f) => f.id === current.combat.fightId);
        if (fight && outcome === 'victory' && window.getExperienceReward) {
          $.combatRewardXp = window.getExperienceReward(fight.characters.length, fight.minLevel, fight.maxLevel, fight.boss);
          $.combatRewardBoss = fight.boss && fight.minLevel > current.bossHighscore;
        }
      }
    } else if (current.combatOutcome) {
      $.combatOutcome = '';
    }
  });
</script>
