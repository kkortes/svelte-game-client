<script type="module">
  const resetCombat = () => {
    $.overlay = {};
    $.combat = JSON.parse(JSON.stringify(window.INITIAL_COMBAT));
    $.liveTeams = [];
    $.combatCards = [];
    $.elapsedMilliseconds = 0;
  };

  window.combatEnded = (combat, elapsedMilliseconds) =>
    combat.duration > 0 && elapsedMilliseconds >= combat.duration;

  window.combatOutcome = (combat) => {
    const idx = combat.winningTeam?.index;
    return idx === 0 ? 'victory' : idx === undefined ? 'draw' : 'defeat';
  };

  window.combatRewardXp = (combat) => {
    const fight = (window.ALL_FIGHTS || []).find((f) => f.id === combat.fightId);
    if (!fight || combat.winningTeam?.index !== 0) return 0;
    return window.getExperienceReward(
      fight.characters.length,
      fight.minLevel,
      fight.maxLevel,
      fight.boss,
    );
  };

  window.combatRewardBoss = (combat, bossHighscore) => {
    const fight = (window.ALL_FIGHTS || []).find((f) => f.id === combat.fightId);
    return !!(
      fight &&
      fight.boss &&
      combat.winningTeam?.index === 0 &&
      fight.minLevel > bossHighscore
    );
  };

  window.claimCombatReward = () => {
    const combat = $.combat;
    if (!combat?.duration || combat._rewarded) return;

    const fight = (window.ALL_FIGHTS || []).find((f) => f.id === combat.fightId);
    if (fight) {
      $.experience += window.combatRewardXp(combat);
      if (fight.boss && combat.winningTeam?.index === 0 && fight.minLevel > $.bossHighscore) {
        $.bossHighscore = fight.minLevel;
      }
    }

    try {
      new window.Howl({
        src: [window.AUDIO['Victory Stinger 1']],
        volume: $.settings.volume.sfx * $.settings.volume.master,
      }).play();
    } catch {}

    combat._rewarded = true;
    resetCombat();
  };

  window.closeCombatOverlay = () => {
    try {
      new window.Howl({
        src: [window.AUDIO['Stinger - Ominous Timpani']],
        volume: $.settings.volume.sfx * $.settings.volume.master,
      }).play();
    } catch {}
    resetCombat();
  };
</script>

  <combat-stage>

      <!-- each combatCards as card -->
      <component src="/components/CombatantCard.html" card="@[card]"></component>
      <!-- /each -->
    </component>
    <component src="/components/ResultAnnouncement.html"></component>
  </combat-stage>
</combat-backdrop>
