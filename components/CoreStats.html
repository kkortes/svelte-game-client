<crow vertical="@[vertical]" left g-2>
  <crow vertical="@[vertical]" g-2>
    <icon maxHealth></icon>
    <span>@[hp]</span>
  </crow>
  <!-- if !vertical -->
  <span text-muted>/</span>
  <!-- /if -->
  <crow vertical="@[vertical]" g-2>
    <icon maxArmor></icon>
    <span>@[armor]</span>
  </crow>
  <!-- if !vertical -->
  <span text-muted>/</span>
  <!-- /if -->
  <crow vertical="@[vertical]" g-2>
    <icon damage></icon>
    <span>@[damage]</span>
  </crow>
</crow>
