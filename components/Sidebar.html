<script type="module">
  import CHARACTERS from '/js/constants/CHARACTERS.js';
  import { calculateCombatStatsByCharacter, calculateTickStart } from '/js/utils.js';

  const MINUTES_TO_REFILL = 2;
  const FULL_TIME = MINUTES_TO_REFILL * 60 * 1000;

  const localState = { healTimerElapsed: 0, healTimerTotal: FULL_TIME };
  component(localState);
  const componentId = Object.keys(window.__vibeComponents).find(k => window.__vibeComponents[k] === localState);
  const s = $[componentId];

  window.hydrateBrawler = (ref) => {
    try {
      const char = CHARACTERS(ref, true);
      const stats = calculateCombatStatsByCharacter(char);
      const AB = window.ABILITIES_FN;
      const hydrated = AB
        ? char.abilities.map((a) => { try { return AB(a, true); } catch { return null; } }).filter(Boolean)
        : [];
      const abilities = hydrated
        .filter((_, i) => calculateTickStart(hydrated, i) < char.maxTicks)
        .map((h) => ({ icon: h.icon, ticks: h.ticks }));
      return {
        uuid: ref.uuid,
        name: char.name,
        mugshot: char.image.replace('.png', '-mugshot.png'),
        currentHealth: char.combatStats?.currentHealth ?? stats.maxHealth ?? 0,
        maxHealth: stats.maxHealth ?? 0,
        abilities,
        totalTicks: abilities.reduce((acc, a) => acc + (a.ticks || 0), 0)
      };
    } catch {
      return { uuid: ref?.uuid, name: '', mugshot: '', currentHealth: 0, maxHealth: 0, abilities: [], totalTicks: 0 };
    }
  };

  setInterval(() => {
    const anchor = $.clock.server || Date.now();
    const nowMs = $.clock.now || Date.now();

    const now = new Date(anchor);
    const minutes = now.getMinutes();
    const nextMarkMinute = minutes + (MINUTES_TO_REFILL - (minutes % MINUTES_TO_REFILL));
    const nextMark = new Date(now);
    nextMark.setMinutes(nextMarkMinute, 0, 0);

    const timeToRefill = nextMark.getTime() - nowMs;
    s.healTimerElapsed = Math.max(0, FULL_TIME - timeToRefill);

    if (timeToRefill < 0) {
      $.characters.forEach((ref) => {
        try {
          const char = CHARACTERS(ref, true);
          const stats = calculateCombatStatsByCharacter(char);
          const heal = Math.ceil(stats.maxHealth * 0.33);
          ref.overrides.combatStats.currentHealth = Math.min(
            char.combatStats.currentHealth + heal,
            stats.maxHealth
          );
        } catch { }
      });
      $.clock = { ...$.clock, server: nowMs, client: performance.now() };
    }
  }, 1000);
</script>

<sidebar sm:t="8.5" t="12">
  <input type="checkbox" id="sidebar-toggle" />
  <sidebar-content sm:bg="white" h="300">
    <crow vertical g-2 w-full>
      <!-- if combat.duration !== 0 -->
      <crow>
        <!-- if elapsedMilliseconds < combat.duration -->
        <a class="crow" g-2 href="#" primary
          onclick="event.preventDefault(); $.overlay = { name: 'Combat' }">
          <spinner sm></spinner>
          <span>Fighting..</span>
        </a>
        <!-- /if -->
        <!-- if elapsedMilliseconds >= combat.duration && combat.duration !== 0 -->
        <a class="crow" g-2 href="#" primary
          onclick="event.preventDefault(); $.overlay = { name: 'Combat' }">
          <span>View outcome</span>
        </a>
        <!-- /if -->
      </crow>
      <!-- /if -->

      <component src="/components/TitleBar.html" small title="My Ludus">
        <span cinzel flex-none>level @[getLevelByExperience(experience)]</span>
      </component>

      <crow vertical left w-full g-2>
        <crow justify-between w-full>
          <span text-sm>Coins</span>
          <component src="/components/Coins.html" amount="@[coins]"></component>
        </crow>

        <crow vertical left w-full>
          <crow justify-between w-full>
            <span text-sm>Experience</span>
            <button primary sm onclick="$.overlay = { name: 'AccountProgression' }">
              See progress
            </button>
          </crow>
          <!-- if getLevelByExperience(experience) < 25 -->
          <component src="/components/Bar.html" center color="yellow"
            current="@[getCurrentExperienceAtLevel(experience)]"
            max="@[getExperienceForNextLevel(getLevelByExperience(experience))]"></component>
          <!-- /if -->
        </crow>

        <crow vertical left w-full>
          <crow justify-between w-full>
            <span text-sm>Medical area</span>
            <button primary sm onclick="
          $.characters.forEach(c => {
            try {
              const ch = CHARACTERS(c, true);
              const stats = calculateCombatStatsByCharacter(ch);
              const heal = Math.ceil(stats.maxHealth * 0.33);
              c.overrides.combatStats.currentHealth = Math.min(ch.combatStats.currentHealth + heal, stats.maxHealth);
            } catch {}
          });
        ">Heal now</button>
          </crow>
          <component src="/components/Bar.html" center timer color="stone"
            current="@[this.healTimerElapsed]" max="@[this.healTimerTotal]"></component>
        </crow>
      </crow>

      <div h="4"></div>

      <component src="/components/TitleBar.html" small title="My Brawlers">
        <span cinzel flex-none>@[characters.length] / @[allowedNumberOfCharacters()]</span>
      </component>

      <brawler-list max-brawlers="@[!!maxBrawlers]">
        <crow vertical up left>
          <!-- if characters.length === 0 -->
          <crow vertical w-full g-2 text-sm>
            You have no brawlers yet.
            <a class="button" href="/brawlers" primary>
              Recruit brawler
            </a>
          </crow>
          <!-- /if -->
          <!-- each characters.map(hydrateBrawler) as brawler (brawler.uuid), i -->
          <a href="/brawlers/@[i]" onclick="selectBrawler(event, brawler.uuid, @[i])" brawler-link>
            <crow left brawler-row
              active="@[Number(page.params.characterIndex) === i || selectedBrawlers.includes(brawler.uuid)]">
              <brawler-avatar-outer>
                <brawler-avatar-inner glass>
                  <img data-src="/static/images/races/@[brawler.mugshot]" alt="" brawler-img />
                </brawler-avatar-inner>
              </brawler-avatar-outer>
              <crow vertical left brawler-info>
                <component src="/components/Bar.html" text="@[brawler.name]"
                  current="@[brawler.currentHealth]" max="@[brawler.maxHealth]"
                  percentage="1">
                </component>
                <ability-accordion>
                  <ability-accordion-content>
                    <ability-preview style="width: calc((12px * @[brawler.totalTicks]) + 2px)">
                      <!-- each brawler.abilities as ab -->
                      <ability-preview-cell style="width: calc(12px * @[ab.ticks])">
                        <icon @[ab.icon]></icon>
                      </ability-preview-cell>
                      <!-- /each -->
                    </ability-preview>
                  </ability-accordion-content>
                </ability-accordion>
              </crow>
            </crow>
          </a>
          <!-- /each -->
        </crow>
      </brawler-list>
    </crow>
  </sidebar-content>
</sidebar>
