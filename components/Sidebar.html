<script type="module">
  import CHARACTERS from '/js/constants/CHARACTERS.js';
  import { calculateCombatStatsByCharacter, calculateTickStart } from '/js/utils.js';

  component({ showSequence: false });

  // sidebarChars stays on $ — it's a reactive derived array that the
  // template iterates. Iteration needs a state path for proper diffing.
  // All other sidebar values (level, xp, maxChars) are computed inline
  // in the template via window globals.
  const refresh = () => {
    const AB = window.ABILITIES_FN;
    $.sidebarChars = ($.characters || []).map((ref) => {
      try {
        const char = CHARACTERS(ref, true);
        const stats = calculateCombatStatsByCharacter(char);
        const currentHealth = char.combatStats?.currentHealth ?? stats.maxHealth ?? 0;
        const maxHealth = stats.maxHealth ?? 0;
        const hydrated = AB
          ? char.abilities.map((a) => { try { return AB(a, true); } catch { return null; } }).filter(Boolean)
          : [];
        const abilities = hydrated
          .filter((_, i) => calculateTickStart(hydrated, i) < char.maxTicks)
          .map((h) => ({ icon: h.icon, ticks: h.ticks }));
        const totalTicks = abilities.reduce((acc, a) => acc + (a.ticks || 0), 0);
        return {
          name: char.name,
          mugshot: char.image.replace('.png', '-mugshot.png'),
          currentHealth,
          maxHealth,
          healthPct: maxHealth > 0
            ? Math.max(0, Math.round((currentHealth / maxHealth) * 100))
            : 0,
          abilities,
          totalTicks
        };
      } catch { return null; }
    }).filter(Boolean);
  };

  refresh();
  $.on('afterUpdate', (current, prev) => {
    if (current.characters !== prev.characters) refresh();
  });

  // Heal timer — owned by Sidebar (only runs while logged in / Sidebar mounted).
  const MINUTES_TO_REFILL = 2;
  const FULL_TIME = MINUTES_TO_REFILL * 60 * 1000;

  setInterval(() => {
    const anchor = $.serverTimestampSnapshot || Date.now();
    const nowMs = $.serverTimestamp || Date.now();

    const now = new Date(anchor);
    const minutes = now.getMinutes();
    const nextMarkMinute = minutes + (MINUTES_TO_REFILL - (minutes % MINUTES_TO_REFILL));
    const nextMark = new Date(now);
    nextMark.setMinutes(nextMarkMinute, 0, 0);

    const timeToRefill = nextMark.getTime() - nowMs;
    $.healTimerElapsed = Math.max(0, FULL_TIME - timeToRefill);
    $.healTimerTotal = FULL_TIME;

    if (timeToRefill < 0) {
      $.characters.forEach((ref) => {
        try {
          const char = CHARACTERS(ref, true);
          const stats = calculateCombatStatsByCharacter(char);
          const heal = Math.ceil(stats.maxHealth * 0.33);
          ref.overrides.combatStats.currentHealth = Math.min(
            char.combatStats.currentHealth + heal,
            stats.maxHealth
          );
        } catch { }
      });
      $.serverTimestampSnapshot = nowMs;
      $.syncPerformanceNow = performance.now();
    }
  }, 1000);
</script>

<sidebar sm:t="8.5" t="12">
  <input type="checkbox" id="sidebar-toggle" />
  <sidebar-content sm:bg="white" h="300">
    <crow vertical g-2 w-full>
      <!-- if combat.duration !== 0 -->
      <crow>
        <!-- if elapsedMilliseconds < combat.duration -->
        <a class="crow" g-2 href="#" primary onclick="event.preventDefault(); $.overlay = 'Combat'">
          <spinner sm></spinner>
          <span>Fighting..</span>
        </a>
        <!-- /if -->
        <!-- if elapsedMilliseconds >= combat.duration && combat.duration !== 0 -->
        <a class="crow" g-2 href="#" primary onclick="event.preventDefault(); $.overlay = 'Combat'">
          <span>View outcome</span>
        </a>
        <!-- /if -->
      </crow>
      <!-- /if -->

      <component src="/components/TitleBar.html" small title="My Ludus">
        <span cinzel flex-none>level @[getLevelByExperience(experience)]</span>
      </component>

      <crow vertical left w-full g-2>
        <crow justify-between w-full>
          <span text-sm>Coins</span>
          <component src="/components/Coins.html" amount="@[coins]"></component>
        </crow>

        <crow vertical left w-full>
          <crow justify-between w-full>
            <span text-sm>Experience</span>
            <button primary sm onclick="$.overlay = 'AccountProgression'">
              See progress
            </button>
          </crow>
          <!-- if getLevelByExperience(experience) < 25 -->
          <component src="/components/Bar.html" center color="yellow"
            current="@[getCurrentExperienceAtLevel(experience)]"
            max="@[getExperienceForNextLevel(getLevelByExperience(experience))]"></component>
          <!-- /if -->
        </crow>

        <crow vertical left w-full>
          <crow justify-between w-full>
            <span text-sm>Medical area</span>
            <button primary sm onclick="
          $.characters.forEach(c => {
            try {
              const ch = CHARACTERS(c, true);
              const stats = calculateCombatStatsByCharacter(ch);
              const heal = Math.ceil(stats.maxHealth * 0.33);
              c.overrides.combatStats.currentHealth = Math.min(ch.combatStats.currentHealth + heal, stats.maxHealth);
            } catch {}
          });
          $.healTimer = 120;
        ">Heal now</button>
          </crow>
          <component src="/components/Bar.html" center timer color="stone"
            current="@[healTimerElapsed]" max="@[healTimerTotal]"></component>
        </crow>
      </crow>

      <div h="4"></div>

      <component src="/components/TitleBar.html" small title="My Brawlers">
        <span cinzel flex-none>@[sidebarChars.length] / @[allowedNumberOfCharacters()]</span>
      </component>

      <brawler-list onmouseenter="$.this.showSequence = true"
        onmouseleave="$.this.showSequence = false">
        <crow vertical up left>
          <!-- if characters.length === 0 -->
          <crow vertical w-full g-2 text-sm>
            You have no brawlers yet.
            <a class="button" href="/brawlers" primary>
              Recruit brawler
            </a>
          </crow>
          <!-- /if -->

          <!-- each sidebarChars as schar, i -->
          <a href="/brawlers/@[i]" onclick="selectBrawler(event, characters[@[i]]?.uuid, @[i])"
            brawler-link>
            <crow left brawler-row
              active="@[Number(routeParams.characterIndex) === i || selectedBrawlers.includes(characters[i]?.uuid)]">
              <brawler-avatar-outer>
                <brawler-avatar-inner glass>
                  <img data-src="/static/images/races/@[schar.mugshot]" alt="" brawler-img />
                </brawler-avatar-inner>
              </brawler-avatar-outer>
              <crow vertical left brawler-info>
                <component src="/components/Bar.html" text="@[schar.name]"
                  current="@[schar.currentHealth]" max="@[schar.maxHealth]"
                  percentage="@[!(this.showSequence || !!maxBrawlers || Number(routeParams.characterIndex) === i || selectedBrawlers.includes(characters[i]?.uuid))]">
                </component>
                <ability-accordion
                  open="@[this.showSequence || !!maxBrawlers || Number(routeParams.characterIndex) === i || selectedBrawlers.includes(characters[i]?.uuid)]">
                  <ability-accordion-content>
                    <ability-preview style="width: calc((12px * @[schar.totalTicks]) + 2px)">
                      <!-- each schar.abilities as ab -->
                      <ability-preview-cell style="width: calc(12px * @[ab.ticks])">
                        <icon @[ab.icon]></icon>
                      </ability-preview-cell>
                      <!-- /each -->
                    </ability-preview>
                  </ability-accordion-content>
                </ability-accordion>
              </crow>
            </crow>
          </a>
          <!-- /each -->
        </crow>
      </brawler-list>
    </crow>
  </sidebar-content>
</sidebar>

<style>
  [battle-brawlers] [sidebar-gap] {
    height: calc(var(--unit) * 4);
  }

  [battle-brawlers] brawler-list {
    display: block;
    margin-inline: calc(var(--unit) * -4);
  }

  [battle-brawlers] [brawler-link] {
    display: block;
    text-decoration: none;
    color: inherit;
  }

  /* Outer row: flex with gap, positioned with negative margins so the
     active-state glass pill can extend slightly outside its content box
     (matches main's `-mx-1.5 -my-1 px-1.5 py-1` pill). */
  [battle-brawlers] [brawler-row] {
    padding: calc(var(--unit) * 1) calc(var(--unit) * 1.5);
    margin: 0 calc(var(--unit) * -1.5);
    gap: 0;
    border-radius: calc(var(--unit) * 0.5);
    transition: background 150ms, box-shadow 150ms, backdrop-filter 150ms;
  }

  [battle-brawlers] [brawler-row][active] {
    background: rgba(255, 255, 255, 0.5);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    backdrop-filter: blur(4px);
  }

  /* Avatar frame: 64×64 outer with 4px padding, 56×56 inner rounded-sm
     with thin border. Mirrors main's `h-16 w-16 p-1` + inner glass frame. */
  [battle-brawlers] brawler-avatar-outer {
    display: block;
    flex: none;
    width: 64px;
    height: 64px;
    padding: 4px;
  }

  [battle-brawlers] brawler-avatar-inner {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: calc(var(--unit) * 0.5);
    border: 1px solid #6b7280;
    overflow: hidden;
  }

  [battle-brawlers] [brawler-img] {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  [battle-brawlers] [brawler-info] {
    flex: 1;
    min-width: 0;
    padding: calc(var(--unit) * 1);
    overflow-x: hidden;
  }

  [battle-brawlers] ability-accordion {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 200ms ease-out;
    width: 100%;
  }

  [battle-brawlers] ability-accordion[open] {
    grid-template-rows: 1fr;
  }

  [battle-brawlers] ability-accordion-content {
    overflow: hidden;
    padding-right: 1px;
  }

  /* Ability preview: 12px per tick, 24px tall, stone-300 background with
     stone-500 dividers. Mirrors main's CombatantAbilityBar preview mode. */
  [battle-brawlers] ability-preview {
    display: flex;
    height: 24px;
    border: 0.5px solid #78716c;
    background: #d6d3d1;
  }

  [battle-brawlers] ability-preview-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    flex: none;
    border-right: 0.5px solid #78716c;
    color: #78716c;
    font-size: 0.875rem;
  }

  [battle-brawlers] ability-preview-cell:last-child {
    border-right: none;
  }
</style>
