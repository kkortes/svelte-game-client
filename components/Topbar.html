<crow ml="auto" order-first g-1>
  <button tertiary onclick="$.settings = { ...$.settings, darkMode: !$.settings.darkMode }; document.body.toggleAttribute('dark', $.settings.darkMode)">
    <!-- if settings.darkMode -->
    <icon light></icon>
    <!-- /if -->
    <!-- if !settings.darkMode -->
    <icon dark></icon>
    <!-- /if -->
  </button>
  <button tertiary onclick="$.overlay = 'GameMenu'">
    <icon menu></icon>
  </button>
</crow>
