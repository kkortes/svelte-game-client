<victory-or-loss
  relative
  w="full"
  victory="@[outcome === 'victory']"
  defeat="@[outcome === 'defeat']"
  draw="@[outcome === 'draw']"
>
  <stack>
    <!-- if outcome === 'victory' -->
    <victory-halo>
      <halo-inner block></halo-inner>
    </victory-halo>
    <!-- /if -->
    <outcome-icon block>
      <!-- if outcome === 'victory' -->
      <icon victory></icon>
      <!-- /if -->
      <!-- if outcome !== 'victory' -->
      <icon defeat></icon>
      <!-- /if -->
    </outcome-icon>
    <outcome-label>
      <!-- if outcome === 'victory' -->VICTORY<!-- /if -->
      <!-- if outcome === 'defeat' -->DEFEAT<!-- /if -->
      <!-- if outcome === 'draw' -->DRAW<!-- /if -->
    </outcome-label>
  </stack>
</victory-or-loss>

<style>
  victory-or-loss {
    display: grid;
    place-items: center;
  }

  victory-halo {
    position: absolute;
    pointer-events: none;
    width: 200%;
    aspect-ratio: 1 / 1;
  }

  halo-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    opacity: 0.25;
    animation: halo-spin 10000ms linear infinite;
    background: repeating-conic-gradient(
      from 0deg at 50% 50%,
      transparent 0deg 10deg,
      var(--yellow-400) 15deg 25deg,
      transparent 30deg 45deg
    );
    -webkit-mask: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 1) 0%, transparent 50%);
    mask: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 1) 0%, transparent 50%);
  }

  outcome-icon {
    font-size: calc(var(--unit) * 20);
    line-height: 1;
  }

  outcome-icon icon {
    font-size: calc(var(--unit) * 24);
    --color: var(--gray-400);
  }

  victory-or-loss[victory] outcome-icon icon {
    background:
      radial-gradient(
        ellipse farthest-corner at right bottom,
        var(--gold-highlight) 0%,
        var(--gold-warm) 8%,
        var(--gold-deep) 30%,
        var(--gold-shadow) 40%,
        transparent 80%
      ),
      radial-gradient(
        ellipse farthest-corner at left top,
        var(--white) 0%,
        var(--gold-pale) 8%,
        var(--gold-soft) 25%,
        var(--gold-bronze) 62.5%,
        var(--gold-bronze) 100%
      );
  }

  outcome-label {
    isolation: isolate;
    font-family: var(--font-accent, var(--font-heading, sans-serif));
    font-size: calc(var(--unit) * 10);
    letter-spacing: 0.05em;
    color: var(--gray-200);
    -webkit-text-stroke: 1px var(--gray-400);
    text-shadow: 0 calc(var(--unit) * 0.5) calc(var(--unit) * 1) rgba(0, 0, 0, 0.3);
  }

  victory-or-loss[victory] outcome-label {
    color: var(--yellow-100);
    -webkit-text-stroke: 1px var(--yellow-300);
  }
</style>
