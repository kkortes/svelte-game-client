<victory-or-loss relative w="full" outcome="@[outcome]">
  <!-- if outcome === 'victory' -->
  <victory-halo absolute></victory-halo>
  <!-- /if -->
  <outcome-icon block>
    <!-- if outcome === 'victory' -->
    <icon victory></icon>
    <!-- /if -->
    <!-- if outcome !== 'victory' -->
    <icon defeat></icon>
    <!-- /if -->
  </outcome-icon>
  <outcome-label>
    <!-- if outcome === 'victory' -->VICTORY<!-- /if -->
    <!-- if outcome === 'defeat' -->DEFEAT<!-- /if -->
    <!-- if outcome === 'draw' -->DRAW<!-- /if -->
  </outcome-label>
</victory-or-loss>

<style>
  victory-or-loss {
    display: grid;
    place-items: center;
  }

  victory-halo {
    pointer-events: none;
    top: 50%;
    left: 50%;
    width: 200%;
    aspect-ratio: 1 / 1;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    opacity: 0.25;
    animation: halo-spin 10000ms linear infinite;
    background: repeating-conic-gradient(
      from 0deg at 50% 50%,
      transparent 0deg 10deg,
      var(--yellow-400) 15deg 25deg,
      transparent 30deg 45deg
    );
    -webkit-mask: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 1) 0%, transparent 50%);
    mask: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 1) 0%, transparent 50%);
  }

  outcome-icon {
    font-size: calc(calc(var(--unit) * 20));
  }

  outcome-icon icon {
    font-size: calc(calc(var(--unit) * 24));
    --color: var(--gray-400);
    filter: drop-shadow(0 calc(calc(var(--unit) * 0.5)) calc(calc(var(--unit) * 1)) rgba(0, 0, 0, 0.3));
  }

  victory-or-loss[outcome="victory"] outcome-icon icon {
    --color: var(--yellow-200);
    filter: drop-shadow(0 calc(calc(var(--unit) * 0.5)) calc(calc(var(--unit) * 1)) rgba(0, 0, 0, 0.3));
  }

  outcome-label {
    font-family: var(--font-accent, var(--font-heading, sans-serif));
    font-size: calc(calc(var(--unit) * 10));
    letter-spacing: 0.05em;
    color: var(--gray-200);
    -webkit-text-stroke: 1px var(--gray-400);
    text-shadow: 0 calc(calc(var(--unit) * 0.5)) calc(calc(var(--unit) * 1)) rgba(0, 0, 0, 0.3);
  }

  victory-or-loss[outcome="victory"] outcome-label {
    color: var(--yellow-100);
    -webkit-text-stroke: 1px var(--yellow-300);
  }
</style>
