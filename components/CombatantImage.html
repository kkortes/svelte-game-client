<combatant-sprite
  absolute
  hurt="@[card.hurtActive]"
  block="@[card.blockActive]"
  attack-blocked="@[card.attackBlocked]"
  whirlwind="@[card.whirlwindActive]"
  attack-dodged="@[card.attackDodgedActive]"
  knocked-out="@[card.knockedOut]"
  style="
    --position-x: @[card.x]px;
    --position-y: @[card.y]px;
    --attack-start-x: @[card.attackStartX]px;
    --attack-start-y: @[card.attackStartY]px;
    --attack-end-x: @[card.attackEndX]px;
    --attack-end-y: @[card.attackEndY]px;
    --attack-duration: @[card.attackDuration]ms;
    --attack-anim: @[card.attackAnimationName];
    --attack-anim-duration: @[card.attackAnimationDuration];
    --dir: @[card.dir];
    --sprite-height: @[card.spriteHeight]px;
  "
>
  <sprite-inner flex down>
    <img
      class="combatant-avatar"
      src="@[card.imageUrl]"
      alt="@[card.name]"
      onerror="if (!this.src.includes('@[')) this.style.display = 'none';"
    />
    <sprite-hurt-mask absolute style="--img: url('@[card.imageUrl]')"></sprite-hurt-mask>
    <sprite-block absolute>
      <img src="/static/images/shield.png" alt="" />
    </sprite-block>
  </sprite-inner>
</combatant-sprite>

<style>
  combatant-sprite {
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    transform: translate(var(--position-x), var(--position-y));
  }

  combatant-sprite[knocked-out] sprite-inner {
    filter: grayscale(100%);
  }

  sprite-inner {
    align-items: center;
    width: calc(var(--unit) * 36);
    height: var(--sprite-height, calc(var(--unit) * 36));
    transform: translate(-50%, calc(var(--unit) * 17.5 - 100%)) scale(var(--c-scale, 1));
    transform-origin: 50% calc(100% - calc(var(--unit) * 22.5));
  }

  sprite-inner img.combatant-avatar {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: bottom center;
    transform: scaleX(var(--dir));
    transition: all 250ms cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  combatant-sprite[attack-dodged] sprite-inner img.combatant-avatar {
    opacity: 0.2;
    transform: scaleX(var(--dir)) translate(calc(var(--dir) * -calc(var(--unit) * 2.5)), 0);
  }

  sprite-hurt-mask {
    inset: 0;
    background-color: transparent;
    mix-blend-mode: multiply;
    opacity: 0;
    -webkit-mask: var(--img) no-repeat bottom / auto 100%;
    mask: var(--img) no-repeat bottom / auto 100%;
  }

  combatant-sprite[hurt] sprite-hurt-mask {
    animation: sprite-hurt 340ms ease;
  }

  sprite-block {
    inset: 0;
    display: grid;
    place-items: center;
    opacity: 0;
    pointer-events: none;
    filter: grayscale(100%);
  }

  sprite-block img {
    width: 50%;
  }

  combatant-sprite[block] sprite-block,
  combatant-sprite[attack-blocked] sprite-block {
    opacity: 1;
  }

  combatant-sprite {
    animation: var(--attack-anim, none) var(--attack-anim-duration, 0ms)
      cubic-bezier(0.25, 0.1, 0.25, 1);
  }
</style>
