<combatant-sprite absolute data-combatant-wrap="@[card.cardId]"
  data-attack-class="@[card.attackClass]"
  hurt="@[card.hurtActive]"
  block="@[card.blockActive]"
  attack-blocked="@[card.attackBlocked]"
  whirlwind="@[card.whirlwindActive]"
  attack-dodged="@[card.attackDodgedActive]"
  knocked-out="@[card.knockedOut]"
  style="
    --position-x: @[card.x]px;
    --position-y: @[card.y]px;
    --attack-start-x: @[card.attackStartX]px;
    --attack-start-y: @[card.attackStartY]px;
    --attack-end-x: @[card.attackEndX]px;
    --attack-end-y: @[card.attackEndY]px;
    --attack-duration: @[card.attackDuration]ms;
    --dir: @[card.dir];
    --sprite-height: @[card.spriteHeight]px;
  ">
  <sprite-inner flex down>
    <img class="combatant-avatar" src="@[card.imageUrl]"
      alt="@[card.name]"
      onerror="if(!this.src.includes('@['))this.style.display='none'" />
    <sprite-hurt-mask absolute style="--img: url('@[card.imageUrl]');"></sprite-hurt-mask>
    <sprite-block absolute>
      <img src="/static/images/shield.png" alt="" />
    </sprite-block>
  </sprite-inner>
</combatant-sprite>

<style>
  [battle-brawlers] combatant-sprite {
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    transform: translate(var(--position-x), var(--position-y));
  }

  [battle-brawlers] combatant-sprite[knocked-out] sprite-inner {
    filter: grayscale(100%);
  }

  [battle-brawlers] sprite-inner {
    align-items: center;
    width: 144px;
    height: var(--sprite-height, 144px);
    transform: translate(-50%, calc(70px - 100%));
  }

  [battle-brawlers] sprite-inner img.combatant-avatar {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: bottom center;
    transform: scaleX(var(--dir));
    transition: all 250ms cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  [battle-brawlers] combatant-sprite[attack-dodged] sprite-inner img.combatant-avatar {
    opacity: 0.2;
    transform: scaleX(var(--dir)) translate(calc(var(--dir) * -10px), 0);
  }

  [battle-brawlers] sprite-hurt-mask {
    inset: 0;
    background-color: transparent;
    mix-blend-mode: multiply;
    opacity: 0;
    -webkit-mask: var(--img) no-repeat bottom / auto 100%;
    mask: var(--img) no-repeat bottom / auto 100%;
  }

  [battle-brawlers] combatant-sprite[hurt] sprite-hurt-mask {
    animation: sprite-hurt 340ms ease;
  }

  [battle-brawlers] sprite-block {
    inset: 0;
    display: grid;
    place-items: center;
    opacity: 0;
    pointer-events: none;
    filter: grayscale(100%);
  }

  [battle-brawlers] sprite-block img {
    width: 50%;
  }

  [battle-brawlers] combatant-sprite[block] sprite-block,
  [battle-brawlers] combatant-sprite[attack-blocked] sprite-block {
    opacity: 1;
  }

  [battle-brawlers] combatant-sprite[data-attack-class="basicAttackFast"] {
    animation: bb-basicAttackFast var(--attack-duration) cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  [battle-brawlers] combatant-sprite[data-attack-class="basicAttackRegular"] {
    animation: bb-basicAttackRegular var(--attack-duration) cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  [battle-brawlers] combatant-sprite[data-attack-class="basicAttackSlow"] {
    animation: bb-basicAttackSlow var(--attack-duration) cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  [battle-brawlers] combatant-sprite[data-attack-class="whirlwind"] {
    animation: bb-whirlwind 500ms cubic-bezier(0.25, 0.1, 0.25, 1);
  }
</style>
