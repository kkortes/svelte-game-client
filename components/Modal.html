<modal-root open="@[when]" bare="@[bare]" onclick="@[dismiss]">
  <spacer h="20"></spacer>
  <modal-panel onclick="event.stopPropagation()">
    <slot></slot>
  </modal-panel>
  <spacer h="20"></spacer>
</modal-root>

<style>
  modal-root {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: grid;
    grid-template-rows: calc(var(--unit) * 20) 1fr calc(var(--unit) * 20);
    place-items: center;
    overflow-x: hidden;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.2);
    box-shadow: inset 0 0 10vw rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(1px);
    opacity: 0;
    pointer-events: none;
    transform: scale(1.05);
    transition:
      opacity 200ms ease-out,
      transform 200ms ease-out;
  }

  modal-root[open] {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
  }

  modal-panel {
    display: block;
    position: relative;
    width: fit-content;
    max-width: calc(100% - calc(var(--unit) * 4));
    max-height: 90vh;
    overflow-y: auto;
    text-align: left;
    overflow-x: hidden;
  }

  modal-root[bare] {
    display: block;
    background: transparent;
    box-shadow: none;
    backdrop-filter: none;
  }
</style>
