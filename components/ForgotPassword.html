<script type="module">
  import { notify } from '/js/actions.js';

  // Matches: src/components/ForgotPassword.svelte
  window.authForgotPassword = async () => {
    try {
      await $.socket.sendAsync('user/password/request-reset', {
        email: $.authEmail,
        url: window.location.origin
      });
      $.authEmail = '';
      notify({ info: 'if an account was registered on that email address, check your email' });
      $.authMode = 'login';
    } catch (e) {
      notify(e);
    }
  };
</script>

<form onsubmit="event.preventDefault(); authForgotPassword();">
  <crow g-2 mb-3>
    <input type="email" placeholder="Email" value="@[authEmail]" oninput="$.authEmail = this.value"
      required auth-input />
    <button primary type="submit">Submit</button>
  </crow>
  <p text-sm text-muted>
    <a href="#" primary onclick="event.preventDefault(); $.authMode = 'login';">
      Back to login
    </a>
  </p>
</form>
