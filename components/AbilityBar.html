<ability-bar w-full px-1 py-2 small="@[small]">
  <ability-track relative w-full>
    <ability-grid>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
      <ability-cell></ability-cell>
    </ability-grid>

    <!-- if !dndDisabled -->
    <ability-marker-12></ability-marker-12>
    <!-- /if -->

    <!-- if !minimalistic -->
    <ability-marker-sequence
      style="left: calc((100% / 15) * @[enemyAbilityBars[idx].lastTick]);">
      <ability-marker-label>
        <strong>Ability&nbsp;sequence</strong>
        <span>@[enemyAbilityBars[idx].lastTick]&nbsp;ticks</span>
      </ability-marker-label>
    </ability-marker-sequence>
    <!-- /if -->

    <ability-overlay absolute t-0 l-0 r-0 b-0>
      <crow up left w-full h-full ability-row>
        <!-- each enemyAbilityBars[idx].abilities as ability -->
        <ability-segment
          dnd-item="@[!dndDisabled]"
          basic="@[ability.basic]"
          overflow="@[ability.overflow]"
          style="width: calc(((100% / 15) * @[ability.ticks]) + 1px);">
          <ability-icon>
            <icon @[ability.icon]></icon>
          </ability-icon>
        </ability-segment>
        <!-- /each -->
      </crow>
    </ability-overlay>
  </ability-track>
</ability-bar>

<style>
  [battle-brawlers] ability-bar { display: block; }
  [battle-brawlers] ability-track { display: block; }

  /* 15-cell dashed tick grid — matches main's `-ml-px aspect-[2/3] flex-1 border border-dashed border-gray-300`. */
  [battle-brawlers] ability-grid {
    display: grid;
    grid-template-columns: repeat(15, 1fr);
    width: 100%;
  }
  [battle-brawlers] ability-grid ability-cell {
    display: block;
    aspect-ratio: 2 / 3;
    border: 1px dashed #d1d5db;
    margin-left: -1px;
  }

  /* Tick-12 marker — solid vertical line marking the max playable tick
     window; only visible when DnD is enabled. Matches main's
     `absolute -top-2 -bottom-4 w-px -translate-x-px border-r border-solid`. */
  [battle-brawlers] ability-marker-12 {
    position: absolute;
    top: calc(var(--unit) * -2);
    bottom: calc(var(--unit) * -4);
    left: calc((100% / 15) * 12);
    width: 1px;
    border-right: 1px solid #6b7280;
    transform: translateX(-0.5px);
    transition: all 200ms;
  }

  /* Sequence marker — dashed line at the end of the current ability
     sequence; matches main's
     `absolute -top-2 -bottom-2 z-10 w-px border-dashed`. */
  [battle-brawlers] ability-marker-sequence {
    position: absolute;
    top: calc(var(--unit) * -2);
    bottom: calc(var(--unit) * -2);
    width: 1px;
    border-right: 1px dashed #6b7280;
    transform: translateX(-0.5px);
    z-index: 10;
    transition: all 200ms;
  }
  [battle-brawlers] ability-marker-label {
    position: absolute;
    bottom: 100%;
    right: calc(var(--unit) * 1);
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    text-align: right;
    font-size: 0.75rem;
    line-height: 0.9;
    white-space: nowrap;
  }
  [battle-brawlers] ability-marker-label strong {
    color: #000;
    line-height: 0.75rem;
  }

  /* Overlay layer containing the actual ability segments. */
  [battle-brawlers] ability-overlay {
    border-radius: calc(var(--unit) * 2);
    pointer-events: none;
  }
  [battle-brawlers] [ability-row] {
    align-items: stretch;
  }

  /* Ability segment — sequential flex item; width = (100%/15) * ticks,
     -ml-px to collapse borders with the previous segment. Matches main's
     `relative -ml-px h-full !flex-none rounded border border-gray-500 bg-white`. */
  [battle-brawlers] ability-segment {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: none;
    height: 100%;
    margin-left: -1px;
    border: 1px solid #6b7280;
    background: #ffffff;
    border-radius: calc(var(--unit) * 1);
    z-index: 10;
  }
  /* Basic ability — muted chrome, drops behind non-basic on overlap
     (main: `border-gray-300 bg-gray-100` + omits z-10). */
  [battle-brawlers] ability-segment[basic] {
    border-color: #d1d5db;
    background: #f3f4f6;
    z-index: auto;
  }
  /* Overflow (tickStart > 11 && !dndDisabled) — pink-red tint.
     Main: `border-red-300 bg-red-100`. */
  [battle-brawlers] ability-segment[overflow] {
    border-color: #fca5a5;
    background: #fee2e2;
  }

  /* AbilityIcon layout — icon filling segment; basic abilities get a
     gray icon, overflow gets a red-300 icon. Status-effect slot sits at
     bottom-left if present (not rendered here — add as a nested element
     when a use-case needs it). */
  [battle-brawlers] ability-icon {
    display: grid;
    place-items: center;
    width: 100%;
    height: 100%;
  }
  [battle-brawlers] ability-icon icon {
    grid-area: 1 / 1;
    font-size: clamp(0.875rem, 3vw, 1.875rem);
  }
  [battle-brawlers] ability-segment[basic] ability-icon icon {
    color: #9ca3af;
  }
  [battle-brawlers] ability-segment[overflow] ability-icon icon {
    color: #fca5a5;
  }
</style>
