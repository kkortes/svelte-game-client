<script type="module">
  import { Howl } from '/js/lib/howler.js';
  import AUDIO from '/js/audio.js';
  import { getLevelByExperience } from '/js/level.js';

  $.on('afterUpdate', (current, prev) => {
    if (current.showAccountProgression && !prev.showAccountProgression) {
      const el = document.querySelector('[progression-scroll] slides');
      if (!el) return;
      const target = el.children[current.accountRewards - 1];
      if (target) target.scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
      setTimeout(() => {
        const level = getLevelByExperience(current.experience);
        const lvlTarget = el.children[level - 1];
        if (lvlTarget) lvlTarget.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }, 50);
    }
  });

  $.progressionLevels = Array.from({ length: 25 }, (_, i) => i + 1);

  window.claimAccountReward = (lvl) => {
    if (lvl > $.accountRewards && lvl <= $.sidebarLevel) {
      if (lvl === getLevelByExperience($.experience)) {
        setTimeout(() => { $.showAccountProgression = false; }, 500);
      }
      try {
        new Howl({
          src: [AUDIO['Special Lootbox 13']],
          volume: $.settings.volume.master * $.settings.volume.sfx
        }).play();
      } catch { }
      $.accountRewards += 1;
      $.coins += 100;
    }
  };
</script>

<!-- if showAccountProgression -->
<carousel progression-scroll onclick="$.showAccountProgression = false">
  <slides x scrollbar>
    <!-- each progressionLevels as lvl -->
    <slide>
      <slide-center>
        <card progression-card onclick="event.stopPropagation()"
          data-claimed="@[lvl <= accountRewards]" data-reached="@[lvl <= sidebarLevel]">
          <!-- if lvl <= accountRewards -->
          <icon checkmark progression-check></icon>
          <!-- /if -->
          <h4 m-0>Level @[lvl]</h4>
          <hr my-2 />
          <crow g-8 up left>
            <crow vertical up left>
              <strong sm>Account</strong>
              <crow g-1>+1 <icon coin coin-silver></icon>
              </crow>
              <!-- if lvl % 5 === 0 || lvl === 1 -->
              <span sm>+1 brawler</span>
              <!-- /if -->
            </crow>
            <crow vertical up left>
              <strong sm>Brawlers</strong>
              <crow g-1>+4 <icon maxHealth></icon>
              </crow>
              <crow g-1>+2 <icon damage></icon>
              </crow>
            </crow>
          </crow>
          <progression-premium>Premium rewards TBA.</progression-premium>
          <!-- if lvl > accountRewards && lvl <= sidebarLevel -->
          <button primary onclick="claimAccountReward(@[lvl])">Claim</button>
          <!-- /if -->
          <!-- if lvl > sidebarLevel -->
          <button primary disabled>Locked</button>
          <!-- /if -->
        </card>
      </slide-center>
    </slide>
    <!-- /each -->
  </slides>
</carousel>
<!-- /if -->

<style>
  [progression-scroll] {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: rgba(0, 0, 0, 0.2);
    box-shadow: inset 0 0 10vw rgba(0, 0, 0, 0.5);
  }

  [progression-scroll] slides {
    gap: calc(var(--unit) * 8);
    padding: 0 calc(50vw - min(calc(var(--unit) * 60), 30vw));
  }

  [progression-scroll] slides>slide {
    display: flex;
    min-width: min(calc(var(--unit) * 120), 60vw);
    align-items: center;
    justify-content: center;
    scroll-snap-align: center;
  }

  [progression-scroll] [progression-card] {
    position: relative;
    text-align: center;
    border-style: dashed;
    width: min(calc(var(--unit) * 120), 60vw);
    min-height: calc(var(--unit) * 60);
  }

  [progression-card][data-claimed="true"] {
    background-color: var(--secondary);
  }

  [progression-card][data-reached="false"] {
    background-color: var(--secondary);
    color: var(--muted-foreground);
  }

  [progression-check] {
    position: absolute;
    top: calc(var(--unit) * 2);
    right: calc(var(--unit) * 2);
    color: oklch(0.7 0.2 145);
  }

  progression-premium {
    display: flex;
    align-items: center;
    justify-content: center;
    width: calc(100% + var(--unit) * 8);
    margin-inline: calc(var(--unit) * 4) calc(var(--unit) * -4) calc(var(--unit) * -4);
    padding: calc(var(--unit) * 4);
    background: oklch(0.85 0.05 85 / 0.2);
    border-radius: 0 0 var(--radius) var(--radius);
    font-size: 0.8rem;
    color: var(--muted-foreground);
  }
</style>
