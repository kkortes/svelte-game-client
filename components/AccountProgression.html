<script type="module">
  import { Howl } from '/js/lib/howler.js';
  import AUDIO from '/js/audio.js';
  import { getLevelByExperience } from '/js/level.js';

  // Matches: src/components/MyLudus.svelte — auto-scroll on open
  $.on('afterUpdate', (current, prev) => {
    if (current.showAccountProgression && !prev.showAccountProgression) {
      const scroll = document.querySelector('progression-scroll');
      if (!scroll) return;
      const target = scroll.children[current.accountRewards - 1];
      if (target) target.scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
      setTimeout(() => {
        const level = getLevelByExperience(current.experience);
        const lvlTarget = scroll.children[level - 1];
        if (lvlTarget) lvlTarget.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }, 50);
    }
  });

  // Matches: src/components/MyLudus.svelte claimReward()
  window.claimAccountReward = (lvl) => {
    if (lvl > $.accountRewards && lvl <= $.sidebarLevel) {
      if (lvl === getLevelByExperience($.experience)) {
        setTimeout(() => { $.showAccountProgression = false; }, 500);
      }
      try {
        new Howl({
          src: [AUDIO['Special Lootbox 13']],
          volume: $.settings.volume.master * $.settings.volume.sfx
        }).play();
      } catch { }
      $.accountRewards += 1;
      $.coins += 100;
    }
  };
</script>

<!-- if showAccountProgression -->
<overlay-backdrop onclick="$.showAccountProgression = false">
  <progression-panel onclick="event.stopPropagation()">
    <crow justify-between mb-4>
      <h3 m-0>Account Progression</h3>
      <button tertiary onclick="$.showAccountProgression = false">Close</button>
    </crow>
    <progression-scroll>
      <!-- each Array.from({length: 25}, (_, i) => i + 1) as lvl -->
      <card progression-card data-claimed="@[lvl <= accountRewards ? 'yes' : 'no']"
        data-reached="@[lvl <= sidebarLevel ? 'yes' : 'no']">
        <h4 m-0 mb-1>Lv @[lvl]</h4>
        <progression-rewards>
          <span progression-reward>+100 coins</span>
          <!-- if lvl % 5 === 0 -->
          <span progression-reward>+1 brawler slot</span>
          <!-- /if -->
          <span progression-reward>+4 maxHealth</span>
          <span progression-reward>+2 damage</span>
        </progression-rewards>
        <!-- if lvl <= accountRewards -->
        <span progression-claimed>Claimed</span>
        <!-- /if -->
        <!-- if lvl > accountRewards && lvl <= sidebarLevel -->
        <button primary progression-claim onclick="claimAccountReward(@[lvl])">Claim</button>
        <!-- /if -->
        <!-- if lvl > sidebarLevel -->
        <button primary progression-claim disabled>Locked</button>
        <!-- /if -->
      </card>
      <!-- /each -->
    </progression-scroll>
  </progression-panel>
</overlay-backdrop>
<!-- /if -->
