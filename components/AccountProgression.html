<script type="module">
  import { Howl } from 'howler';
  import AUDIO from '/js/audio.js';
  import { getLevelByExperience } from '/js/level.js';

  $.on('afterUpdate', (current, prev) => {
    if (current.overlay === 'AccountProgression' && prev.overlay !== 'AccountProgression') {
      const el = document.querySelector('[progression-scroll] slides');
      if (!el) return;
      const target = el.children[current.accountRewards - 1];
      if (target) target.scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
      setTimeout(() => {
        const level = getLevelByExperience(current.experience);
        const lvlTarget = el.children[level - 1];
        if (lvlTarget) lvlTarget.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }, 50);
    }
  });

  component({ levels: Array.from({ length: 25 }, (_, i) => i + 1) });

  window.claimAccountReward = (lvl) => {
    const accountLevel = getLevelByExperience($.experience);
    if (lvl !== $.accountRewards + 1 || lvl > accountLevel) return;
    if (lvl === accountLevel) {
      setTimeout(() => { $.overlay = ''; }, 500);
    }
    try {
      new Howl({
        src: [AUDIO['Special Lootbox 13']],
        volume: $.settings.volume.master * $.settings.volume.sfx
      }).play();
    } catch { }
    $.accountRewards += 1;
    $.coins += 100;
  };
</script>

<carousel progression-scroll onclick="$.overlay = ''">
    <slides x scrollbar>
      <!-- each this.levels as lvl -->
      <slide>
        <slide-center>
          <card progression-card onclick="event.stopPropagation()"
            claimed="@[lvl <= accountRewards]" reached="@[lvl <= getLevelByExperience(experience)]">
            <!-- if lvl <= accountRewards -->
            <icon checkmark progression-check absolute t-2 r-2></icon>
            <!-- /if -->
            <h4 m-0>Level @[lvl]</h4>
            <hr my-2 />
            <crow g-8 up>
              <crow vertical up left>
                <strong sm>Account</strong>
                <crow g-1>+1 <icon coin coin-platinum></icon>
                </crow>
                <!-- if lvl % 5 === 0 || lvl === 1 -->
                <span sm>+1 brawler</span>
                <!-- /if -->
              </crow>
              <crow vertical up left>
                <strong sm>Brawlers</strong>
                <crow g-1>+4 <icon maxHealth></icon>
                </crow>
                <crow g-1>+2 <icon damage></icon>
                </crow>
              </crow>
            </crow>

            <!-- if lvl > accountRewards -->
            <button primary
              disabled="@[lvl > accountRewards + 1 || lvl > getLevelByExperience(experience)]"
              onclick="claimAccountReward(@[lvl])">Claim</button>
            <!-- /if -->

            <progression-premium mt-auto flex p-4 mx="-4" mb="-4" text-muted>Premium rewards TBA.</progression-premium>


          </card>
        </slide-center>
      </slide>
      <!-- /each -->
    </slides>
</carousel>

<style>
  [progression-scroll] {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: rgba(0, 0, 0, 0.2);
    box-shadow: inset 0 0 10vw rgba(0, 0, 0, 0.5);
  }

  [progression-scroll] slides {
    gap: calc(var(--unit) * 8);
    padding: 0 calc(50vw - min(calc(var(--unit) * 60), 30vw));
  }

  [progression-scroll] slides>slide {
    display: flex;
    min-width: min(calc(var(--unit) * 120), 60vw);
    align-items: center;
    justify-content: center;
    scroll-snap-align: center;
  }

  [progression-scroll] [progression-card] {
    position: relative;
    text-align: center;
    border-style: dashed;
    width: min(calc(var(--unit) * 120), 60vw);
    min-height: calc(var(--unit) * 60);
  }

  [progression-card][claimed] {
    background-color: var(--secondary);
  }

  [progression-card]:not([reached]) {
    background-color: var(--secondary);
    color: var(--muted-foreground);
  }

  [progression-check] {
    color: oklch(0.7 0.2 145);
  }

  progression-premium {
    align-items: center;
    justify-content: center;
    width: calc(100% + var(--unit) * 8);
    background: oklch(0.85 0.05 85 / 0.2);
    border-radius: 0 0 var(--radius) var(--radius);
    font-size: 0.8rem;
  }
</style>
