<script type="module">
  let resetEligible = false;
  let resetError = '';

  try {
    await $.socket.sendAsync('user/password/reset-eligibility', { secret: $.page.params.secret });
    resetEligible = true;
  } catch (e) {
    resetError = e.message || 'This reset link is invalid or expired';
  }

  component({ resetEligible, resetError });

  window.submitNewPassword = async () => {
    const pw = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    if (!pw) return;
    if (pw !== confirm) return notify({ error: 'Passwords do not match' });

    try {
      await $.socket.sendAsync('user/password/set-new', {
        secret: $.page.params.secret,
        password: pw,
      });
      notify({ success: 'Password updated successfully' });
      window.location.href = '/';
    } catch (e) {
      notify({ error: e.message || 'Failed to reset password' });
    }
  };
</script>

<crow vertical g="4" left>
  <h3 cinzel m="0">Reset Password</h3>

  <!-- if this.resetError -->
  <span text-sm text-error>@[this.resetError]</span>
  <!-- /if -->

  <!-- if this.resetEligible -->
  <label pw-label w="full">
    <span text-sm text-muted>New password</span>
    <input
      type="password"
      id="new-password"
      placeholder="Enter new password"
      pw-input
      w="full"
      mt="1"
    />
  </label>

  <label pw-label w="full">
    <span text-sm text-muted>Confirm password</span>
    <input
      type="password"
      id="confirm-password"
      placeholder="Confirm new password"
      pw-input
      w="full"
      mt="1"
    />
  </label>

  <button primary onclick="submitNewPassword()">Confirm</button>
  <!-- /if -->

  <!-- if !this.resetEligible && !this.resetError -->
  <span text-sm text-muted>Checking reset link...</span>
  <!-- /if -->
</crow>
