<game-layout layout>
  <!-- if !socket -->
  <center-full>
    <crow g-2 text-muted><spinner></spinner> Connecting to server</crow>
  </center-full>
  <!-- /if -->

  <!-- if socket && !token -->
  <center-full auth-padding>
    <auth-scene>
      <img src="/static/images/races/troll/male-01.png" alt="" auth-char-left />

      <auth-form glass>
        <!-- if authError -->
        <auth-error text-sm mb-4>
          @[authError]
        </auth-error>
        <!-- /if -->

        <!-- if authMode === 'login' -->
        <form onsubmit="event.preventDefault(); authLogin();">
          <crow g-2 mb-3>
            <input type="email" placeholder="Email" value="@[authEmail]" oninput="$.authEmail = this.value" required auth-input />
            <input type="password" placeholder="Password" value="@[authPassword]" oninput="$.authPassword = this.value" required auth-input />
            <button primary type="submit">Log in</button>
          </crow>
          <crow g-2 mb-2>
            <input type="checkbox" id="codeOfConduct" onchange="$.authCodeOfConduct = this.checked" />
            <label for="codeOfConduct" text-sm>I agree to the <a href="#" onclick="event.preventDefault(); $.overlay = 'CodeOfConduct'">Code of Conduct</a></label>
          </crow>
          <crow g-2 mb-2>
            <input type="checkbox" id="rememberMe" onchange="$.authRememberMe = this.checked" />
            <label for="rememberMe" text-sm>Remember me</label>
          </crow>
          <crow g-2>
            <button tertiary type="button" onclick="$.authMode = 'register'">Register</button>
            <button tertiary type="button" onclick="$.authMode = 'forgot'">Forgot password</button>
          </crow>
        </form>
        <!-- /if -->

        <!-- if authMode === 'register' -->
        <form onsubmit="event.preventDefault(); authRegister();">
          <crow g-2 mb-3>
            <input type="email" placeholder="Email" value="@[authEmail]" oninput="$.authEmail = this.value" required auth-input />
            <input type="password" placeholder="Password" value="@[authPassword]" oninput="$.authPassword = this.value" required auth-input />
            <button primary type="submit">Register</button>
          </crow>
          <p text-sm text-muted>
            Already have an account? <a href="#" onclick="event.preventDefault(); $.authMode = 'login';">Log in</a>
          </p>
        </form>
        <!-- /if -->

        <!-- if authMode === 'forgot' -->
        <form onsubmit="event.preventDefault(); $.authError = 'Password reset email sent (if account exists)'; $.authMode = 'login';">
          <crow g-2 mb-3>
            <input type="email" placeholder="Email" value="@[authEmail]" oninput="$.authEmail = this.value" required auth-input />
            <button primary type="submit">Reset</button>
          </crow>
          <p text-sm text-muted>
            <a href="#" onclick="event.preventDefault(); $.authMode = 'login';">Back to login</a>
          </p>
        </form>
        <!-- /if -->
      </auth-form>

      <img src="/static/images/races/elf/female-01.png" alt="" auth-char-right />
    </auth-scene>
  </center-full>
  <!-- /if -->

  <!-- if token -->
  <crow game-shell>
    <aside game-sidebar sm-hide>
      <component src="/components/Sidebar.html"></component>
    </aside>

    <crow vertical game-main>
      <game-content-grid>
        <crow left up vertical content-area>
          <content-inner>
            <page-content>
              <p text-muted>Loading...</p>
            </page-content>
          </content-inner>
          <sticky-bottom>
            <page-sticky-bottom></page-sticky-bottom>
          </sticky-bottom>
        </crow>

        <crow up tab-row>
          <crow up right g-1>
            <a href="/" data-tab="" tab-link data-active="@[route ? route.split('/')[1] || '' : '']">Game Guide</a>
            <a href="/the-arena" data-tab="the-arena" tab-link data-active="@[route ? route.split('/')[1] || '' : '']">The Arena</a>
            <a href="/random-duel" data-tab="random-duel" tab-link data-active="@[route ? route.split('/')[1] || '' : '']">Random duel</a>
            <a href="/vendor" data-tab="vendor" tab-link data-active="@[route ? route.split('/')[1] || '' : '']">Vendor</a>
            <a href="/brawlers" data-tab="brawlers" tab-link data-active="@[route ? route.split('/')[1] || '' : '']">Brawlers</a>
          </crow>
        </crow>
      </game-content-grid>
    </crow>

    <!-- if routeParams.characterIndex !== undefined || route === '/vendor' -->
    <aside game-sidebar sm-hide armory-aside>
      <component src="/components/Armory.html"></component>
    </aside>
    <!-- /if -->
  </crow>
  <!-- /if -->

  <style>
    [layout] center-full {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    [layout] [auth-padding] {
      padding: 0 16px 16px;
    }

    [layout] auth-scene {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0;
    }

    [layout] [auth-char-left] {
      max-width: 320px;
      height: auto;
      pointer-events: none;
    }

    [layout] [auth-char-right] {
      max-width: 128px;
      height: auto;
      pointer-events: none;
      z-index: 1;
      transform: scaleX(-1);
    }

    [layout] auth-form {
      position: relative;
      z-index: 2;
      width: 100%;
      margin-right: -72px;
      margin-left: -96px;
      margin-bottom: 40px;
      padding: 40px 40px 24px;
    }

    [layout] auth-error {
      display: block;
      background: var(--destructive);
      color: white;
      padding: 8px 12px;
      border-radius: var(--radius);
    }

    [layout] [auth-input] {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex: 1;
      min-width: 0;
    }

    [layout] [game-shell] {
      align-items: flex-start;
      min-height: 100vh;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 80px 12px 12px;
      gap: 12px;
    }

    [layout] [game-sidebar] {
      width: 224px;
      flex: none;
      position: sticky;
      top: 12px;
      height: calc(100vh - 24px);
      background: rgba(255, 255, 255, 0.3);
      border-radius: var(--radius);
      border: 1px solid transparent;
      padding: 16px;
      overflow-y: auto;
    }

    [layout] [armory-aside] {
      transition: all 200ms;
    }

    [layout] [game-main] {
      flex: 1;
      min-width: 0;
      height: 100%;
    }

    [layout] game-content-grid {
      display: grid;
      height: 100%;
      width: 100%;
    }

    [layout] content-area {
      background: white;
      border-radius: var(--radius);
      border: 1px solid transparent;
      padding: 16px;
      grid-area: 1/1;
      position: relative;
    }

    [layout] content-inner {
      display: block;
      position: relative;
      width: 100%;
      flex: 1;
    }

    [layout] sticky-bottom {
      display: block;
      position: sticky;
      bottom: 12px;
      width: 100%;
    }

    [layout] page-sticky-bottom {
      display: block;
      margin: 0 calc(-16px - 1px);
      overflow: hidden;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    [layout] [tab-row] {
      grid-area: 1/1;
      height: 28px;
      flex: none;
      margin-top: -28px;
      padding: 0 4px;
    }

    [layout] [tab-link] {
      padding: 2px 8px;
      font-size: 0.8rem;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
      color: var(--muted-foreground);
      text-decoration: none;
    }
  </style>
</game-layout>
