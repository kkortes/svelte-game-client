<game-layout layout>
  <!-- if !socket -->
  <center-full>
    <crow g-2 text-muted><spinner></spinner> Connecting to server</crow>
  </center-full>
  <!-- /if -->

  <!-- if socket && !token -->
  <center-full auth-padding>
    <auth-scene>
      <img src="/static/images/races/troll/male-01.png" alt="" auth-char-left />

      <auth-form glass>
        <!-- if authError -->
        <auth-error text-sm mb-4>
          @[authError]
        </auth-error>
        <!-- /if -->

        <!-- if authMode === 'login' -->
        <form onsubmit="event.preventDefault(); authLogin();">
          <crow g-2 mb-3>
            <input type="email" placeholder="Email" value="@[authEmail]" oninput="$.authEmail = this.value" required auth-input />
            <input type="password" placeholder="Password" value="@[authPassword]" oninput="$.authPassword = this.value" required auth-input />
            <button primary type="submit">Log in</button>
          </crow>
          <crow g-2 mb-2>
            <input type="checkbox" id="codeOfConduct" onchange="$.authCodeOfConduct = this.checked" />
            <label for="codeOfConduct" text-sm>I agree to the <a href="#" onclick="event.preventDefault(); $.overlay = 'CodeOfConduct'">Code of Conduct</a></label>
          </crow>
          <crow g-2 mb-2>
            <input type="checkbox" id="rememberMe" onchange="$.authRememberMe = this.checked" />
            <label for="rememberMe" text-sm>Remember me</label>
          </crow>
          <crow g-2>
            <button tertiary type="button" onclick="$.authMode = 'register'">Register</button>
            <button tertiary type="button" onclick="$.authMode = 'forgot'">Forgot password</button>
          </crow>
        </form>
        <!-- /if -->

        <!-- if authMode === 'register' -->
        <form onsubmit="event.preventDefault(); authRegister();">
          <crow g-2 mb-3>
            <input type="email" placeholder="Email" value="@[authEmail]" oninput="$.authEmail = this.value" required auth-input />
            <input type="password" placeholder="Password" value="@[authPassword]" oninput="$.authPassword = this.value" required auth-input />
            <button primary type="submit">Register</button>
          </crow>
          <p text-sm text-muted>
            Already have an account? <a href="#" onclick="event.preventDefault(); $.authMode = 'login';">Log in</a>
          </p>
        </form>
        <!-- /if -->

        <!-- if authMode === 'forgot' -->
        <form onsubmit="event.preventDefault(); $.authError = 'Password reset email sent (if account exists)'; $.authMode = 'login';">
          <crow g-2 mb-3>
            <input type="email" placeholder="Email" value="@[authEmail]" oninput="$.authEmail = this.value" required auth-input />
            <button primary type="submit">Reset</button>
          </crow>
          <p text-sm text-muted>
            <a href="#" onclick="event.preventDefault(); $.authMode = 'login';">Back to login</a>
          </p>
        </form>
        <!-- /if -->
      </auth-form>

      <img src="/static/images/races/elf/female-01.png" alt="" auth-char-right />
    </auth-scene>
  </center-full>
  <!-- /if -->

  <!-- if token -->
  <crow game-shell>
    <sidebar sm-hide>
      <component src="/components/Sidebar.html"></component>
    </sidebar>

    <crow vertical up game-main>
      <crow up right g-1 tab-row>
        <a href="/" data-tab="" tab-link data-active="@[route ? route.split('/')[1] || '' : '']">Game Guide</a>
        <a href="/the-arena" data-tab="the-arena" tab-link data-active="@[route ? route.split('/')[1] || '' : '']">The Arena</a>
        <a href="/random-duel" data-tab="random-duel" tab-link data-active="@[route ? route.split('/')[1] || '' : '']">Random duel</a>
        <a href="/vendor" data-tab="vendor" tab-link data-active="@[route ? route.split('/')[1] || '' : '']">Vendor</a>
        <a href="/brawlers" data-tab="brawlers" tab-link data-active="@[route ? route.split('/')[1] || '' : '']">Brawlers</a>
      </crow>
      <card content-area>
        <page-content>
          <p text-muted>Loading...</p>
        </page-content>
      </card>
    </crow>

    <!-- if routeParams.characterIndex !== undefined || route === '/vendor' -->
    <sidebar sm-hide armory>
      <component src="/components/Armory.html"></component>
    </sidebar>
    <!-- /if -->
  </crow>
  <!-- /if -->

  <style>
    [layout] center-full {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    [layout] [auth-padding] {
      padding: 0 calc(var(--unit) * 4) calc(var(--unit) * 4);
    }

    [layout] auth-scene {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0;
    }

    [layout] [auth-char-left] {
      max-width: calc(var(--unit) * 80);
      height: auto;
      pointer-events: none;
    }

    [layout] [auth-char-right] {
      max-width: calc(var(--unit) * 32);
      height: auto;
      pointer-events: none;
      z-index: 1;
      transform: scaleX(-1);
    }

    [layout] auth-form {
      position: relative;
      z-index: 2;
      width: 100%;
      margin-right: calc(var(--unit) * -18);
      margin-left: calc(var(--unit) * -24);
      margin-bottom: calc(var(--unit) * 10);
      padding: calc(var(--unit) * 10) calc(var(--unit) * 10) calc(var(--unit) * 6);
    }

    [layout] auth-error {
      display: block;
      background: var(--destructive);
      color: white;
      padding: calc(var(--unit) * 2) calc(var(--unit) * 3);
      border-radius: var(--radius);
    }

    [layout] [auth-input] {
      padding: calc(var(--unit) * 2) calc(var(--unit) * 3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex: 1;
      min-width: 0;
    }

    [layout] [game-shell] {
      align-items: flex-start;
      min-height: 100vh;
      width: 100%;
      max-width: calc(var(--unit) * 320);
      margin: 0 auto;
      padding: calc(var(--unit) * 20) calc(var(--unit) * 3) calc(var(--unit) * 3);
      gap: calc(var(--unit) * 3);
    }

    [layout] sidebar {
      order: 0;
      top: calc(var(--unit) * 3);
      height: calc(100vh - calc(var(--unit) * 6));
      overflow-y: auto;
    }

    [layout] sidebar-content {
      background: rgba(255, 255, 255, 0.3);
      border-radius: var(--radius);
      border: 1px solid transparent;
    }

    [layout] sidebar[armory] {
      order: 1;
      transition: all 200ms;
    }

    [layout] [game-main] {
      flex: 1;
      min-width: 0;
      width: 100%;
    }

    [layout] [content-area] {
      flex: 1;
      width: 100%;
      border-radius: var(--radius);
    }

    [layout] page-content {
      display: block;
      flex: 1;
    }

    [layout] [tab-row] {
      height: calc(var(--unit) * 7);
      flex: none;
      padding: 0 var(--unit);
    }

    [layout] [tab-link] {
      padding: calc(var(--unit) * 0.5) calc(var(--unit) * 2);
      font-size: 0.8rem;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
      color: var(--muted-foreground);
      text-decoration: none;
    }
  </style>
</game-layout>
