<game-layout>
  <!-- if isDev && token -->
  <component src="/components/DevBar.html"></component>
  <!-- /if -->

  <component src="/components/Authorization.html">
    <crow game-shell>
      <component src="/components/Sidebar.html"></component>


      <crow vertical game-main>
        <card content-area p-0>
          <page @[pageName]>
            <slot></slot>
          </page>

          <stay w-full sm:reverse>
            <crow up g-1 tab-row w-full py-3 sm:h="8" overflow-hidden>
              <a href="/" class="button" tertiary="@[pageName !== 'home']"
                primary="@[pageName === 'home']">
                <icon info hide sm:block></icon><span sm:hide>Game Guide</span>
              </a>
              <a href="/the-arena" data-tab="the-arena" class="button"
                tertiary="@[pageName !== 'the-arena']" primary="@[pageName === 'the-arena']">
                <icon damage hide sm:block></icon><span sm:hide>The Arena</span>
              </a>
              <a href="/random-duel" data-tab="random-duel" class="button"
                tertiary="@[pageName !== 'random-duel']" primary="@[pageName === 'random-duel']">
                <icon dice hide sm:block></icon><span sm:hide>Random duel</span>
              </a>
              <a href="/vendor" data-tab="vendor" class="button" tertiary="@[pageName !== 'vendor']"
                primary="@[pageName === 'vendor']">
                <icon coin hide sm:block></icon><span sm:hide>Vendor</span>
              </a>
              <a href="/brawlers" data-tab="brawlers" class="button"
                tertiary="@[pageName !== 'brawlers']" primary="@[pageName === 'brawlers']">
                <icon maxHealth hide sm:block></icon><span sm:hide>Brawlers</span>
              </a>
            </crow>
            <hr sm:order-first />
          </stay>
        </card>


      </crow>


      <!-- <component src="/components/Armory.html"></component> -->

    </crow>
  </component>

  <component src="/components/Combat.html"></component>

  <!-- if overlay === 'GameMenu' -->
  <overlay-backdrop onclick="$.overlay = ''">
    <spacer></spacer>
    <overlay-panel onclick="event.stopPropagation()">
      <component src="/components/GameMenu.html"></component>
    </overlay-panel>
    <spacer></spacer>
  </overlay-backdrop>
  <!-- /if -->

  <component src="/components/CodeOfConduct.html"></component>
  <component src="/components/ReleaseNotes.html"></component>
  <component src="/components/Dialog.html"></component>
  <component src="/components/AccountProgression.html"></component>
  <component src="/components/Tooltip.html"></component>
  <component src="/components/Notifications.html"></component>
  <component src="/components/Topbar.html"></component>

  <style>
    game-layout {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    game-layout center-full {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    game-layout [auth-padding] {
      padding: 0 calc(var(--unit) * 4) calc(var(--unit) * 4);
    }

    game-layout auth-scene {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0;
    }


    game-layout auth-form {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin-bottom: calc(var(--unit) * 10);
      padding: calc(var(--unit) * 10) calc(var(--unit) * 10) calc(var(--unit) * 6);
      border-radius: calc(var(--radius) * 0.75);
    }

    game-layout [auth-input] {
      flex: 1;
      min-width: 0;
    }

    game-layout [game-shell] {
      align-items: flex-start;
      display: flex;
      flex: 1;
      align-self: stretch;
      width: 100%;
      max-width: calc(var(--unit) * 320);
      margin: 0 auto;
      padding: calc(var(--unit) * 3) calc(var(--unit) * 3) calc(var(--unit) * 0) calc(var(--unit) * 3);
      gap: calc(var(--unit) * 3);
    }

    game-layout sidebar-content {
      background: rgba(255, 255, 255, 0.3);
      border-radius: calc(var(--radius) * 0.5);
    }

    game-layout sidebar[armory] {
      order: 1;
      transition: opacity 200ms, transform 200ms;
      opacity: 0;
      transform: translateX(calc(var(--unit) * 4));
      pointer-events: none;
    }

    game-layout sidebar[armory][data-visible="true"] {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    game-layout [game-main] {
      flex: 1;
      min-width: 0;
      width: 100%;
      align-self: stretch;
    }

    game-layout [content-area] {
      flex: 1;
      width: 100%;
      border-radius: calc(var(--radius) * 0);
      box-shadow: none;
      border-top-left-radius: calc(var(--radius) * 1);
      border-top-right-radius: calc(var(--radius) * 1);
    }

    game-layout [tab-row] {
      background: #ffffff;
      border-top-left-radius: calc(var(--radius) * 1);
      border-top-right-radius: calc(var(--radius) * 1);
    }

    [battle-brawlers] overlay-backdrop {
      z-index: 1;
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: calc(var(--unit) * 20) 1fr calc(var(--unit) * 20);
      place-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
      box-shadow: inset 0 0 10vw rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(1px);
      transform: scale(1.05);
      animation: overlayIn 200ms ease-out 75ms both;
    }

    [battle-brawlers] dialog-backdrop {
      animation: overlayIn 150ms ease-out both;
    }

    @keyframes overlayIn {
      from {
        opacity: 0;
        transform: scale(1);
      }
    }

    combat-panel,
    combat-arena,
    combatant-slot,
    combatant-card,
    combatant-sprite,
    combatant-statuses,
    combat-result,
    combat-rewards,
    combat-floater,
    hp-track,
    hp-fill,
    armor-track,
    armor-fill,
    progress-track,
    progress-fill,
    game-frame,
    menu-label,
    dialog-backdrop,
    progression-panel,
    progression-scroll,
    progression-rewards,
    tooltip-layer,
    tooltip-stats,
    spacer {
      display: block;
    }

    [battle-brawlers] overlay-panel {
      display: block;
      position: relative;
      max-width: calc(var(--unit) * 175);
      min-width: calc(var(--unit) * 80);
      width: calc(100% - var(--unit) * 24);
      max-height: 90vh;
      overflow-y: auto;
      text-align: left;
      overflow-x: hidden;
    }

    [battle-brawlers] game-frame {
      border: calc(var(--unit) * 0.75) solid;
      border-image-source: url('/static/images/ui/frame.png');
      border-image-slice: 3;
      border-image-repeat: repeat;
      background: var(--popover);
      box-shadow: inset 0 0 100px rgb(0 0 0 / 80%);
      color: rgb(156, 163, 175);
    }


    [battle-brawlers] menu-label {
      width: calc(var(--unit) * 40);
      flex: none;
    }

    [battle-brawlers] [menu-divider] {
      border: 0;
      height: calc(var(--unit) * 0.25);
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2), transparent);
      margin: var(--unit) 0;
      width: 100%;
    }

    [battle-brawlers] [game-frame-title] {
      position: relative;
      margin: calc(var(--unit) * -0.75) 0 0 0;
      padding: 0 calc(var(--unit) * 2);
      height: calc(var(--unit) * 8.25);
      background-image: url('/static/images/ui/frame-header.jpg');
      background-position: left calc(var(--unit) * 0.5);
      background-repeat: repeat-x;
      font-family: var(--font-heading);
      color: rgb(156, 163, 175);
    }

    [battle-brawlers] [stretch] {
      align-items: stretch;
    }

    [battle-brawlers] [range-input] {
      width: 60%;
    }
  </style>
</game-layout>
