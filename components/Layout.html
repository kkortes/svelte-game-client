<game-layout>
  <component src="/components/AuthGate.html">
    <crow game-shell>
      <crow vertical game-main>
        <card content-area p="0">
          <page @[page.name]>
            <slot></slot>
          </page>

          <stay w="full" sm:reverse tab-bar t="8.5">
            <crow up sm:g="0" g="1" tab-row w="full" py="3" sm:h="8" overflow-hidden sm:p="0">
              <a href="/" sm:px="6" class="button" tertiary="@[!page.name.startsWith('home')]"
                primary="@[page.name.startsWith('home')]">
                <icon info hide sm:block></icon><span sm:hide>Game Guide</span>
              </a>
              <a href="/the-arena" sm:px="6" class="button"
                tertiary="@[!page.name.startsWith('the-arena')]"
                primary="@[page.name.startsWith('the-arena')]">
                <icon damage hide sm:block></icon><span sm:hide>The Arena</span>
              </a>
              <a href="/random-duel" sm:px="6" class="button"
                tertiary="@[!page.name.startsWith('random-duel')]"
                primary="@[page.name.startsWith('random-duel')]">
                <icon dice hide sm:block></icon><span sm:hide>Random duel</span>
              </a>
              <a href="/vendor" sm:px="6" class="button"
                tertiary="@[!page.name.startsWith('vendor')]"
                primary="@[page.name.startsWith('vendor')]">
                <icon coin hide sm:block></icon><span sm:hide>Vendor</span>
              </a>
              <a href="/brawlers" sm:px="6" class="button"
                tertiary="@[!page.name.startsWith('brawlers')]"
                primary="@[page.name.startsWith('brawlers')]">
                <icon maxHealth hide sm:block></icon><span sm:hide>Brawlers</span>
              </a>
            </crow>
            <hr sm:order-first />
          </stay>
        </card>
      </crow>

      <component src="/components/Sidebar.html"></component>


      <!-- <component src="/components/Armory.html"></component> -->

    </crow>
  </component>

  <component src="/components/Overlay.html"></component>
  <component src="/components/remote/Tooltip.html">
    <component src="/components/tooltip/Display.html"></component>
  </component>
  <component src="/components/remote/Notifications.html"></component>
  <component src="/components/Topbar.html"></component>
  <component src="/components/Keystrokes.html"></component>

  <!-- if window.isDev -->
  <component src="/components/StateInspector.html"></component>
  <!-- /if -->

  <style>
    game-layout {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    game-layout center-full {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    game-layout [auth-padding] {
      padding: 0 calc(calc(var(--unit) * 4)) calc(calc(var(--unit) * 4));
    }

    game-layout auth-scene {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0;
    }


    game-layout auth-form {
      position: relative;
      width: 100%;
      max-width: calc(calc(var(--unit) * 150));
      margin-bottom: calc(calc(var(--unit) * 10));
      padding: calc(calc(var(--unit) * 10)) calc(calc(var(--unit) * 10)) calc(calc(var(--unit) * 6));
      border-radius: calc(var(--radius) * 0.75);
    }

    game-layout [auth-input] {
      flex: 1;
      min-width: 0;
    }

    game-layout [game-shell] {
      align-items: flex-start;
      display: flex;
      flex: 1;
      align-self: stretch;
      width: 100%;
      max-width: calc(calc(var(--unit) * 320));
      margin: 0 auto;
      padding: calc(calc(var(--unit) * 3)) calc(calc(var(--unit) * 3)) calc(calc(var(--unit) * 0)) calc(calc(var(--unit) * 3));
      gap: calc(calc(var(--unit) * 3));
    }

    @layer elements {
      sidebar-content {
        background-color: rgba(255, 255, 255, 0.3);
        border-radius: var(--radius);
        color: var(--muted-foreground);
        min-height: calc(100vh - calc(var(--unit) * 15));
      }

      [dark] sidebar-content {
        background-color: var(--card);
      }
    }

    game-layout sidebar[armory] {
      order: 1;
      transition: opacity 200ms, transform 200ms;
      opacity: 0;
      transform: translateX(calc(calc(var(--unit) * 4)));
      pointer-events: none;
    }

    game-layout sidebar[armory][visible] {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    game-layout [game-main] {
      flex: 1;
      min-width: 0;
      width: 100%;
      align-self: stretch;
    }

    game-layout [content-area] {
      flex: 1;
      width: 100%;
      border-radius: calc(var(--radius) * 0);
      box-shadow: none;
      border-top-left-radius: calc(var(--radius) * 1);
      border-top-right-radius: calc(var(--radius) * 1);
    }

    game-layout [tab-bar] {
      background: var(--background);
      border-top-left-radius: calc(var(--radius) * 1);
      border-top-right-radius: calc(var(--radius) * 1);
    }

    overlay-backdrop {
      z-index: 1;
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: calc(calc(var(--unit) * 20)) 1fr calc(calc(var(--unit) * 20));
      place-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
      box-shadow: inset 0 0 10vw rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(1px);
      transform: scale(1.05);
      animation: overlayIn 200ms ease-out 75ms both;
    }

    dialog-backdrop {
      animation: overlayIn 150ms ease-out both;
    }

    combat-panel,
    combat-arena,
    combatant-slot,
    combatant-card,
    combatant-sprite,
    combatant-statuses,
    combat-result,
    combat-rewards,
    combat-floater,
    progress-track,
    progress-fill,
    game-frame,
    menu-label,
    dialog-backdrop,
    progression-panel,
    progression-scroll,
    progression-rewards,
    tooltip-layer,
    tooltip-stats,
    combat-status {
      display: block;
    }

    overlay-panel {
      display: block;
      position: relative;
      max-width: calc(calc(var(--unit) * 175));
      min-width: min(calc(calc(var(--unit) * 80)), 100%);
      width: calc(100% - calc(var(--unit) * 24));
      max-height: 90vh;
      overflow-y: auto;
      text-align: left;
      overflow-x: hidden;
    }

    game-frame {
      border: calc(calc(var(--unit) * 0.75)) solid;
      border-image-source: url('/static/images/ui/frame.png');
      border-image-slice: 3;
      border-image-repeat: repeat;
      background: var(--popover);
      box-shadow: inset 0 0 calc(calc(var(--unit) * 25)) rgb(0 0 0 / 80%);
      color: rgb(156, 163, 175);
    }


    menu-label {
      width: min(calc(calc(var(--unit) * 40)), 50%);
      flex: none;
    }

    [menu-divider] {
      border: 0;
      height: calc(calc(var(--unit) * 0.25));
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2), transparent);
      margin: calc(calc(var(--unit) * 1)) 0;
      width: 100%;
    }

    [game-frame-title] {
      position: relative;
      margin: calc(calc(var(--unit) * -0.75)) 0 0 0;
      padding: 0 calc(calc(var(--unit) * 2));
      height: calc(calc(var(--unit) * 8.25));
      background-image: url('/static/images/ui/frame-header.jpg');
      background-position: left calc(calc(var(--unit) * 0.5));
      background-repeat: repeat-x;
      font-family: var(--font-heading);
      color: rgb(156, 163, 175);
    }

    [stretch] {
      align-items: stretch;
    }

    [range-input] {
      width: 60%;
    }
  </style>
</game-layout>
