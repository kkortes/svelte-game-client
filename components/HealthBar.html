<health-bar relative block w="full" left="@[card.facingRight]">
  <component src="/components/Bar.html" center color="green"
    current="@[Math.max(0, card.currentHealth)]"
    max="@[card.maxHealth]"></component>
  <!-- if card.maxArmor > 0 -->
  <component src="/components/Bar.html" center color="blue"
    current="@[Math.max(0, card.currentArmor)]"
    max="@[card.maxArmor]"></component>
  <!-- /if -->

  <!-- each card.floaters as f -->
  <hp-floater absolute @[f.vfxName] crit="@[f.isCritical]"
    style="--rnd: @[f.random]; --dir: @[f.dir]; --y-offset: @[f.vfxName === 'armorHurt' ? '160px' : '0px']; --scale: @[f.isCritical ? 2 : 1];">
    <hp-floater-x>
      <hp-floater-y>
        <!-- if f.vfxName === 'heal' -->+@[f.amount]<!-- /if -->
        <!-- if f.vfxName !== 'heal' -->@[f.amount]<!-- /if -->
      </hp-floater-y>
    </hp-floater-x>
  </hp-floater>
  <!-- /each -->
</health-bar>

<style>
  hp-floater {
    top: calc(calc(var(--unit) * 1));
    left: 100%;
    font-family: var(--font-display, sans-serif);
    font-weight: 800;
    pointer-events: none;
    color: var(--floater-default);
    opacity: 0;
    animation: hp-floater-fade 1000ms ease-in forwards;
    white-space: nowrap;
  }

  health-bar[left] hp-floater {
    left: auto;
    right: 100%;
  }

  hp-floater[armorHurt] {
    color: var(--white);
  }

  hp-floater[heal] {
    color: var(--floater-heal);
    animation: hp-floater-heal-fade 800ms ease-out forwards;
  }

  hp-floater-x {
    display: inline-block;
    animation: hp-floater-x 200ms ease-in forwards;
  }

  hp-floater-y {
    display: inline-block;
    animation: hp-floater-y 1000ms linear forwards;
  }

  hp-floater[heal] hp-floater-y {
    animation: hp-floater-heal-y 800ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
  }
</style>
