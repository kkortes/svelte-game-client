<health-bar relative block w-full left="@[combatCards[idx].facingRight]">
  <component src="/components/Bar.html" center color="green"
    current="@[Math.max(0, combatCards[idx].currentHealth)]"
    max="@[combatCards[idx].maxHealth]"></component>
  <!-- if combatCards[idx].maxArmor > 0 -->
  <component src="/components/Bar.html" center color="blue"
    current="@[Math.max(0, combatCards[idx].currentArmor)]"
    max="@[combatCards[idx].maxArmor]"></component>
  <!-- /if -->

  <!-- each combatCards[idx].floaters as f -->
  <hp-floater data-type="@[f.vfxName]" crit="@[f.isCritical]"
    style="--rnd: @[f.random]; --dir: @[f.dir]; --y-offset: @[f.vfxName === 'armorHurt' ? '160px' : '0px']; --scale: @[f.isCritical ? 2 : 1];">
    <hp-floater-x>
      <hp-floater-y>
        <!-- if f.vfxName === 'heal' -->+@[f.amount]<!-- /if -->
        <!-- if f.vfxName !== 'heal' -->@[f.amount]<!-- /if -->
      </hp-floater-y>
    </hp-floater-x>
  </hp-floater>
  <!-- /each -->
</health-bar>

<style>
  [battle-brawlers] hp-floater {
    position: absolute;
    top: 4px;
    left: 100%;
    font-family: var(--font-display, sans-serif);
    font-weight: 800;
    pointer-events: none;
    color: #fecaca;
    opacity: 0;
    animation: hp-floater-fade 1000ms ease-in forwards;
    white-space: nowrap;
  }

  [battle-brawlers] health-bar[left] hp-floater {
    left: auto;
    right: 100%;
  }

  [battle-brawlers] hp-floater[data-type="armorHurt"] {
    color: white;
  }

  [battle-brawlers] hp-floater[data-type="heal"] {
    color: #bbf7d0;
    animation: hp-floater-heal-fade 800ms ease-out forwards;
  }

  [battle-brawlers] hp-floater-x {
    display: inline-block;
    animation: hp-floater-x 200ms ease-in forwards;
  }

  [battle-brawlers] hp-floater-y {
    display: inline-block;
    animation: hp-floater-y 1000ms linear forwards;
  }

  [battle-brawlers] hp-floater[data-type="heal"] hp-floater-y {
    animation: hp-floater-heal-y 800ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
  }

  @keyframes hp-floater-fade {
    0% { opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }

  @keyframes hp-floater-heal-fade {
    0% { opacity: 1; }
    50% { opacity: 1; }
    100% { opacity: 0; }
  }

  @keyframes hp-floater-x {
    0% {
      transform: translateY(var(--y-offset, 0)) translateX(calc(var(--dir, 1) * -15px)) scale(calc(var(--scale, 1) * 3));
    }
    100% {
      transform: translateY(var(--y-offset, 0)) translateX(calc(var(--dir, 1) * (5px + var(--rnd, 0.5) * 25px))) scale(calc(0.6 + 0.4 * var(--scale, 1)));
    }
  }

  @keyframes hp-floater-y {
    0% { transform: translateY(0); }
    100% { transform: translateY(-40px); }
  }

  @keyframes hp-floater-heal-y {
    0% { transform: translateY(0); }
    100% { transform: translateY(-20px); }
  }
</style>
