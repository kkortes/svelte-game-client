<script type="module">
  import component from '/node_modules/@ape-egg/vibe/component.js';
  component({});

  const TTL = 3000;
  const LEAVE_FALLBACK = 500;
  let nextId = 0;
  const leaving = new Set();
  const timers = new Map();
  let paused = false;

  const removeFromState = (id) => {
    if (!Array.isArray($.notifications)) return;
    $.notifications = $.notifications.filter((n) => n._nid !== id);
  };

  const scheduleLeave = (id, ms) => {
    const startedAt = Date.now();
    const handle = setTimeout(() => {
      timers.delete(id);
      beginLeave(id);
    }, ms);
    timers.set(id, { handle, remaining: ms, startedAt });
  };

  const beginLeave = (id) => {
    if (leaving.has(id)) return;
    const t = timers.get(id);
    if (t) {
      clearTimeout(t.handle);
      timers.delete(id);
    }
    leaving.add(id);
    const card = document.querySelector(`notification-card[data-nid="${id}"]`);
    if (!card) {
      leaving.delete(id);
      removeFromState(id);
      return;
    }
    let done = false;
    const finalize = () => {
      if (done) return;
      done = true;
      leaving.delete(id);
      removeFromState(id);
    };
    card.addEventListener('animationend', finalize, { once: true });
    setTimeout(finalize, LEAVE_FALLBACK);
    card.setAttribute('leaving', '');
  };

  window.notify = (payload) => {
    if (!payload) return;
    const { error, warning, success, info } = payload;
    const message = error || warning || success || info;
    if (!message) return;

    if (!Array.isArray($.notifications)) $.notifications = [];
    if ($.notifications.find((n) => n.message === message)) return;

    const type = error ? 'error' : warning ? 'warning' : success ? 'success' : 'info';
    const id = ++nextId;
    $.notifications = [...$.notifications, { type, message, _nid: id }];
    if (paused) {
      timers.set(id, { handle: null, remaining: TTL, startedAt: Date.now() });
    } else {
      scheduleLeave(id, TTL);
    }
    return id;
  };

  window.dismissNotification = beginLeave;

  window.dismissAllNotifications = () => {
    for (const n of $.notifications || []) beginLeave(n._nid);
  };

  window.pauseNotifTimers = () => {
    if (paused) return;
    paused = true;
    for (const [id, t] of timers) {
      if (!t.handle) continue;
      clearTimeout(t.handle);
      const elapsed = Date.now() - t.startedAt;
      t.remaining = Math.max(0, t.remaining - elapsed);
      t.handle = null;
    }
  };

  window.resumeNotifTimers = () => {
    if (!paused) return;
    paused = false;
    for (const [id, t] of timers) {
      if (t.handle) continue;
      scheduleLeave(id, t.remaining);
    }
  };
</script>

<notification-stack onmouseenter="pauseNotifTimers()" onmouseleave="resumeNotifTimers()">
  <!-- each notifications as notification (notification._nid) -->
  <notification-card type="@[notification.type]" data-nid="@[notification._nid]">
    <notification-row>
      <notification-icon type="@[notification.type]"></notification-icon>
      <notification-body>
        <!-- if notification.type === 'error' -->
        <strong notification-title>Ops, something went wrong!</strong>
        <!-- /if -->
        <!-- if notification.type === 'info' -->
        <strong notification-title>Did you know?</strong>
        <!-- /if -->
        <!-- if notification.type === 'success' -->
        <strong notification-title>Good news</strong>
        <!-- /if -->
        <!-- if notification.type === 'warning' -->
        <strong notification-title>Heads up</strong>
        <!-- /if -->
        <notification-message>@[notification.message]</notification-message>
      </notification-body>
    </notification-row>
  </notification-card>
  <!-- /each -->
</notification-stack>
