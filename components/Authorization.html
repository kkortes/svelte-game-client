<script type="module">
  import config from '/js/config.js';
  import { notify } from '/js/actions.js';

  // Auth form fields — only seeded when login form is visible.
  // MPA handles cleanup: next navigation is a fresh page load.
  if (!$.token) {
    $.authMode = 'login';
    $.authEmail = config.IS_DEV ? config.AUTO_EMAIL : '';
    $.authPassword = config.IS_DEV ? config.AUTO_PASSWORD : '';
    $.authRememberMe = config.IS_DEV;
    $.authCodeOfConduct = config.IS_DEV;
    $.authError = '';
  }

  window.loadGameState = async (token) => {
    try {
      const { gameState, serverTimestampSnapshot } = await $.socket.sendAsync('user/authenticate', {
        token, clientVersion: '0.1.0', isDev: config.IS_DEV
      });
      if (gameState) {
        if (gameState.characters) $.characters = gameState.characters;
        if (gameState.inventory) $.inventory = gameState.inventory;
        if (gameState.experience) $.experience = gameState.experience;
        if (gameState.coins !== undefined) $.coins = gameState.coins;
        if (gameState.accountRewards) $.accountRewards = gameState.accountRewards;
      }
      if (serverTimestampSnapshot) {
        $.serverTimestampSnapshot = serverTimestampSnapshot;
        $.syncPerformanceNow = performance.now();
      }
    } catch (e) {
      notify(e);
      $.token = undefined;
    }
  };
</script>

<component src="/components/Modal.html" when="@[!socket]" dismiss="">
  <card auth-form glass>
    <crow g-2 text-muted>
      <spinner></spinner> Connecting to server
    </crow>
  </card>
</component>

<!-- if socket && !token -->
<center-full auth-padding>
  <auth-scene w-full>
    <card auth-form glass>
      <!-- if authMode === 'login' -->
      <component src="/components/Login.html"></component>
      <!-- /if -->

      <!-- if authMode === 'register' -->
      <component src="/components/Register.html"></component>
      <!-- /if -->

      <!-- if authMode === 'forgot' -->
      <component src="/components/ForgotPassword.html"></component>
      <!-- /if -->

      <crow g-2 mt="4">
        <!-- if authMode !== 'login' -->
        <button secondary type="button" onclick="$.authMode = 'login'">
          Login
        </button>
        <!-- /if -->
        <!-- if authMode !== 'register' -->
        <button secondary type="button" onclick="$.authMode = 'register'">
          Register
        </button>
        <!-- /if -->
        <!-- if authMode !== 'forgot' -->
        <button secondary type="button" onclick="$.authMode = 'forgot'">
          Forgot password
        </button>
        <!-- /if -->
      </crow>
    </card>
  </auth-scene>
</center-full>
<!-- /if -->

<!-- if token -->
<slot></slot>
<!-- /if -->
