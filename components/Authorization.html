<script type="module">
  import config from '/js/config.js';
  import { notify } from '/js/actions.js';


  component({
    mode: 'login',
    email: config.IS_DEV ? config.AUTO_EMAIL : ($.settings.rememberMe ? $.settings.savedEmail : ''),
    password: config.IS_DEV ? config.AUTO_PASSWORD : ($.settings.rememberMe ? $.settings.savedPassword : ''),
  });


  window.loadGameState = async (token) => {
    try {
      const { gameState, serverTimestampSnapshot } = await $.socket.sendAsync('user/authenticate', {
        token, clientVersion: '0.1.0', isDev: config.IS_DEV
      });
      if (gameState) {
        if (gameState.characters) $.characters = gameState.characters;
        if (gameState.inventory) $.inventory = gameState.inventory;
        if (gameState.experience) $.experience = gameState.experience;
        if (gameState.coins !== undefined) $.coins = gameState.coins;
        if (gameState.accountRewards) $.accountRewards = gameState.accountRewards;
      }
      if (serverTimestampSnapshot) {
        $.serverTimestampSnapshot = serverTimestampSnapshot;
        $.syncPerformanceNow = performance.now();
      }
    } catch (e) {
      notify(e);
      $.token = undefined;
    }
  };
</script>

<component src="/components/Modal.html" when="@[!socket]" dismiss="">
  <card auth-form glass>
    <crow g-2 text-muted>
      <spinner></spinner> Connecting to server
    </crow>
  </card>
</component>

<!-- if socket && !token -->
<center-full auth-padding>
  <auth-scene w-full>
    <card auth-form glass>
      <!-- if this.mode === 'login' -->
      <component src="/components/Login.html" email="@[this.email]" password="@[this.password]"></component>
      <!-- /if -->

      <!-- if this.mode === 'register' -->
      <component src="/components/Register.html" email="@[this.email]" password="@[this.password]"
        mode="@[this.mode]"></component>
      <!-- /if -->

      <!-- if this.mode === 'forgot' -->
      <component src="/components/ForgotPassword.html" email="@[this.email]" mode="@[this.mode]">
      </component>
      <!-- /if -->

      <crow g-2 mt="4">
        <!-- if this.mode !== 'login' -->
        <button secondary type="button" onclick="$.this.mode = 'login'">
          Login
        </button>
        <!-- /if -->
        <!-- if this.mode !== 'register' -->
        <button secondary type="button" onclick="$.this.mode = 'register'">
          Register
        </button>
        <!-- /if -->
        <!-- if this.mode !== 'forgot' -->
        <button secondary type="button" onclick="$.this.mode = 'forgot'">
          Forgot password
        </button>
        <!-- /if -->
      </crow>
    </card>
  </auth-scene>
</center-full>
<!-- /if -->

<!-- if token -->
<slot></slot>
<!-- /if -->
