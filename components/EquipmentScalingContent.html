<script type="module">
  import EQUIPMENT, { ALL_EQUIPMENT } from '/js/constants/EQUIPMENT.js';

  const state = {
    equipChoices: Object.keys(ALL_EQUIPMENT),
    chosenEquip: 'sword',
    equipPool: [],
  };

  const compute = (chosen) =>
    Array.from({ length: 13 }, (_, i) => {
      const ref =
        i === 0 ? EQUIPMENT(chosen) : EQUIPMENT(chosen, false, { overrides: { level: i } });
      const hydrated = EQUIPMENT(ref, true);
      return {
        id: chosen,
        label: i === 0 ? 'base' : `level ${i}`,
        name: hydrated.name,
        level: hydrated.level || 0,
      };
    });

  state.equipPool = compute(state.chosenEquip);
  component(state);

  const id = Object.keys(window.__vibeComponents).find((k) => window.__vibeComponents[k] === state);
  const s = $[id];

  window.changeEquip = (value) => {
    s.chosenEquip = value;
    compute(value).forEach((eq, i) => Object.assign(s.equipPool[i], eq));
  };
</script>

<crow vertical g="4" left>
  <component src="/components/TitleBar.html" title="Equipment Scaling"></component>
  <hr />

  <label>
    <select onchange="changeEquip(this.value)">
      <!-- each this.equipChoices as choice -->
      <option value="@[choice]" selected="@[choice === this.chosenEquip]">@[choice]</option>
      <!-- /each -->
    </select>
  </label>

  <crow vertical left g="2" w="full">
    <!-- each this.equipPool as eq -->
    <crow left g="2">
      <span>@[eq.label]</span>
      <eq-tooltip-target onmouseenter="showEquipmentTooltip(this, '@[eq.id]', @[eq.level])">
        <component src="/components/EquipmentLink.html" level="@[eq.level]" name="@[eq.name]">
        </component>
      </eq-tooltip-target>
    </crow>
    <!-- /each -->
  </crow>
</crow>
