<!-- if combatEnded(combat, elapsedMilliseconds) -->
<result-announcement absolute onclick="event.stopPropagation()">
  <result-panel flex down g="3" p="4">
    <component src="/components/VictoryOrLoss.html" outcome="@[combatOutcome(combat)]"></component>

    <!-- if combatOutcome(combat) === 'victory' -->
    <rewards-panel flex down g="2" p="3" w="full">
      <rewards-title>rewards</rewards-title>
      <hr />
      <rewards-list flex down g="1">
        <!-- if combatRewardXp(combat) -->
        <reward-row>+@[combatRewardXp(combat)] XP</reward-row>
        <!-- /if -->
        <!-- if combatRewardBoss(combat, bossHighscore) -->
        <reward-row boss>Boss defeated!</reward-row>
        <!-- /if -->
      </rewards-list>
      <hr />
      <result-actions flex mt="1">
        <button golden-btn onclick="claimCombatReward()">claim</button>
      </result-actions>
    </rewards-panel>
    <!-- /if -->

    <!-- if combatOutcome(combat) !== 'victory' -->
    <result-actions flex>
      <button tertiary onclick="closeCombatOverlay()">Go back</button>
    </result-actions>
    <!-- /if -->
  </result-panel>
</result-announcement>
<!-- /if -->

<style>
  result-announcement {
    inset: 0;
    display: grid;
    place-items: center;
    z-index: 100;
    animation: result-in 500ms cubic-bezier(0.34, 1.56, 0.64, 1) 500ms both;
  }

  result-panel {
    flex-direction: column;
    height: auto;
    align-items: center;
    min-width: calc(calc(var(--unit) * 70));
    text-align: center;
  }

  rewards-panel {
    flex-direction: column;
    height: auto;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(calc(calc(var(--unit) * 2)));
    border-radius: var(--radius);
    box-shadow: 0 calc(calc(var(--unit) * 1)) calc(calc(var(--unit) * 6)) rgba(0, 0, 0, 0.3);
    align-items: stretch;
  }

  rewards-title {
    font-family: var(--font-heading, serif);
    font-size: calc(calc(var(--unit) * 6));
    color: white;
    text-align: center;
  }

  rewards-list {
    align-items: center;
    color: white;
  }

  reward-row {
    font-weight: 600;
  }

  reward-row[boss] {
    color: oklch(0.75 0.18 70);
  }

  result-actions {
    justify-content: center;
  }

  [golden-btn] {
    all: unset;
    cursor: pointer;
    font-family: var(--font-heading, serif);
    font-size: calc(calc(var(--unit) * 4));
    padding: calc(calc(var(--unit) * 1)) calc(calc(var(--unit) * 4));
    border: 1px solid var(--gold-border);
    border-radius: var(--radius);
    color: white;
    overflow: hidden;
    background:
      radial-gradient(ellipse farthest-corner at right bottom, var(--gold-highlight) 0%, var(--gold-warm) 8%, var(--gold-deep) 30%, var(--gold-shadow) 40%, transparent 80%),
      radial-gradient(ellipse farthest-corner at left top, var(--white) 0%, var(--gold-pale) 8%, var(--gold-soft) 25%, var(--gold-bronze) 62.5%, var(--gold-bronze) 100%);
  }
</style>
