<script type="module">
  const local = { rewardsShown: 0 };
  component(local);
  const id = Object.keys(window.__vibeComponents).find((k) => window.__vibeComponents[k] === local);
  const s = $[id];

  let intervalId = null;
  const tickRewards = () => {
    s.rewardsShown += 1;
    if (s.rewardsShown > 10) {
      clearInterval(intervalId);
      intervalId = null;
    }
  };

  let stingerPlayedFor = null;
  $.on('afterUpdate', (current, prev) => {
    const ended =
      current.combat?.duration > 0 && current.elapsedMilliseconds >= current.combat.duration;
    if (ended && stingerPlayedFor !== current.combat) {
      stingerPlayedFor = current.combat;
      s.rewardsShown = 0;
      clearInterval(intervalId);
      intervalId = setInterval(tickRewards, 500);
      const stinger =
        window.combatOutcome(current.combat) === 'victory'
          ? 'Victory Stinger 1'
          : 'Stinger - Ominous Timpani';
      try {
        new window.Howl({
          src: [window.AUDIO[stinger]],
          volume: (current.settings?.volume?.sfx ?? 1) * (current.settings?.volume?.master ?? 0.5),
        }).play();
      } catch {}
    }
    if (!ended) {
      stingerPlayedFor = null;
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
        s.rewardsShown = 0;
      }
    }
  });
</script>

<!-- if combatEnded(combat, elapsedMilliseconds) -->
<result-announcement absolute onclick="event.stopPropagation()">
  <result-panel flex down g="3" p="4">
    <component src="/components/VictoryOrLoss.html" outcome="@[combatOutcome(combat)]"></component>

    <!-- if combatOutcome(combat) === 'victory' -->
    <rewards-panel vertical up g="2" p="3" w="full" pending="@[this.rewardsShown <= 2]">
      <rewards-title>rewards</rewards-title>
      <hr />
      <rewards-list vertical up g="1">
        <!-- if combatRewardXp(combat) -->
        <reward-row pending="@[this.rewardsShown <= 3]">
          <!-- if this.rewardsShown > 3 -->+@[combatRewardXp(combat)] XP<!-- /if -->
          <!-- if this.rewardsShown <= 3 --><icon stunned animate-spin></icon
          ><!-- /if -->
        </reward-row>
        <!-- /if -->
        <!-- if combatRewardBoss(combat, bossHighscore) -->
        <reward-row boss pending="@[this.rewardsShown <= 4]">
          <!-- if this.rewardsShown > 4 -->Boss defeated!<!-- /if -->
          <!-- if this.rewardsShown <= 4 --><icon stunned animate-spin></icon
          ><!-- /if -->
        </reward-row>
        <!-- /if -->
      </rewards-list>
      <hr />
      <result-actions flex mt="1">
        <button golden-btn onclick="claimCombatReward()">claim</button>
      </result-actions>
    </rewards-panel>
    <!-- /if -->

    <!-- if combatOutcome(combat) !== 'victory' -->
    <result-actions flex pending="@[this.rewardsShown <= 2]">
      <button secondary onclick="closeCombatOverlay()">Go back</button>
    </result-actions>
    <!-- /if -->
  </result-panel>
</result-announcement>
<!-- /if -->
