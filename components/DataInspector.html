<script type="module">
  const getValueType = (val) => {
    if (val === null || val === undefined || typeof val !== 'object') return 0;
    if (Array.isArray(val)) return 1;
    return 2;
  };

  const sortEntries = (entries) =>
    entries.sort(([aKey, aVal], [bKey, bVal]) => {
      const aType = getValueType(aVal);
      const bType = getValueType(bVal);
      if (aType !== bType) return aType - bType;
      return aKey.localeCompare(bKey);
    });

  const sortData = (value) => {
    if (value === null || value === undefined) return value;
    if (typeof value !== 'object') return value;
    if (Array.isArray(value)) return value.map((item) => sortData(item));
    const sorted = {};
    sortEntries(Object.entries(value)).forEach(([key, val]) => {
      sorted[key] = sortData(val);
    });
    return sorted;
  };

  const renderValue = (value, indent, seen, isRoot = false) => {
    if (value === null) return 'null';
    if (value === undefined) return 'undefined';
    if (typeof value === 'function') return '[Function]';
    if (typeof value !== 'object') return String(value);
    if (seen.has(value)) return '[Circular]';
    seen.add(value);

    if (Array.isArray(value)) {
      if (value.length === 0) return '';
      let result = '';
      value.forEach((item, index) => {
        const nextIndent = isRoot ? indent : indent + 1;
        const itemIndent = ' '.repeat(nextIndent);
        if (typeof item === 'object' && item !== null) {
          const itemCount = Array.isArray(item) ? `[${item.length}]` : `{${Object.keys(item).length}}`;
          const rendered = renderValue(item, nextIndent + 1, seen);
          result += `${itemIndent}#${index + 1}~${itemCount}\n`;
          if (rendered) result += `${rendered}\n`;
        } else {
          const rendered = renderValue(item, nextIndent, seen);
          result += `${itemIndent}#${index + 1}~${rendered}\n`;
        }
      });
      return result.trimEnd();
    }

    const entries = sortEntries(Object.entries(value));
    if (entries.length === 0) return '';
    let result = '';
    entries.forEach(([key, val]) => {
      const nextIndent = isRoot ? indent : indent + 1;
      const keyIndent = ' '.repeat(nextIndent);
      if (typeof val === 'object' && val !== null) {
        if (seen.has(val)) {
          result += `${keyIndent}${key}~[Circular]\n`;
        } else {
          const valCount = Array.isArray(val) ? `[${val.length}]` : `{${Object.keys(val).length}}`;
          const rendered = renderValue(val, nextIndent + 1, seen);
          result += `${keyIndent}${key}~${valCount}\n`;
          if (rendered) result += `${rendered}\n`;
        }
      } else {
        const rendered = renderValue(val, nextIndent, seen);
        result += `${keyIndent}${key}~${rendered}\n`;
      }
    });
    return result.trimEnd();
  };

  const BRACKET_REGEX = /[\[\{].*?[\]\}]/;

  const computeLines = (data) => {
    try {
      if (data === null || data === undefined) return [{ raw: true, text: String(data), odd: false }];
      if (typeof data !== 'object') return [{ raw: true, text: String(data), odd: false }];
      const formatted = renderValue(data, 0, new WeakSet(), true).trim();
      return formatted.split('\n').map((line, i) => {
        const even = i % 2 === 0;
        const match = line.match(/^(\s*)(.+?)~(.*)$/);
        // Stable `id` by position so the iteration diff hits UPDATE instead
        // of REMOVE + ADD when a value changes.
        if (match) {
          const [, indent, key, value] = match;
          return { id: i, raw: false, depth: indent.length, key, value, isBracket: BRACKET_REGEX.test(value), even };
        }
        return { id: i, raw: true, text: line, even };
      });
    } catch (e) {
      return [{ id: 0, raw: true, text: `Error: ${e.message || e}`, even: false }];
    }
  };

  const countItems = (val) => {
    if (val === null || val === undefined || typeof val !== 'object') return 1;
    if (Array.isArray(val)) return val.reduce((n, v) => n + countItems(v), 0);
    return Object.values(val).reduce((n, v) => n + countItems(v), 0);
  };

  if ($.dataInspectorLines === undefined) $.dataInspectorLines = [];
  if ($.dataInspectorJson === undefined) $.dataInspectorJson = '';
  if ($.dataInspectorCount === undefined) $.dataInspectorCount = 0;

  // Binding side-effect: the `data` prop is a reactive binding into caller state;
  // when it changes, Vibe re-evaluates this expression and we push the formatted
  // lines + copy-payload into state keys the template iterates/binds below.
  window.syncDataInspector = (data) => {
    $.dataInspectorLines = computeLines(data);
    $.dataInspectorCount = countItems(data);
    try {
      $.dataInspectorJson = JSON.stringify(sortData(data), null, 2);
    } catch {
      $.dataInspectorJson = '';
    }
    return '';
  };

  window.copyDataInspectorJson = () => {
    if (!$.dataInspectorJson) return;
    navigator.clipboard?.writeText($.dataInspectorJson);
  };
</script>

<data-inspector>
  <data-inspector-sync>@[window.syncDataInspector(data)]</data-inspector-sync>
  <data-inspector-header>
    <data-inspector-title>Vibe state (@[dataInspectorCount] items)</data-inspector-title>
    <button onclick="window.copyDataInspectorJson()" data-inspector-copy>Copy JSON</button>
  </data-inspector-header>
  <data-inspector-lines>
    <!-- each dataInspectorLines as line, i -->
    <!-- if line.raw -->
    <data-inspector-raw even="@[line.even]">@[line.text]</data-inspector-raw>
    <!-- /if -->
    <!-- if !line.raw -->
    <data-inspector-row even="@[line.even]">
      <data-inspector-key
        style="padding-left: calc(@[line.depth] * 1ch)">@[line.key]</data-inspector-key>
      <data-inspector-value bracket="@[line.isBracket]">@[line.value]</data-inspector-value>
    </data-inspector-row>
    <!-- /if -->
    <!-- /each -->
  </data-inspector-lines>
</data-inspector>

<style>
  data-inspector {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    font-size: 0.6875rem;
    background: #1e1e1e;
    color: #d4d4d4;
    font-family: 'Geist Mono', 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
  }

  data-inspector-sync {
    display: none;
  }

  data-inspector-header {
    position: sticky;
    top: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: calc(var(--unit) * 4);
    padding: calc(var(--unit) * 2.5) calc(var(--unit) * 3);
    background: #252526;
    border-bottom: 1px solid #3c3c3c;
  }

  data-inspector-title {
    font-weight: 500;
    font-size: 0.6875rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #969696;
  }

  [data-inspector-copy] {
    height: calc(var(--unit) * 6);
    padding: 0 calc(var(--unit) * 2);
    font-family: inherit;
    font-size: 0.6875rem;
    color: #969696;
    background: transparent;
    border: 1px solid #3c3c3c;
    border-radius: calc(var(--unit) * 1);
    cursor: pointer;
  }

  [data-inspector-copy]:hover {
    color: #d4d4d4;
    background: #2a2d2e;
    border-color: #505050;
  }

  data-inspector-lines {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    line-height: 1.5;
    scrollbar-color: #424242 transparent;
  }

  data-inspector-lines::-webkit-scrollbar { width: 8px; }
  data-inspector-lines::-webkit-scrollbar-thumb { background: #424242; border-radius: 4px; }
  data-inspector-lines::-webkit-scrollbar-track { background: transparent; }

  data-inspector-row,
  data-inspector-raw {
    display: flex;
    align-items: center;
    width: 100%;
    gap: calc(var(--unit) * 2);
    padding: calc(var(--unit) * 1) calc(var(--unit) * 3);
    min-height: 1.5em;
  }

  data-inspector-row[even],
  data-inspector-raw[even] {
    background: #1a1a1a;
  }

  data-inspector-row:hover,
  data-inspector-raw:hover {
    background: #2a2d2e;
  }

  data-inspector-raw {
    text-align: left;
    color: #808080;
  }

  data-inspector-key {
    display: inline-block;
    flex-shrink: 0;
    color: #9cdcfe;
  }

  data-inspector-value {
    flex: 1;
    min-width: 0;
    text-align: right;
    word-break: break-all;
    color: #ce9178;
  }

  data-inspector-value[bracket] {
    color: #569cd6;
  }
</style>
