<script type="module">
  const getSortRank = (key, val) => {
    if (key.startsWith('_')) return 2;
    if (val === null || val === undefined || typeof val !== 'object') return 0;
    return 1;
  };

  const getLength = (val) =>
    Array.isArray(val) ? val.length : (val && typeof val === 'object') ? Object.keys(val).length : 0;

  // Stable sort: first render establishes key order per rank group.
  // Subsequent renders keep existing keys in place, new keys sort in.
  const keyOrder = new Map();

  const sortEntries = (entries) =>
    entries.sort(([aKey, aVal], [bKey, bVal]) => {
      const aRank = getSortRank(aKey, aVal);
      const bRank = getSortRank(bKey, bVal);
      if (aRank !== bRank) return aRank - bRank;
      const aIdx = keyOrder.get(aKey);
      const bIdx = keyOrder.get(bKey);
      if (aIdx !== undefined && bIdx !== undefined) return aIdx - bIdx;
      if (aIdx !== undefined) return -1;
      if (bIdx !== undefined) return 1;
      if (aRank >= 1) {
        const aLen = getLength(aVal);
        const bLen = getLength(bVal);
        if (aLen !== bLen) return aLen - bLen;
      }
      return aKey.localeCompare(bKey);
    });

  const lockKeyOrder = (entries) => {
    if (keyOrder.size) return;
    entries.forEach(([key], i) => keyOrder.set(key, i));
  };

  const sortData = (value, isRoot = false) => {
    if (value === null || value === undefined) return value;
    if (typeof value !== 'object') return value;
    if (Array.isArray(value)) return value.map((item) => sortData(item));
    const entries = Object.entries(value);
    sortEntries(entries);
    if (isRoot) lockKeyOrder(entries);
    const sorted = {};
    entries.forEach(([key, val]) => {
      sorted[key] = sortData(val);
    });
    return sorted;
  };

  const renderValue = (value, indent, seen, isRoot = false) => {
    if (value === null) return 'null';
    if (value === undefined) return 'undefined';
    if (typeof value === 'function') return '[Function]';
    if (typeof value !== 'object') return String(value);
    if (seen.has(value)) return '[Circular]';
    seen.add(value);

    if (Array.isArray(value)) {
      if (value.length === 0) return '';
      let result = '';
      value.forEach((item, index) => {
        const nextIndent = isRoot ? indent : indent + 1;
        const itemIndent = ' '.repeat(nextIndent);
        if (typeof item === 'object' && item !== null) {
          const itemCount = Array.isArray(item) ? `[${item.length}]` : `{${Object.keys(item).length}}`;
          const rendered = renderValue(item, nextIndent + 1, seen);
          result += `${itemIndent}#${index + 1}~${itemCount}\n`;
          if (rendered) result += `${rendered}\n`;
        } else {
          const rendered = renderValue(item, nextIndent, seen);
          result += `${itemIndent}#${index + 1}~${rendered}\n`;
        }
      });
      return result.trimEnd();
    }

    const entries = sortEntries(Object.entries(value));
    if (isRoot) lockKeyOrder(entries);
    if (entries.length === 0) return '';
    let result = '';
    entries.forEach(([key, val]) => {
      const nextIndent = isRoot ? indent : indent + 1;
      const keyIndent = ' '.repeat(nextIndent);
      if (typeof val === 'object' && val !== null) {
        if (seen.has(val)) {
          result += `${keyIndent}${key}~[Circular]\n`;
        } else {
          const valCount = Array.isArray(val) ? `[${val.length}]` : `{${Object.keys(val).length}}`;
          const rendered = renderValue(val, nextIndent + 1, seen);
          result += `${keyIndent}${key}~${valCount}\n`;
          if (rendered) result += `${rendered}\n`;
        }
      } else {
        const rendered = renderValue(val, nextIndent, seen);
        result += `${keyIndent}${key}~${rendered}\n`;
      }
    });
    return result.trimEnd();
  };

  const BRACKET_REGEX = /[\[\{].*?[\]\}]/;

  const buildTree = (lines) => {
    const root = { children: [] };
    const stack = [{ node: root, depth: -1 }];
    for (const line of lines) {
      while (stack.length > 1 && stack[stack.length - 1].depth >= line.depth) stack.pop();
      const node = { ...line, children: [] };
      stack[stack.length - 1].node.children.push(node);
      if (line.isBracket) stack.push({ node, depth: line.depth });
    }
    return root.children;
  };

  const flattenNodes = (tree) => {
    const result = [];
    const walk = ({ key, value, depth, isBracket, children }) => {
      result.push({ key, value, depth, isBracket });
      children.forEach(walk);
    };
    tree.forEach(walk);
    return result;
  };

  const assignPaths = (nodes, prefix) => {
    nodes.forEach(node => {
      node.path = `${prefix}/${node.key}`;
      if (node.children?.length) assignPaths(node.children, node.path);
    });
  };

  const computeSections = (data) => {
    if (!data || typeof data !== 'object') return [];
    const entries = Object.entries(data);
    sortEntries(entries);
    lockKeyOrder(entries);
    return entries.map(([key, val]) => {
      if (val === null || val === undefined || typeof val !== 'object') {
        return { key, path: key, value: String(val), isBracket: false, children: [] };
      }
      const count = Array.isArray(val) ? `[${val.length}]` : `{${Object.keys(val).length}}`;
      const rendered = renderValue(val, 0, new WeakSet(), true).trim();
      const children = rendered ? buildTree(rendered.split('\n').map((line) => {
        const match = line.match(/^(\s*)(.+?)~(.*)$/);
        if (match) {
          const [, indent, k, v] = match;
          return { depth: indent.length, key: k, value: v, isBracket: BRACKET_REGEX.test(v) };
        }
        return { depth: 0, key: line, value: '', isBracket: false };
      })) : [];
      assignPaths(children, key);
      return { key, path: key, value: count, isBracket: true, children };
    });
  };

  const countItems = (val) => {
    if (val === null || val === undefined || typeof val !== 'object') return 1;
    if (Array.isArray(val)) return val.reduce((n, v) => n + countItems(v), 0);
    return Object.values(val).reduce((n, v) => n + countItems(v), 0);
  };

  const STORAGE_KEY = 'dataInspectorOpenPaths';
  const ALL_OPEN_KEY = 'dataInspectorAllOpen';

  let openPathsSet = new Set();
  try { openPathsSet = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); } catch {}

  const persistOpenPaths = () => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...openPathsSet])); } catch {}
  };

  const syncOpenFromDOM = () => {
    openPathsSet = new Set(
      [...document.querySelectorAll('data-inspector-lines accordion[open]')]
        .map(a => a.dataset.path).filter(Boolean)
    );
    persistOpenPaths();
  };

  if ($.dataInspectorSections === undefined) $.dataInspectorSections = [];
  if ($.dataInspectorJson === undefined) $.dataInspectorJson = '';
  if ($.dataInspectorCount === undefined) $.dataInspectorCount = 0;
  if ($.dataInspectorAllOpen === undefined) {
    $.dataInspectorAllOpen = localStorage.getItem(ALL_OPEN_KEY) === 'true';
  }

  let interactionUntil = 0;
  const markInteraction = () => { interactionUntil = performance.now() + 300; };

  window.toggleInspectorSection = (e) => {
    markInteraction();
    e.currentTarget.nextElementSibling?.toggleAttribute('open');
    syncOpenFromDOM();
  };

  window.toggleChildRow = (e) => {
    const row = e.currentTarget;
    if (!row.hasAttribute('expandable')) return;
    markInteraction();
    row.nextElementSibling?.toggleAttribute('open');
    syncOpenFromDOM();
  };

  let prevSections = null;

  const sectionSignature = (nodes) => nodes.map(n => {
    const childSig = n.children?.length ? sectionSignature(n.children) : '';
    return `${n.key}:${n.isBracket ? 'b' : 'p'}[${childSig}]`;
  }).join('|');

  const collectValues = (sections) => {
    const result = {};
    const walk = (nodes) => nodes.forEach(n => {
      if (n.path) result[n.path] = n.value;
      if (n.children?.length) walk(n.children);
    });
    walk(sections);
    return result;
  };

  const restoreOpenPaths = () => {
    if (!openPathsSet.size) return;
    requestAnimationFrame(() => {
      const allowTransition = performance.now() < interactionUntil;
      document.querySelectorAll('data-inspector-lines accordion').forEach(a => {
        if (!a.dataset.path || !openPathsSet.has(a.dataset.path)) return;
        if (!allowTransition) a.style.transition = 'none';
        a.setAttribute('open', '');
        if (!allowTransition) {
          a.offsetHeight;
          a.style.transition = '';
        }
      });
    });
  };

  window.syncDataInspector = (data) => {
    const newSections = computeSections(data);
    $.dataInspectorCount = countItems(data);
    try {
      $.dataInspectorJson = JSON.stringify(sortData(data, true), null, 2);
    } catch {
      $.dataInspectorJson = '';
    }

    if (prevSections && sectionSignature(prevSections) === sectionSignature(newSections)) {
      const prevValues = collectValues(prevSections);
      const newValues = collectValues(newSections);
      for (const path in newValues) {
        if (newValues[path] === prevValues[path]) continue;
        const row = document.querySelector(`data-inspector-row[data-path="${CSS.escape(path)}"]`);
        const valueEl = row?.querySelector('data-inspector-value');
        if (valueEl) valueEl.textContent = newValues[path];
      }
      prevSections = newSections;
      return '';
    }

    prevSections = newSections;
    $.dataInspectorSections = newSections;
    restoreOpenPaths();
    return '';
  };

  window.toggleAllInspectorSections = () => {
    markInteraction();
    const allOpen = !$.dataInspectorAllOpen;
    $.dataInspectorAllOpen = allOpen;
    try { localStorage.setItem(ALL_OPEN_KEY, String(allOpen)); } catch {}
    document.querySelectorAll('data-inspector-lines accordion')
      .forEach(a => a.toggleAttribute('open', allOpen));
    syncOpenFromDOM();
  };

  window.copyDataInspectorJson = () => {
    if (!$.dataInspectorJson) return;
    navigator.clipboard?.writeText($.dataInspectorJson);
  };
</script>

<data-inspector>
  <data-inspector-sync>@[window.syncDataInspector(data)]</data-inspector-sync>
  <data-inspector-header>
    <data-inspector-title>Vibe state (@[dataInspectorCount] items)</data-inspector-title>
    <data-inspector-actions>
      <button onclick="toggleAllInspectorSections()" data-inspector-copy>@[dataInspectorAllOpen ? 'Close all' : 'Open all']</button>
      <button onclick="copyDataInspectorJson()" data-inspector-copy>Copy JSON</button>
    </data-inspector-actions>
  </data-inspector-header>
  <data-inspector-lines>
    <!-- each dataInspectorSections as section, i -->
    <data-inspector-row even="@[i % 2 === 0]"
      data-path="@[section.path]"
      expandable="@[section.children.length > 0]"
      onclick="toggleInspectorSection(event)">
      <data-inspector-key>@[section.key]</data-inspector-key>
      <data-inspector-value bracket="@[section.isBracket]">@[section.value]</data-inspector-value>
    </data-inspector-row>
    <accordion data-path="@[section.path]">
      <accordion-content>
        <!-- each section.children as node, j -->
        <data-inspector-row even="@[j % 2 === 0]" data-path="@[node.path]" expandable="@[node.isBracket]" onclick="toggleChildRow(event)">
          <data-inspector-key style="padding-left: calc((@[node.depth] + 1) * 1ch)">@[node.key]</data-inspector-key>
          <data-inspector-value bracket="@[node.isBracket]">@[node.value]</data-inspector-value>
        </data-inspector-row>
        <accordion data-path="@[node.path]">
          <accordion-content>
            <!-- each node.children as subnode, k -->
            <data-inspector-row even="@[k % 2 === 0]" data-path="@[subnode.path]" expandable="@[subnode.isBracket]" onclick="toggleChildRow(event)">
              <data-inspector-key style="padding-left: calc((@[subnode.depth] + 1) * 1ch)">@[subnode.key]</data-inspector-key>
              <data-inspector-value bracket="@[subnode.isBracket]">@[subnode.value]</data-inspector-value>
            </data-inspector-row>
            <accordion data-path="@[subnode.path]">
              <accordion-content>
                <!-- each subnode.children as deepnode, l -->
                <data-inspector-row even="@[l % 2 === 0]" data-path="@[deepnode.path]" expandable="@[deepnode.isBracket]" onclick="toggleChildRow(event)">
                  <data-inspector-key style="padding-left: calc((@[deepnode.depth] + 1) * 1ch)">@[deepnode.key]</data-inspector-key>
                  <data-inspector-value bracket="@[deepnode.isBracket]">@[deepnode.value]</data-inspector-value>
                </data-inspector-row>
                <!-- /each -->
              </accordion-content>
            </accordion>
            <!-- /each -->
          </accordion-content>
        </accordion>
        <!-- /each -->
      </accordion-content>
    </accordion>
    <!-- /each -->
  </data-inspector-lines>
</data-inspector>

<style>
  data-inspector {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    font-size: 0.6875rem;
    background: #1e1e1e;
    color: #d4d4d4;
    font-family: 'Geist Mono', 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
  }

  data-inspector-sync {
    display: none;
  }

  data-inspector-header {
    position: sticky;
    top: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: calc(var(--unit) * 4);
    padding: calc(var(--unit) * 2.5) calc(var(--unit) * 3);
    background: #252526;
    border-bottom: 1px solid #3c3c3c;
  }

  data-inspector-title {
    font-weight: 500;
    font-size: 0.6875rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #969696;
  }

  data-inspector-actions {
    display: flex;
    gap: calc(var(--unit) * 1);
  }

  [data-inspector-copy] {
    height: calc(var(--unit) * 6);
    padding: 0 calc(var(--unit) * 2);
    font-family: inherit;
    font-size: 0.6875rem;
    color: #969696;
    background: transparent;
    border: 1px solid #3c3c3c;
    border-radius: calc(var(--unit) * 1);
    cursor: pointer;
  }

  [data-inspector-copy]:hover {
    color: #d4d4d4;
    background: #2a2d2e;
    border-color: #505050;
  }

  data-inspector-lines {
    --scrollbar-width: 16px;
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow-y: scroll;
    overflow-x: hidden;
    margin-right: calc(var(--scrollbar-width) * -1);
    line-height: 1.5;
    scrollbar-color: #424242 transparent;
  }

  data-inspector-lines::-webkit-scrollbar {
    width: var(--scrollbar-width);
  }

  data-inspector-lines::-webkit-scrollbar-thumb {
    background: #424242;
    border-radius: 4px;
  }

  data-inspector-lines::-webkit-scrollbar-track {
    background: transparent;
  }

  data-inspector-row,
  data-inspector-raw {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 100%;
    gap: calc(var(--unit) * 2);
    padding: calc(var(--unit) * 0.5) calc(var(--unit) * 3);
    box-sizing: border-box;
  }

  data-inspector-row[even],
  data-inspector-raw[even] {
    background: #1a1a1a;
  }

  data-inspector-row:hover,
  data-inspector-raw:hover {
    background: #2a2d2e;
  }

  data-inspector-raw {
    text-align: left;
    color: #808080;
  }

  data-inspector-key {
    display: inline-block;
    flex-shrink: 0;
    color: #9cdcfe;
  }

  data-inspector-value {
    flex: 1;
    min-width: 0;
    text-align: right;
    word-break: break-word;
    white-space: normal;
    color: #ce9178;
  }

  data-inspector-value[bracket] {
    color: #569cd6;
  }

  data-inspector-row[expandable] {
    cursor: pointer;
  }

  data-inspector-row[expandable]:hover {
    background: #2a2d2e;
  }

</style>
