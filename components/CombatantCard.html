<combatant-slot
  absolute
  combatant-slot="@[card.cardId]"
  facing-right="@[card.facingRight]"
  style="--c-x: @[card.x]px; --c-y: @[card.y]px; --c-z: @[card.z]; --c-scale: @[card.scale]"
>
  <combatant-card absolute combat-card="@[card.cardId]" flex down>
    <combatant-header flex>
      <combatant-name>@[card.name]</combatant-name>
    </combatant-header>

    <component src="/components/HealthBar.html" card="@[card]"></component>

    <combatant-sprite-area block></combatant-sprite-area>

    <component src="/components/CombatantAbilityBar.html" card="@[card]"></component>

    <combatant-statuses absolute flex down facing-right="@[card.facingRight]">
      <!-- each card.statusEffects as s -->
      <status-chip @[s.key]>
        <icon @[s.key]></icon>
        <status-ticks>@[s.ticks]</status-ticks>
      </status-chip>
      <!-- /each -->
      <!-- each card.statusStacks as s -->
      <status-chip @[s.key] stack>
        <icon @[s.key]></icon>
        <status-ticks>@[s.value]/@[s.max]</status-ticks>
      </status-chip>
      <!-- /each -->
    </combatant-statuses>

    <combatant-badge absolute damage-badge>
      <icon 1h1h></icon>
      <!-- if card.damage > 0 -->
      <badge-value absolute>@[card.damage]</badge-value>
      <!-- /if -->
    </combatant-badge>

    <combatant-badge absolute armor-badge>
      <icon maxArmor></icon>
      <!-- if card.currentArmor > 0 -->
      <badge-value absolute>@[card.currentArmor]</badge-value>
      <!-- /if -->
    </combatant-badge>
  </combatant-card>

  <component src="/components/CombatantImage.html" card="@[card]"></component>
</combatant-slot>

<style>
  combatant-slot {
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    z-index: var(--c-z, 10);
    transform: translate(-50%, -50%);
  }

  combatant-card {
    left: var(--c-x);
    top: calc(var(--c-y) - calc(calc(var(--unit) * 5)));
    transform: translate(-50%, -50%) scale(var(--c-scale, 1));
    width: calc(calc(var(--unit) * 36));
    pointer-events: none;
    border-radius: calc(calc(var(--unit) * 1));
    background: var(--combatant-card-bg);
    backdrop-filter: blur(calc(calc(var(--unit) * 0.75)));
    box-shadow: 0 calc(calc(var(--unit) * 0.5)) calc(calc(var(--unit) * 1.5))
      var(--combatant-card-shadow);
    color: var(--foreground);
  }

  combatant-header {
    justify-content: space-between;
    align-items: center;
    padding: calc(calc(var(--unit) * 0.5)) calc(calc(var(--unit) * 1.5));
    font-size: calc(calc(var(--unit) * 2.5));
    font-weight: 700;
    color: var(--combatant-name-color);
    text-transform: uppercase;
  }

  combatant-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  combatant-sprite-area {
    width: 100%;
    height: calc(calc(var(--unit) * 36));
  }

  combatant-statuses {
    top: calc(calc(var(--unit) * 17));
    left: calc(100% - calc(calc(var(--unit) * 6)));
    gap: calc(calc(var(--unit) * 1));
    align-items: flex-start;
  }

  combatant-statuses[facing-right] {
    left: auto;
    right: calc(100% - calc(calc(var(--unit) * 6)));
    align-items: flex-end;
  }

  status-chip {
    display: inline-flex;
    align-items: center;
    gap: calc(calc(var(--unit) * 0.75));
    font-size: calc(calc(var(--unit) * 2.5));
    padding: calc(calc(var(--unit) * 0.25)) calc(calc(var(--unit) * 1));
    border-radius: calc(calc(var(--unit) * 0.75));
    background: var(--status-default-bg);
    color: var(--slate);
  }

  status-chip icon {
    font-size: calc(calc(var(--unit) * 3));
  }

  status-chip[stunned] {
    background: var(--status-stunned-bg);
    color: var(--status-stunned-fg);
  }
  status-chip[bleeding] {
    background: var(--status-bleeding-bg);
    color: var(--status-bleeding-fg);
  }
  status-chip[vulnerable] {
    background: var(--status-vulnerable-bg);
    color: var(--status-vulnerable-fg);
  }
  status-chip[wounded] {
    background: var(--status-wounded-bg);
    color: var(--status-wounded-fg);
  }
  status-chip[concussed] {
    background: var(--status-concussed-bg);
    color: var(--status-concussed-fg);
  }
  status-chip[exposed] {
    background: var(--status-exposed-bg);
    color: var(--status-exposed-fg);
  }

  combatant-badge {
    bottom: calc(calc(var(--unit) * 7));
    width: calc(calc(var(--unit) * 8));
    height: calc(calc(var(--unit) * 8));
    display: grid;
    place-items: center;
    pointer-events: none;
  }

  combatant-badge[damage-badge] {
    left: calc(calc(var(--unit) * -1));
  }
  combatant-badge[armor-badge] {
    right: calc(calc(var(--unit) * -1));
  }

  combatant-slot[facing-right] combatant-badge[damage-badge] {
    left: auto;
    right: calc(calc(var(--unit) * -1));
  }
  combatant-slot[facing-right] combatant-badge[armor-badge] {
    right: auto;
    left: calc(calc(var(--unit) * -1));
  }

  combatant-badge icon {
    font-size: calc(calc(var(--unit) * 7));
    --color: var(--stone);
  }

  combatant-badge badge-value {
    inset: 0;
    display: grid;
    place-items: center;
    font-family: var(--font-display, sans-serif);
    font-size: calc(calc(var(--unit) * 4.5));
    color: var(--white);
    text-shadow: 0 1px calc(calc(var(--unit) * 0.5)) oklch(0 0 0 / 0.5);
  }
</style>
