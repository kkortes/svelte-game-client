<combatant-slot combatant-slot="@[combatCards[idx].cardId]"
  facing-right="@[combatCards[idx].facingRight]"
  style="
    --c-x: @[combatCards[idx].x]px;
    --c-y: @[combatCards[idx].y]px;
    --c-z: @[combatCards[idx].z];
    --c-scale: @[combatCards[idx].scale];
  ">
  <combatant-card combat-card="@[combatCards[idx].cardId]" flex down>
    <combatant-header flex>
      <combatant-name>@[combatCards[idx].name]</combatant-name>
    </combatant-header>

    <component src="/components/HealthBar.html" idx="@[idx]"></component>

    <combatant-sprite-area block></combatant-sprite-area>

    <component src="/components/CombatantAbilityBar.html" idx="@[idx]"></component>

    <combatant-statuses flex down facing-right="@[combatCards[idx].facingRight]">
      <!-- each combatCards[idx].statusEffects as s -->
      <status-chip data-status="@[s.key]">
        <icon @[s.key]></icon>
        <status-ticks>@[s.ticks]</status-ticks>
      </status-chip>
      <!-- /each -->
      <!-- each combatCards[idx].statusStacks as s -->
      <status-chip data-status="@[s.key]" stack>
        <icon @[s.key]></icon>
        <status-ticks>@[s.value]/@[s.max]</status-ticks>
      </status-chip>
      <!-- /each -->
    </combatant-statuses>

    <combatant-badge damage-badge>
      <icon 1h1h></icon>
      <!-- if combatCards[idx].damage > 0 -->
      <badge-value>@[combatCards[idx].damage]</badge-value>
      <!-- /if -->
    </combatant-badge>

    <combatant-badge armor-badge>
      <icon maxArmor></icon>
      <!-- if combatCards[idx].currentArmor > 0 -->
      <badge-value>@[combatCards[idx].currentArmor]</badge-value>
      <!-- /if -->
    </combatant-badge>
  </combatant-card>

  <component src="/components/CombatantImage.html" idx="@[idx]"></component>
</combatant-slot>

<style>
  [battle-brawlers] combatant-slot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    z-index: var(--c-z, 10);
    transform: translate(-50%, -50%);
  }

  [battle-brawlers] combatant-card {
    position: absolute;
    left: var(--c-x);
    top: calc(var(--c-y) - 20px);
    transform: translate(-50%, -50%) scale(var(--c-scale, 1));
    width: 144px;
    pointer-events: none;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(3px);
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    color: var(--foreground);
  }

  [battle-brawlers] combatant-header {
    justify-content: space-between;
    align-items: center;
    padding: 2px 6px;
    font-size: 0.65rem;
    font-weight: 700;
    color: #57534e;
    text-transform: uppercase;
  }

  [battle-brawlers] combatant-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  [battle-brawlers] combatant-sprite-area {
    width: 100%;
    height: 144px;
  }

  [battle-brawlers] combatant-statuses {
    position: absolute;
    top: 68px;
    left: calc(100% - 24px);
    gap: 4px;
    align-items: flex-start;
  }

  [battle-brawlers] combatant-statuses[facing-right] {
    left: auto;
    right: calc(100% - 24px);
    align-items: flex-end;
  }

  [battle-brawlers] status-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 0.65rem;
    padding: 1px 4px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.7);
    color: #374151;
  }

  [battle-brawlers] status-chip icon {
    font-size: 0.75rem;
  }

  [battle-brawlers] status-chip[data-status="stunned"] { background: #fbbf24; color: #000; }
  [battle-brawlers] status-chip[data-status="bleeding"] { background: #ef4444; color: #fff; }
  [battle-brawlers] status-chip[data-status="vulnerable"] { background: #a855f7; color: #fff; }
  [battle-brawlers] status-chip[data-status="wounded"] { background: #dc2626; color: #fff; opacity: 0.75; }
  [battle-brawlers] status-chip[data-status="concussed"] { background: #d97706; color: #fff; opacity: 0.75; }
  [battle-brawlers] status-chip[data-status="exposed"] { background: #7c3aed; color: #fff; opacity: 0.75; }

  [battle-brawlers] combatant-badge {
    position: absolute;
    bottom: 28px;
    width: 32px;
    height: 32px;
    display: grid;
    place-items: center;
    pointer-events: none;
  }

  [battle-brawlers] combatant-badge[damage-badge] { left: -4px; }
  [battle-brawlers] combatant-badge[armor-badge] { right: -4px; }

  [battle-brawlers] combatant-slot[facing-right] combatant-badge[damage-badge] { left: auto; right: -4px; }
  [battle-brawlers] combatant-slot[facing-right] combatant-badge[armor-badge] { right: auto; left: -4px; }

  [battle-brawlers] combatant-badge icon {
    font-size: 1.8rem;
    --color: #b3ad9f;
  }

  [battle-brawlers] combatant-badge badge-value {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-family: var(--font-display, sans-serif);
    font-size: 1.1rem;
    color: white;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
  }
</style>
