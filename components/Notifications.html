<notification-panel>
  <!-- if notifications.length > 0 -->
  <notification-stack>
    <!-- each notifications as notification -->
    <notification-card glass data-type="@[notification.type]">
      <crow g-2>
        <crow notification-icon data-type="@[notification.type]">
          <icon @[notification.type]></icon>
        </crow>
        <notification-body>
          <!-- if notification.type === 'error' -->
          <strong notification-title>Ops, something went wrong!</strong>
          <!-- /if -->
          <!-- if notification.type === 'info' -->
          <strong notification-title>Did you know?</strong>
          <!-- /if -->
          <!-- if notification.type === 'success' -->
          <strong notification-title>Good news</strong>
          <!-- /if -->
          <!-- if notification.type === 'warning' -->
          <strong notification-title>Heads up</strong>
          <!-- /if -->
          <notification-message>@[notification.message]</notification-message>
        </notification-body>
      </crow>
    </notification-card>
    <!-- /each -->
  </notification-stack>
  <!-- /if -->

  <style>
    notification-panel {
      display: contents;
    }

    notification-panel notification-stack {
      position: fixed;
      bottom: calc(var(--unit) * 8);
      right: calc(var(--unit) * 2);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    notification-panel notification-card {
      display: block;
      animation: slide-in 200ms ease;
      margin-bottom: calc(var(--unit) * 2);
      padding: calc(var(--unit) * 3) calc(var(--unit) * 5) calc(var(--unit) * 3) calc(var(--unit) * 3);
    }

    notification-panel notification-card[data-type="error"] {
      border-color: #ef4444;
    }

    notification-panel notification-card[data-type="warning"] {
      border-color: #f97316;
    }

    notification-panel notification-card[data-type="success"] {
      border-color: #22c55e;
    }

    notification-panel notification-card[data-type="info"] {
      border-color: #3b82f6;
    }

    notification-panel [notification-icon] {
      width: calc(var(--unit) * 8);
      height: calc(var(--unit) * 8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: none;
      color: white;
      font-size: 1.125rem;
    }

    notification-panel [notification-icon][data-type="error"] {
      background: #ef4444;
    }

    notification-panel [notification-icon][data-type="warning"] {
      background: #f97316;
    }

    notification-panel [notification-icon][data-type="success"] {
      background: #22c55e;
    }

    notification-panel [notification-icon][data-type="info"] {
      background: #3b82f6;
    }

    notification-panel [notification-title] {
      font-size: 1rem;
      color: var(--foreground);
      display: block;
    }

    notification-panel notification-message {
      display: block;
      max-width: calc(var(--unit) * 60);
      color: var(--muted-foreground);
      font-size: 0.875rem;
    }
  </style>
</notification-panel>
