<script type="module">
  import { generateCombat, prepareTeams } from '/js/combat.js';
  import { seededRandom, calculateCombatStatsByCharacter } from '/js/utils.js';
  import CHARACTERS, { ALL_CHARACTERS } from '/js/constants/CHARACTERS.js';
  import { INITIAL_COMBAT } from '/js/app.js';

  const state = { teamCount: 2, combatantCount: 1 };
  component(state);
  const id = Object.keys(window.__vibeComponents).find((k) => window.__vibeComponents[k] === state);
  const s = $[id];

  const npcKeys = Object.keys(ALL_CHARACTERS).filter((k) => ALL_CHARACTERS[k].race === 'creature');

  window.debugInitialize = () => {
    const teams = Array.from({ length: s.teamCount }, (_, ti) =>
      Array.from({ length: s.combatantCount }, (_, ci) => {
        const key = npcKeys[seededRandom(0, npcKeys.length - 1, `debug_${ti}_${ci}`)];
        return CHARACTERS(key);
      }),
    );
    if ($.characters[0]) teams[0][0] = $.characters[0];
    const prepared = prepareTeams(...teams);
    $.combat = { ...structuredClone(INITIAL_COMBAT), teamsStartState: prepared };
  };

  window.debugStartCombat = () => {
    $.combat = generateCombat(JSON.parse(JSON.stringify($.combat.teamsStartState)), 'myseed');
  };

  window.debugReset = () => {
    if ($.characters[0]) {
      const cs = calculateCombatStatsByCharacter(CHARACTERS($.characters[0], true));
      $.characters = $.characters.map((c, i) =>
        i === 0
          ? {
              ...c,
              overrides: {
                ...c.overrides,
                combatStats: { ...c.overrides?.combatStats, currentHealth: cs.maxHealth },
              },
            }
          : c,
      );
    }
    $.combat = structuredClone(INITIAL_COMBAT);
    $.liveTeams = [];
    $.elapsedMilliseconds = 0;
  };

  window.debugInitialize();

  $.on('afterUpdate', (current, prev) => {
    if (current.characters === prev.characters) return;
    const inCombat =
      current.combat?.duration > 0 && current.elapsedMilliseconds < current.combat.duration;
    if (!inCombat) window.debugInitialize();
  });
</script>

<debug-stage>
  <!-- if combat.teamsStartState.length -->
  <component src="/components/Combat.html"></component>
  <!-- /if -->
</debug-stage>

<debug-panel>
  <span text-sm>Teams @[this.teamCount]</span>
  <input
    type="range"
    min="1"
    max="8"
    value="@[this.teamCount]"
    oninput="
      $.this.teamCount = +this.value;
      debugInitialize();
    "
  />

  <span text-sm>Combatants @[this.combatantCount]</span>
  <input
    type="range"
    min="1"
    max="6"
    value="@[this.combatantCount]"
    oninput="
      $.this.combatantCount = +this.value;
      debugInitialize();
    "
  />

  <button onclick="debugReset()">Reset</button>
  <button primary onclick="debugStartCombat()" disabled="@[combat?.duration !== 0]">
    Start combat
  </button>
</debug-panel>

<style>
  debug-stage {
    display: grid;
    place-items: center;
    min-height: 100vh;
  }

  debug-panel {
    position: fixed;
    left: calc(var(--unit) * 5);
    top: 50%;
    transform: translateY(-50%);
    width: calc(var(--unit) * 40);
    padding: calc(var(--unit) * 2);
    display: flex;
    flex-direction: column;
    gap: calc(var(--unit) * 2);
    background: oklch(1 0 0 / 0.7);
    border-radius: var(--radius);
    z-index: 2;
    backdrop-filter: blur(4px);
  }

  debug-panel button {
    width: 100%;
  }

  debug-panel input[type='range'] {
    width: 100%;
    min-width: 0;
  }
</style>
