<script type="module">
  import { ALL_FIGHTS } from '/js/constants/FIGHTS.js';
  import CHARACTERS from '/js/constants/CHARACTERS.js';
  import { generateCombat, prepareTeams } from '/js/combat.js';
  import {
    calculateAvailableAbilitiesByCharacter,
    calculateCombatStatsByCharacter,
  } from '/js/utils.js';
  import ABILITIES from '/js/constants/ABILITIES.js';
  import { formatDescription } from '/js/helpers.js';
  window.formatDescription = formatDescription;

  const fightId = $.page.params.fightId;
  const fight = ALL_FIGHTS.find((f) => f.id === fightId);

  let currentFight = null;

  if (fight) {
    const characters = fight.characters.map((charRef) => ({
      ...charRef,
      overrides: {
        ...charRef?.overrides,
        level: fight.minLevel,
        equipment: {
          mainHand: { overrides: { level: fight.minLevel } },
          offHand: { overrides: { level: fight.minLevel } },
          armor: { overrides: { level: fight.minLevel } },
        },
      },
    }));

    currentFight = {
      ...fight,
      characters,
      enemies: characters.map((ref) => {
        try {
          const char = CHARACTERS(ref, true);
          const stats = calculateCombatStatsByCharacter(char);
          let tickCursor = 0;
          const abilities = char.abilities.map((a) => {
            try {
              const h = ABILITIES(a, true);
              const tickStart = tickCursor;
              tickCursor += h.ticks;
              return {
                id: h.id,
                name: h.name,
                ticks: h.ticks,
                icon: h.icon,
                basic: !!h.basic,
                tickStart,
                overflow: tickStart >= 12,
                statusEffects: h.statusEffects || [],
              };
            } catch {
              return {
                id: null,
                name: '?',
                ticks: 0,
                icon: '',
                basic: false,
                tickStart: 0,
                overflow: false,
                statusEffects: [],
              };
            }
          });
          const lastTick = tickCursor;
          return {
            name: char.name,
            image: char.image,
            race: char.race,
            description: char.description || '',
            maxHealth: stats.maxHealth,
            maxArmor: stats.maxArmor,
            damage: stats.damage,
            abilities,
            lastTick,
          };
        } catch {
          return {
            name: '?',
            image: '',
            race: '',
            description: '',
            maxHealth: 0,
            maxArmor: 0,
            damage: 0,
            abilities: [],
            lastTick: 0,
          };
        }
      }),
    };
    $.maxBrawlers = fight.allowedNumberOfCharacters;
    $.selectedBrawlers = [];
  }

  $.currentFight = currentFight;
  $.brawlerSlots = [];

  window.updateFightSlots = () => {
    const count = currentFight?.allowedNumberOfCharacters || 1;
    const C = window.CHARACTERS || CHARACTERS;
    const A = window.ABILITIES_FN || ABILITIES;
    $.brawlerSlots = Array.from({ length: count }, (_, i) => {
      const uuid = $.selectedBrawlers[i];
      if (!uuid) return { empty: true, index: i };
      const ref = $.characters.find((c) => c.uuid === uuid);
      if (!ref) return { empty: true, index: i };
      try {
        const char = C(ref, true);
        const stats = calculateCombatStatsByCharacter(char);
        let tickCursor = 0;
        const abilities = char.abilities
          .map((a) => {
            try {
              const h = A(a, true);
              const tickStart = tickCursor;
              tickCursor += h.ticks;
              return {
                id: h.id,
                name: h.name,
                ticks: h.ticks,
                icon: h.icon,
                basic: !!h.basic,
                tickStart,
                overflow: tickStart >= char.maxTicks,
                statusEffects: h.statusEffects || [],
              };
            } catch {
              return null;
            }
          })
          .filter(Boolean);
        const availableAbilities = calculateAvailableAbilitiesByCharacter(char)
          .map((a) => {
            try {
              const h = A(a, true);
              return {
                uuid: a.uuid,
                id: h.id,
                name: h.name,
                ticks: h.ticks,
                icon: h.icon,
                basic: !!h.basic,
                statusEffects: h.statusEffects || [],
              };
            } catch {
              return null;
            }
          })
          .filter((a) => a && !a.basic);
        const characterIndex = $.characters.findIndex((c) => c.uuid === char.uuid);
        return {
          empty: false,
          uuid: char.uuid,
          characterIndex,
          name: char.name,
          image: char.image,
          mugshot: char.image.replace('.png', '-mugshot.png'),
          hp: stats.maxHealth,
          armor: stats.maxArmor,
          damage: stats.damage,
          abilities,
          availableAbilities,
          lastTick: tickCursor,
          index: i,
        };
      } catch {
        return { empty: true, index: i };
      }
    });
  };
  window.updateFightSlots();

  import('/js/dnd.js').then(({ default: dnd }) => {
    dnd.init();
    const registered = new WeakSet();

    const registerSlotZones = () => {
      document
        .querySelectorAll('brawler-slot[data-brawler-uuid] ability-overlay')
        .forEach((overlay) => {
          if (registered.has(overlay)) return;
          const uuid = overlay.closest('brawler-slot')?.dataset?.brawlerUuid;
          if (!uuid) return;
          registered.add(overlay);
          dnd.abilityBarZone(overlay, {
            items: () => {
              const ref = $.characters.find((c) => c.uuid === uuid);
              return (ref?.overrides?.abilities || []).map((a) => {
                try {
                  return { ...a, basic: !!ABILITIES(a, true).basic };
                } catch {
                  return { ...a, basic: false };
                }
              });
            },
            type: 'fight-slot-' + uuid,
            onReorder: (newItems) => {
              const ref = $.characters.find((c) => c.uuid === uuid);
              if (!ref) return;
              ref.overrides.abilities = newItems.map((a) => ({
                id: a.id,
                uuid: a.uuid,
                overrides: a.overrides,
              }));
              window.updateFightSlots();
            },
          });
        });
    };

    $.on('afterDomMutation', registerSlotZones);
    $.on('ready', registerSlotZones);
    queueMicrotask(registerSlotZones);
  });

  window.startFight = () => {
    if (!currentFight) return;

    const selected = $.characters.filter((c) => $.selectedBrawlers.includes(c.uuid));
    if (selected.length === 0) return;

    if (
      selected.some((c) => {
        try {
          return CHARACTERS(c, true).combatStats.currentHealth <= 0;
        } catch {
          return false;
        }
      })
    ) {
      notify({ warning: 'One of your brawlers is knocked out!' });
      return;
    }

    const enemies = currentFight.characters.map((charRef) => ({
      ...charRef,
      overrides: {
        ...charRef?.overrides,
        level: currentFight.minLevel,
        equipment: {
          mainHand: { overrides: { level: currentFight.minLevel } },
          offHand: { overrides: { level: currentFight.minLevel } },
          armor: { overrides: { level: currentFight.minLevel } },
        },
      },
    }));

    $.combat = generateCombat(
      prepareTeams(JSON.parse(JSON.stringify(selected)), enemies),
      undefined,
      currentFight.id,
    );
    $.selectedBrawlers = [];
    $.elapsedMilliseconds = 0;
    $.overlay = { name: 'Combat' };
  };
</script>

<page-content brawlers-selected="@[selectedBrawlers.length > 0]">
  <!-- if currentFight -->
  <component src="/components/TitleBar.html" title="@[currentFight.name]" back="/the-arena">
    <badge>
      @[currentFight.allowedNumberOfCharacters]&nbsp;vs&nbsp;@[currentFight.enemies.length]
    </badge>
    <!-- if currentFight.boss -->
    <badge bg="var(--red)">Bossfight</badge>
    <badge bg="var(--slate)">Luck disabled</badge>
    <!-- /if -->
  </component>
  <hr />

  <!-- each currentFight.enemies as enemy, i -->
  <crow left fight-enemy-row>
    <fight-side-stats f="none" overflow-hidden>
      <component
        src="/components/CoreStats.html"
        hp="@[enemy.maxHealth]"
        armor="@[enemy.maxArmor]"
        damage="@[enemy.damage]"
        vertical
      ></component>
    </fight-side-stats>

    <crow vertical up left fight-info-col>
      <accordion fight-info>
        <accordion-content>
          <fight-info-inner block pb="8">
            <crow left text-lg mb="4">
              <component
                src="/components/CoreStats.html"
                hp="@[enemy.maxHealth]"
                armor="@[enemy.maxArmor]"
                damage="@[enemy.damage]"
              ></component>
            </crow>
            <!-- if enemy.description -->
            <p text-sm fight-enemy-description>@[enemy.description]</p>
            <!-- /if -->
          </fight-info-inner>
        </accordion-content>
      </accordion>

      <crow vertical left up w="full" relative>
        <accordion fight-info>
          <accordion-content>
            <crow left justify-between w="full">
              <h5>Abilities</h5>
            </crow>
          </accordion-content>
        </accordion>
        <component
          src="/components/AbilityBar.html"
          abilities="@[enemy.abilities]"
          lastTick="@[enemy.lastTick]"
          dndDisabled
          minimalistic
        >
        </component>
      </crow>
    </crow>

    <fight-enemy-image block f="none">
      <img w="full" data-src="/static/images/races/@[enemy.image]" alt="" />
    </fight-enemy-image>
  </crow>
  <!-- /each -->

  <hr />

  <crow vertical w="full" g="2">
    <!-- each brawlerSlots as slot, i -->
    <component src="/components/BrawlerSlot.html" slot="@[slot]"></component>
    <!-- /each -->
  </crow>
  <!-- /if -->

  <!-- if !currentFight -->
  <crow vertical g="4" fight-empty>
    <p text-muted>Fight not found.</p>
    <component src="/components/BackButton.html" href="/the-arena"></component>
  </crow>
  <!-- /if -->
</page-content>

<!-- if currentFight -->
<stay reverse w="full" sm:b="8" p="3">
  <button
    mx="auto"
    primary
    onclick="startFight()"
    disabled="@[selectedBrawlers.length === 0 || combat.duration !== 0]"
  >
    Fight
  </button>
</stay>
<!-- /if -->
