<script type="module">
  import CHARACTERS from '/js/constants/CHARACTERS.js';
  import EQUIPMENT from '/js/constants/EQUIPMENT.js';
  import ABILITIES from '/js/constants/ABILITIES.js';
  import {
    calculateCombatStatsByCharacter,
    calculateAvailableAbilitiesByCharacter,
    calculateTickStart,
  } from '/js/utils.js';
  import { slotsInPrettyName, unequip } from '/js/equipment.js';
  import { getLevelByExperience } from '/js/level.js';
  import { generateCombat, healFull, prepareTeams } from '/js/combat.js';

  window.eqRowTooltip = (slot, anchor) => {
    const ref = $.characters[Number($.page.params.characterIndex)]?.overrides?.equipment?.[slot];
    if (!ref) return;
    try {
      showTooltip(
        equipmentTooltipProps(EQUIPMENT(ref, true)),
        anchor.querySelector('eq-link') || anchor,
        { direction: 'up' },
      );
    } catch {}
  };

  const fmt = (v) => (v === 0 ? '-' : v > 1 ? v : `${(v * 100).toFixed(0)}%`);

  const buildStatGroups = (combatStats) => {
    const mods = combatStats.modifiers || {};
    const limits = combatStats.limits || {};
    return {
      base: [
        { icon: 'maxHealth', label: 'Health', value: fmt(combatStats.maxHealth || 0) },
        { icon: 'maxArmor', label: 'Armor', value: fmt(combatStats.maxArmor || 0) },
        { icon: 'damage', label: 'Damage', value: fmt(combatStats.damage || 0) },
      ],
      lucky: [
        {
          icon: 'criticalChance',
          label: 'Critical chance',
          value: fmt(combatStats.criticalChance || 0),
        },
        {
          icon: 'criticalDamage',
          label: 'Critical damage',
          value: fmt(combatStats.criticalDamage || 0),
        },
        { icon: 'blockChance', label: 'Block chance', value: fmt(combatStats.blockChance || 0) },
        { icon: 'dodgeChance', label: 'Dodge chance', value: fmt(combatStats.dodgeChance || 0) },
        { icon: 'magicChance', label: 'Magic chance', value: fmt(combatStats.magicChance || 0) },
      ],
      modifiers: [
        { icon: 'maxHealth', label: 'Health', value: fmt(mods.maxHealth || 0) },
        { icon: 'maxArmor', label: 'Armor', value: fmt(mods.maxArmor || 0) },
        { icon: 'damage', label: 'Damage', value: fmt(mods.damage || 0) },
        { icon: 'resistance', label: 'All resistances', value: fmt(mods.resistance || 0) },
      ],
      resistances: [
        { icon: 'bleeding', label: 'Bleeding', value: limits.wounded ?? '-' },
        { icon: 'stunned', label: 'Stunned', value: limits.concussed ?? '-' },
        { icon: 'vulnerable', label: 'Vulnerable', value: limits.exposed ?? '-' },
      ],
    };
  };

  const buildEquipmentSlots = (char) => {
    const isTwoHanded =
      char.equipment.mainHand && EQUIPMENT(char.equipment.mainHand, true).slotsIn === 'twoHand';
    return ['mainHand', 'offHand', 'armor', 'accessory', 'trinket'].map((slot) => {
      const eq = char.equipment[slot];
      const item = eq ? EQUIPMENT(eq, true) : null;
      const isTwoHandOffHand = slot === 'offHand' && isTwoHanded;
      return {
        slot,
        prettyName: slotsInPrettyName(slot),
        itemName: isTwoHandOffHand
          ? EQUIPMENT(char.equipment.mainHand, true).name
          : item
            ? item.name
            : ['mainHand', 'offHand'].includes(slot)
              ? 'Fist'
              : '-',
        hasItem: !!eq,
        disabled: isTwoHandOffHand,
        level: item ? item.level || 1 : 0,
      };
    });
  };

  const state = {
    currentCharacter: null,
    currentCoreStats: null,
    currentStatGroups: null,
    currentSlots: [],
    currentAbilities: [],
    currentAvailableAbilities: [],
    currentLastTickEnd: 0,
  };

  const setupCharacter = (target) => {
    const index = Number($.page.params.characterIndex) || 0;
    const characterRef = $.characters[index];

    if (!characterRef) {
      target.currentCharacter = null;
      return;
    }

    const char = CHARACTERS(characterRef, true);
    const combatStats = calculateCombatStatsByCharacter(char);
    const slots = buildEquipmentSlots(char);

    const eq = char.equipment;
    const isShield = !!(eq.offHand && EQUIPMENT(eq.offHand, true).slotsIn === 'offHand');
    const isTwoHandedWeapon = !!(eq.mainHand && EQUIPMENT(eq.mainHand, true).slotsIn === 'twoHand');
    const isOneHandedMainhand = !!(
      eq.mainHand && EQUIPMENT(eq.mainHand, true).slotsIn === 'oneHand'
    );
    const isOneHandedOffhand = !!(eq.offHand && EQUIPMENT(eq.offHand, true).slotsIn === 'oneHand');
    const isOneHandedWeapon = isOneHandedMainhand || isOneHandedOffhand;

    const getBasicAbilities = (slot) => {
      if (!eq[slot]) return [];
      return EQUIPMENT(eq[slot], true)
        .abilities.map((a) => ABILITIES(a, true))
        .filter((a) => a.basic)
        .map((a, i) => ({
          ...ABILITIES(a),
          uuid: `${char.id}::${slot}::${eq[slot]?.id}::${a.id}::${a.name}::${i}`,
        }));
    };

    const punches = Array.from({ length: 6 }, (_, i) =>
      ABILITIES({
        id: 'punch',
        uuid: `${char.id}::${i < 3 ? 'mainHand' : 'offHand'}::_::punch::${i}`,
      }),
    );

    let defaultAbilities = [...punches];

    if (isTwoHandedWeapon) {
      defaultAbilities = getBasicAbilities('mainHand');
    } else if (isShield) {
      defaultAbilities = [];
      defaultAbilities.push(
        ...(isOneHandedWeapon ? getBasicAbilities('mainHand') : punches.slice(0, 3)),
      );
      defaultAbilities.push(...getBasicAbilities('offHand'));
    } else if (isOneHandedWeapon) {
      defaultAbilities = [];
      defaultAbilities.push(
        ...(isOneHandedMainhand ? getBasicAbilities('mainHand') : punches.slice(0, 3)),
      );
      defaultAbilities.push(
        ...(isOneHandedOffhand ? getBasicAbilities('offHand') : punches.slice(3, 6)),
      );
    }

    const currentOverrides = characterRef.overrides?.abilities || [];
    const nonBasicFromOverrides = currentOverrides.filter((a) => {
      try {
        return !ABILITIES(a, true).basic;
      } catch {
        return false;
      }
    });

    const merged = [
      ...nonBasicFromOverrides.map((a) => JSON.parse(JSON.stringify(a))),
      ...defaultAbilities,
    ];

    const mergedUuids = merged
      .map((a) => a.uuid)
      .sort()
      .join(',');
    const currentUuids = currentOverrides
      .map((a) => a.uuid)
      .sort()
      .join(',');
    if (mergedUuids !== currentUuids) {
      characterRef.overrides.abilities = merged;
    }

    const availableAbilities = calculateAvailableAbilitiesByCharacter(char);
    const activeAbilities = (characterRef.overrides?.abilities || []).map((a) =>
      ABILITIES(a, true),
    );
    const usedUuids = new Set(activeAbilities.map((a) => a.uuid));

    const availableNonBasic = availableAbilities
      .filter((a) => !ABILITIES(a, true).basic && !usedUuids.has(a.uuid))
      .map((a) => ABILITIES(a, true))
      .sort((a, b) => a.name.localeCompare(b.name))
      .sort((a, b) => a.ticks - b.ticks);

    const tickCells = 15;
    const abilityBarItems = activeAbilities.map((ability, i) => {
      const tickStart = calculateTickStart(activeAbilities, i);
      const widthPct = (ability.ticks / tickCells) * 100;
      return { ...ability, tickStart, widthPct, overTick: tickStart > 11 };
    });

    const lastTick = abilityBarItems.filter((a) => a.tickStart < char.maxTicks).at(-1);
    const lastTickEnd = lastTick ? lastTick.tickStart + lastTick.ticks : 0;

    const canRetire = getLevelByExperience($.experience) <= 4;

    target.currentCharacter = { ...char, slots, _canRetire: canRetire };
    target.currentCoreStats = {
      hp: combatStats.maxHealth || 0,
      armor: combatStats.maxArmor || 0,
      damage: combatStats.damage || 0,
    };
    target.currentStatGroups = buildStatGroups(combatStats);
    target.currentSlots = slots;
    target.currentAbilities = abilityBarItems;
    target.currentAvailableAbilities = availableNonBasic;
    target.currentLastTickEnd = lastTickEnd;
  };

  setupCharacter(state);
  component(state);

  const id = Object.keys(window.__vibeComponents).find((k) => window.__vibeComponents[k] === state);
  const s = $[id];

  $.on('afterUpdate', (current, prev) => {
    if (current.characters !== prev.characters || current.page !== prev.page) {
      setupCharacter(s);
    }
  });

  window.toggleDetailedView = () => {
    $.settings = {
      ...$.settings,
      showDetailedCharacterView: !$.settings.showDetailedCharacterView,
    };
  };

  window.retireCharacter = () => {
    const char = s.currentCharacter;
    $.overlay = {
      name: 'confirm',
      text: `You are retiring ${char.name}. Do you wish to proceed?`,
      confirm: () => {
        $.selectedBrawlers = $.selectedBrawlers.filter((uuid) => uuid !== char.uuid);
        window.location.href = '/brawlers';
        $.characters = [];
      },
    };
  };

  window.tryOutBuild = () => {
    const selected = $.characters[Number($.page.params.characterIndex)];
    if (!selected) return;
    const snapshot = JSON.parse(JSON.stringify(selected));
    const creature = CHARACTERS('trainingDummy', true);
    $.combat = generateCombat(prepareTeams(healFull([snapshot]), [creature]));
    $.overlay = { name: 'Combat' };
  };

  window.unequipSlot = (slot) => {
    const characterRef = $.characters[Number($.page.params.characterIndex)];
    const eq = characterRef?.overrides?.equipment?.[slot];
    if (eq) unequip(eq, slot);
  };

  import('/js/dnd.js').then(({ default: dnd }) => {
    dnd.init();

    const dndFlags = { draggingBasic: false };

    const characterRef = () => $.characters[Number($.page.params.characterIndex)];
    const zoneType = () => characterRef()?.uuid || 'abilities';

    $.on('ready', () => {
      const abilityOverlay = document.querySelector('ability-overlay');
      const availableGrid = document.querySelector('[available-grid]');

      if (abilityOverlay) {
        dnd.zone(abilityOverlay, {
          items: () => s.currentAbilities,
          type: zoneType(),
          direction: 'horizontal',
          constrainAxisY: () => dndFlags.draggingBasic,
          transformDraggedElement: (ghost, data) => {
            dndFlags.draggingBasic = !!data?.basic;
            window.hideTooltip();
          },
          onReorder: (newItems) => {
            const ref = characterRef();
            if (!ref) return;
            ref.overrides.abilities = newItems.map((a) => ({
              id: a.id,
              uuid: a.uuid,
              overrides: a.overrides,
            }));
            setupCharacter(s);
          },
          onReceive: (item, _fromZone, insertIndex) => {
            const ref = characterRef();
            if (!ref) return;
            const current = ref.overrides.abilities.slice();
            current.splice(insertIndex, 0, {
              id: item.id,
              uuid: item.uuid,
              overrides: item.overrides,
            });
            ref.overrides.abilities = current;
            setupCharacter(s);
          },
        });
      }

      if (availableGrid) {
        dnd.zone(availableGrid, {
          items: () => s.currentAvailableAbilities,
          type: zoneType(),
          direction: 'grid',
          dropFromOthersDisabled: () => dndFlags.draggingBasic,
          transformDraggedElement: (ghost) => {
            const ticks = ghost.querySelector('ability-tick-count');
            if (ticks) ticks.remove();
            window.hideTooltip();
          },
          onReceive: (item) => {
            const ref = characterRef();
            if (!ref) return;
            ref.overrides.abilities = ref.overrides.abilities.filter((a) => a.uuid !== item.uuid);
            setupCharacter(s);
          },
        });
      }
    });
  });
</script>

<page-content>
  <!-- if this.currentCharacter -->
  <crow vertical g="4" left>
    <component
      src="/components/TitleBar.html"
      title="@[this.currentCharacter.name]"
      back="/brawlers"
    >
      <accordion open="@[!settings.showDetailedCharacterView]">
        <accordion-content>
          <component
            src="/components/CoreStats.html"
            hp="@[this.currentCoreStats.hp]"
            armor="@[this.currentCoreStats.armor]"
            damage="@[this.currentCoreStats.damage]"
          ></component>
        </accordion-content>
      </accordion>

      <button class="crow" g="2" secondary onclick="toggleDetailedView()">
        <icon chevron-down animate-flip flip="@[settings.showDetailedCharacterView]"></icon>
        <!-- if settings.showDetailedCharacterView -->
        Simple view
        <!-- /if -->
        <!-- if !settings.showDetailedCharacterView -->
        Show stats
        <!-- /if -->
      </button>

      <!-- if this.currentCharacter._canRetire -->
      <button secondary bg-red text-red onclick="retireCharacter()">Retire</button>
      <!-- /if -->
    </component>
    <hr />

    <crow left up g="4" w="full" main-content>
      <crow vertical left f="none" avatar-col>
        <component
          src="/components/CharacterAvatar.html"
          image="@[this.currentCharacter.image]"
          size="@[this.currentCharacter.size]"
          name="@[this.currentCharacter.name]"
        ></component>
      </crow>

      <crow vertical left f="2" detail-col>
        <accordion open="@[settings.showDetailedCharacterView]">
          <accordion-content>
            <crow up left g="8" f="none" stats-panel>
              <crow vertical left>
                <component
                  src="/components/StatGroup.html"
                  title="Base Stats"
                  rows="@[this.currentStatGroups.base]"
                ></component>
                <kingstone h="10"></kingstone>
                <component
                  src="/components/StatGroup.html"
                  title="Lucky Stats"
                  lucky="@[true]"
                  rows="@[this.currentStatGroups.lucky]"
                ></component>
              </crow>

              <crow vertical left>
                <component
                  src="/components/StatGroup.html"
                  title="Modifiers"
                  rows="@[this.currentStatGroups.modifiers]"
                ></component>
                <kingstone h="4"></kingstone>
                <component
                  src="/components/StatGroup.html"
                  title="Resistances"
                  rows="@[this.currentStatGroups.resistances]"
                ></component>
              </crow>
            </crow>
          </accordion-content>
        </accordion>

        <equipment-heading open="@[settings.showDetailedCharacterView]">
          <equipment-heading-content>
            <kingstone h="4"></kingstone>
            <h5>Equipment</h5>
            <hr />
          </equipment-heading-content>
        </equipment-heading>

        <component
          src="/components/CharacterEquipmentList.html"
          slots="@[this.currentSlots]"
        ></component>
      </crow>
    </crow>

    <kingstone h="20"></kingstone>

    <component
      src="/components/CharacterAbilitiesSection.html"
      abilities="@[this.currentAbilities]"
      available="@[this.currentAvailableAbilities]"
      lasttick="@[this.currentLastTickEnd]"
    ></component>
  </crow>
  <!-- /if -->

  <!-- if !this.currentCharacter -->
  <crow vertical g="4" detail-empty>
    <p text-muted>No brawler found.</p>
    <component src="/components/BackButton.html" href="/brawlers"></component>
  </crow>
  <!-- /if -->
</page-content>

<style>
  equipment-heading h5 {
    margin: 0;
  }

  equipment-heading hr {
    width: 100%;
    margin: calc(var(--unit) * 1) 0 calc(var(--unit) * 2) 0;
  }

  equipment-heading-content {
    overflow: hidden;
    min-height: 0;
  }

  @media (width <= 768px) {
    [main-content] {
      flex-direction: column;
      align-items: stretch;
    }

    [avatar-col] {
      width: 100%;
      align-items: center;
    }

    [stats-panel] {
      flex-direction: column;
      gap: calc(var(--unit) * 4);
    }
  }
</style>
