<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Brawlers</title>
  <link rel="icon" href="/static/favicon.png" />
  <link rel="stylesheet" href="/css/index.css" />
</head>

<body battle-brawlers vibe vibe-fouc stylecheat>
  <script type="module">
    import boot from '/js/boot.js';
    boot();

    import { ALL_FIGHTS } from '/js/constants/FIGHTS.js';
    import CHARACTERS from '/js/constants/CHARACTERS.js';
    import { generateCombat, prepareTeams } from '/js/combat.js';
    import { calculateCombatStatsByCharacter } from '/js/utils.js';
    import ABILITIES from '/js/constants/ABILITIES.js';
    import { notify } from '/js/actions.js';
    import formatDescription from '/js/formatDescription.js';
    window.formatDescription = formatDescription;

    const fightId = $.routeParams.fightId;
    const fight = ALL_FIGHTS.find(f => f.id === fightId);

    if (fight) {
      // Apply level overrides to fight characters
      const characters = fight.characters.map(charRef => ({
        ...charRef,
        overrides: {
          ...charRef?.overrides,
          level: fight.minLevel,
          equipment: {
            mainHand: { overrides: { level: fight.minLevel } },
            offHand: { overrides: { level: fight.minLevel } },
            armor: { overrides: { level: fight.minLevel } }
          }
        }
      }));

      // Hydrate enemies for display. Abilities live in a flat top-level state
      // array because arrays can't cleanly pass through component props inside
      // iterations (iterate.js stringifies them) — AbilityBar reads directly
      // from $.enemyAbilityBars[idx] instead, indexed by iteration position.
      const abilityBars = [];
      $.currentFight = {
        ...fight,
        characters,
        enemies: characters.map((ref, idx) => {
          try {
            const char = CHARACTERS(ref, true);
            const stats = calculateCombatStatsByCharacter(char);
            let tickCursor = 0;
            const abilities = char.abilities.map(a => {
              try {
                const h = ABILITIES(a, true);
                const tickStart = tickCursor;
                tickCursor += h.ticks;
                return {
                  name: h.name,
                  ticks: h.ticks,
                  icon: h.icon,
                  basic: !!h.basic,
                  tickStart,
                  overflow: tickStart >= 12,
                };
              } catch {
                return { name: '?', ticks: 0, icon: '', basic: false, tickStart: 0, overflow: false };
              }
            });
            const lastTick = tickCursor;
            abilityBars[idx] = { abilities, lastTick };
            return {
              name: char.name, image: char.image, race: char.race,
              description: char.description || '',
              maxHealth: stats.maxHealth, maxArmor: stats.maxArmor, damage: stats.damage,
              abilities,
              lastTick,
            };
          } catch {
            return { name: '?', image: '', race: '', description: '', maxHealth: 0, maxArmor: 0, damage: 0, abilities: [] };
          }
        })
      };
      $.enemyAbilityBars = abilityBars;

      $.maxBrawlers = fight.allowedNumberOfCharacters;
      $.selectedBrawlers = [];
    }

    window.updateFightSlots = () => {
      const count = $.currentFight?.allowedNumberOfCharacters || 1;
      const C = window.CHARACTERS || CHARACTERS;
      const A = window.ABILITIES_FN || ABILITIES;
      $.brawlerSlots = Array.from({ length: count }, (_, i) => {
        const uuid = $.selectedBrawlers[i];
        if (!uuid) return { empty: true, index: i };
        const ref = $.characters.find(c => c.uuid === uuid);
        if (!ref) return { empty: true, index: i };
        try {
          const char = C(ref, true);
          const abilities = char.abilities.map(a => {
            try { const h = A(a, true); return { icon: h.icon, ticks: h.ticks }; }
            catch { return null; }
          }).filter(Boolean);
          return { empty: false, name: char.name, image: char.image, mugshot: char.image.replace('.png', '-mugshot.png'), abilities, index: i };
        } catch {
          return { empty: true, index: i };
        }
      });
    };
    window.updateFightSlots();

    window.startFight = () => {
      const fight = ALL_FIGHTS.find(f => f.id === $.routeParams.fightId);
      if (!fight) return;

      const selected = $.characters.filter(c => $.selectedBrawlers.includes(c.uuid));
      if (selected.length === 0) return;

      // Check if any selected brawler has 0 HP
      if (selected.some(c => {
        try { return CHARACTERS(c, true).combatStats.currentHealth <= 0; } catch { return false; }
      })) {
        notify({ warning: 'One of your brawlers is knocked out!' });
        return;
      }

      const enemies = fight.characters.map(charRef => ({
        ...charRef,
        overrides: {
          ...charRef?.overrides, level: fight.minLevel,
          equipment: { mainHand: { overrides: { level: fight.minLevel } }, offHand: { overrides: { level: fight.minLevel } }, armor: { overrides: { level: fight.minLevel } } }
        }
      }));

      $.combat = generateCombat(prepareTeams(JSON.parse(JSON.stringify(selected)), enemies), undefined, fight.id);
      $.selectedBrawlers = [];
      $.elapsedMilliseconds = 0;
      $.overlay = 'Combat';
    };
  </script>

  <component src="/components/Layout.html">
    <page-content>

      <!-- if currentFight -->
      <component src="/components/TitleBar.html" title="@[currentFight.name]" back="/the-arena">
        <badge>
          @[currentFight.allowedNumberOfCharacters]&nbsp;vs&nbsp;@[currentFight.enemies.length]
        </badge>
        <!-- if currentFight.boss -->
        <badge bg="var(--red)">Bossfight</badge>
        <badge bg="var(--slate)">Luck disabled</badge>
        <!-- /if -->
      </component>
      <hr />

      <!-- each currentFight.enemies as enemy, i -->
      <crow left fight-enemy-row>
        <crow w="0" overflow-hidden>
          <component src="/components/CoreStats.html" hp="@[enemy.maxHealth]"
            armor="@[enemy.maxArmor]" damage="@[enemy.damage]" vertical></component>
        </crow>

        <crow vertical up left fight-info-col>
          <crow left text-lg mb-4>
            <component src="/components/CoreStats.html" hp="@[enemy.maxHealth]"
              armor="@[enemy.maxArmor]" damage="@[enemy.damage]"></component>
          </crow>

          <enemy-description h="60">
            <!-- if enemy.description -->
            <p text-sm fight-enemy-description>@[enemy.description]</p>
            <!-- /if -->
          </enemy-description>

          <h5>Abilities</h5>
          <component src="/components/AbilityBar.html" idx="@[i]" dndDisabled minimalistic>
          </component>
        </crow>

        <fight-enemy-image block flex-none relative>
          <img t-0 r-0 b-0 l-0 absolute w-full data-src="/static/images/races/@[enemy.image]"
            alt="" />
        </fight-enemy-image>
      </crow>
      <!-- /each -->

      <hr />

      <crow vertical w-full g-2>
        <!-- each brawlerSlots as slot, i -->
        <component src="/components/BrawlerSlot.html" idx="@[i]"></component>
        <!-- /each -->
      </crow>

      <!-- /if -->

      <!-- if !currentFight -->
      <crow vertical g-4 fight-empty>
        <p text-muted>Fight not found.</p>
        <a href="/the-arena">&#x2039; Back</a>
      </crow>
      <!-- /if -->

    </page-content>

    <!-- if currentFight -->
    <stay reverse w-full sm:b="8" p="3">
      <button mx-auto primary onclick="startFight()"
        disabled="@[selectedBrawlers.length === 0 || combat.duration !== 0]">
        Fight
      </button>
    </stay>
    <!-- /if -->
  </component>
  <style>
    page[the-arena-fightId] [fight-enemy-row] {
      align-items: stretch;
      overflow: hidden;
    }

    page[the-arena-fightId] [fight-enemy-description] {
      white-space: pre-line;
    }

    page[the-arena-fightId] [fight-info-col] {
      flex: 1;
      min-width: 0;
    }

    page[the-arena-fightId] fight-enemy-image {
      width: calc(var(--unit) * 40);
      pointer-events: none;
      transform: scaleX(-1);
    }

    @media (width <= 768px) {
      page[the-arena-fightId] fight-enemy-image {
        width: calc(var(--unit) * 24);
      }
    }

    page[the-arena-fightId] stay {
      background: var(--background);
    }

    page[the-arena-fightId] stay button {
      min-width: calc(var(--unit) * 50);
    }
  </style>
</body>

</html>
