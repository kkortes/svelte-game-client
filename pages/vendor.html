<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Brawlers</title>
  <link rel="icon" href="/static/favicon.png" />
  <link rel="stylesheet" href="/css/index.css" />
</head>

<body battle-brawlers vibe vibe-fouc stylecheat>
  <script type="module">
    import boot from '/js/boot.js';
    boot();

    import EQUIPMENT, { ALL_EQUIPMENT } from '/js/constants/EQUIPMENT.js';
    import { slotsInPrettyName } from '/js/equipment.js';
    import { formatCoins } from '/js/coin.js';
    import { notify } from '/js/actions.js';

    const EQUIPMENT_TYPES = ['oneHand', 'offHand', 'twoHand', 'armor', 'accessory', 'trinket'];

    $.vendorItems = Object.keys(ALL_EQUIPMENT).map(key => {
      const item = EQUIPMENT(key, true);
      return { ...item, id: key, slotLabel: slotsInPrettyName(item.slotsIn) };
    });
    $.vendorFilter = 'all';
    $.vendorFiltered = $.vendorItems;

    window.vendorFilterBy = (type) => {
      if (type === $.vendorFilter) type = 'all';
      $.vendorFilter = type;
      $.vendorFiltered = type === 'all'
        ? $.vendorItems
        : $.vendorItems.filter(item => item.slotsIn.includes(type));
    };

    const countByType = (type) => $.vendorItems.filter(item => item.slotsIn.includes(type)).length;
    $.vendorCounts = {
      oneHand: countByType('oneHand'),
      offHand: countByType('offHand'),
      twoHand: countByType('twoHand'),
      armor: countByType('armor'),
      accessory: countByType('accessory'),
      trinket: countByType('trinket')
    };

    window.vendorAcquire = (itemId) => {
      const item = EQUIPMENT(itemId, false);
      const { cost, level } = EQUIPMENT(item, true);
      item.overrides = { level };

      if ($.coins < cost) {
        notify({ warning: 'Not enough coins.' });
        return;
      }

      const { silver, copper } = formatCoins(cost);
      const coinText = (silver ? silver + 's ' : '') + copper + 'c';

      $.dialog = {
        dialogId: 'confirm',
        props: {
          text: `Are you sure you want to acquire this equipment for ${coinText}?`,
          confirm: () => {
            $.coins -= cost;
            $.inventory.push(item);
            notify({ success: 'Equipment acquired!' });
          }
        }
      };
    };

    // Tooltip via event delegation — works even after filter changes
    window.vendorTooltipInit = () => {
      const container = document.querySelector('page-content [vendor-table]');
      if (!container) return;

      container.addEventListener('mouseenter', (e) => {
        const row = e.target.closest('[vendor-row]');
        if (!row) return;
        const eqLink = row.querySelector('eq-link');
        if (!eqLink) return;

        // Find which item this row corresponds to
        const rows = [...container.querySelectorAll('[vendor-row]')];
        const idx = rows.indexOf(row);
        const item = $.vendorFiltered[idx];
        if (!item) return;

        const rect = eqLink.getBoundingClientRect();
        $.tooltip = {
          x: rect.left + rect.width / 2,
          y: rect.top,
          visible: true,
          props: {
            name: item.name,
            level: item.level,
            description: item.description,
            combatStats: item.combatStats,
            slotsIn: item.slotsIn
          }
        };
      }, true);

      container.addEventListener('mouseleave', (e) => {
        const row = e.target.closest('[vendor-row]');
        if (row && $.tooltip) $.tooltip.visible = false;
      }, true);
    };

    setTimeout(vendorTooltipInit, 500);
  </script>

  <component src="/components/Layout.html">
    <page-content>

      <h3 mb-4>Vendor</h3>

      <hr />

      <crow g-1 sm vendor-filters>
        <button f-1 primary="@[$.vendorFilter === 'all']"
          tertiary="@[$.vendorFilter !== 'all']"
          onclick="vendorFilterBy('all')">
          All (@[$.vendorItems.length])
        </button>
        <button f-1 primary="@[$.vendorFilter === 'oneHand']"
          tertiary="@[$.vendorFilter !== 'oneHand']"
          onclick="vendorFilterBy('oneHand')">
          One-Handed (@[vendorCounts.oneHand])
        </button>
        <button f-1 primary="@[$.vendorFilter === 'offHand']"
          tertiary="@[$.vendorFilter !== 'offHand']"
          onclick="vendorFilterBy('offHand')">
          Off-Hand (@[vendorCounts.offHand])
        </button>
        <button f-1 primary="@[$.vendorFilter === 'twoHand']"
          tertiary="@[$.vendorFilter !== 'twoHand']"
          onclick="vendorFilterBy('twoHand')">
          Two-Handed (@[vendorCounts.twoHand])
        </button>
        <button f-1 primary="@[$.vendorFilter === 'armor']"
          tertiary="@[$.vendorFilter !== 'armor']"
          onclick="vendorFilterBy('armor')">
          Armor (@[vendorCounts.armor])
        </button>
        <button f-1 primary="@[$.vendorFilter === 'accessory']"
          tertiary="@[$.vendorFilter !== 'accessory']"
          onclick="vendorFilterBy('accessory')">
          Accessory (@[vendorCounts.accessory])
        </button>
        <button f-1 primary="@[$.vendorFilter === 'trinket']"
          tertiary="@[$.vendorFilter !== 'trinket']"
          onclick="vendorFilterBy('trinket')">
          Trinket (@[vendorCounts.trinket])
        </button>
      </crow>

      <crow vertical up left vendor-table mt-4>
        <crow up left vendor-header>
          <vendor-col-name cinzel>Name</vendor-col-name>
          <vendor-col-slot cinzel>Slots in</vendor-col-slot>
          <vendor-col-cost cinzel>Cost</vendor-col-cost>
          <vendor-col-action></vendor-col-action>
        </crow>

        <!-- each vendorFiltered as item, i -->
        <crow left vendor-row even="@[i % 2 === 0]">
          <crow left vendor-col-name>
            <eq-link
              tier="@[item.level >= 25 ? 'red' : item.level >= 20 ? 'orange' : item.level >= 15 ? 'purple' : item.level >= 10 ? 'blue' : item.level >= 5 ? 'green' : 'gray']">
              <eq-bg-center></eq-bg-center>
              <eq-bg-left></eq-bg-left>
              <eq-bg-right></eq-bg-right>
              <crow eq-name left>@[item.name]</crow>
            </eq-link>
          </crow>
          <vendor-col-slot text-sm text-muted>@[item.slotLabel]</vendor-col-slot>
          <vendor-col-cost>
            <component src="/components/Coins.html" amount="@[item.cost]"></component>
          </vendor-col-cost>
          <crow vendor-col-action right>
            <button secondary sm onclick="vendorAcquire('@[item.id]')"
              disabled="@[$.coins < item.cost]">Acquire</button>
          </crow>
        </crow>
        <!-- /each -->
      </crow>
    </page-content>
  </component>
  <style>
    page[vendor] [vendor-filters] {
      flex-wrap: wrap;
    }

    page[vendor] [vendor-table] {
      margin-left: calc(var(--unit) * -4);
      margin-right: calc(var(--unit) * -4);
      width: auto;
    }

    page[vendor] [vendor-header] {
      gap: calc(var(--unit) * 4);
      padding: calc(var(--unit) * 2) calc(var(--unit) * 6);
    }

    page[vendor] [vendor-row] {
      width: 100%;
      gap: calc(var(--unit) * 4);
      padding: calc(var(--unit) * 2) calc(var(--unit) * 6);
      font-size: 0.875rem;
    }

    page[vendor] [vendor-row][even] {
      background: #fafaf9;
    }

    page[vendor] [vendor-row]:not([even]) {
      background: white;
    }

    page[vendor] vendor-col-name,
    page[vendor] [vendor-col-name],
    page[vendor] vendor-col-slot,
    page[vendor] [vendor-col-slot],
    page[vendor] vendor-col-cost,
    page[vendor] [vendor-col-cost] {
      flex: 1;
    }

    page[vendor] vendor-col-action,
    page[vendor] [vendor-col-action] {
      width: calc(var(--unit) * 20);
      flex: none;
    }

    page[vendor] vendor-col-name,
    page[vendor] vendor-col-slot,
    page[vendor] vendor-col-cost,
    page[vendor] vendor-col-action {
      display: block;
    }
  </style>
</body>

</html>
