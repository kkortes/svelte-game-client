<script type="module">
  import EQUIPMENT, { ALL_EQUIPMENT } from '/js/constants/EQUIPMENT.js';
  import { slotsInPrettyName } from '/js/equipment.js';
  import { formatCoins } from '/js/coin.js';
  import { notify } from '/js/actions.js';

  const EQUIPMENT_TYPES = ['oneHand', 'offHand', 'twoHand', 'armor', 'accessory', 'trinket'];

  $.vendorItems = Object.keys(ALL_EQUIPMENT).map(key => {
    const item = EQUIPMENT(key, true);
    return { ...item, id: key, slotLabel: slotsInPrettyName(item.slotsIn) };
  });
  $.vendorFilter = 'all';
  $.vendorFiltered = $.vendorItems;

  window.vendorFilterBy = (type) => {
    if (type === $.vendorFilter) type = 'all';
    $.vendorFilter = type;
    $.vendorFiltered = type === 'all'
      ? $.vendorItems
      : $.vendorItems.filter(item => item.slotsIn.includes(type));
  };

  const countByType = (type) => $.vendorItems.filter(item => item.slotsIn.includes(type)).length;
  $.vendorCounts = {
    oneHand: countByType('oneHand'),
    offHand: countByType('offHand'),
    twoHand: countByType('twoHand'),
    armor: countByType('armor'),
    accessory: countByType('accessory'),
    trinket: countByType('trinket')
  };

  window.vendorAcquire = (itemId) => {
    const item = EQUIPMENT(itemId, false);
    const { cost, level } = EQUIPMENT(item, true);
    item.overrides = { level };

    if ($.coins < cost) {
      notify({ warning: 'Not enough coins.' });
      return;
    }

    const { silver, copper } = formatCoins(cost);
    const coinText = (silver ? silver + 's ' : '') + copper + 'c';

    $.dialog = {
      dialogId: 'confirm',
      props: {
        text: `Are you sure you want to acquire this equipment for ${coinText}?`,
        confirm: () => {
          $.coins -= cost;
          $.inventory.push(item);
          notify({ success: 'Equipment acquired!' });
        }
      }
    };
  };

  // Tooltip via event delegation — works even after filter changes
  window.vendorTooltipInit = () => {
    const container = document.querySelector('page-vendor [vendor-table]');
    if (!container) return;

    container.addEventListener('mouseenter', (e) => {
      const row = e.target.closest('[vendor-row]');
      if (!row) return;
      const eqLink = row.querySelector('eq-link');
      if (!eqLink) return;

      // Find which item this row corresponds to
      const rows = [...container.querySelectorAll('[vendor-row]')];
      const idx = rows.indexOf(row);
      const item = $.vendorFiltered[idx];
      if (!item) return;

      const rect = eqLink.getBoundingClientRect();
      $.tooltip = {
        x: rect.left + rect.width / 2,
        y: rect.top,
        visible: true,
        props: {
          name: item.name,
          level: item.level,
          description: item.description,
          combatStats: item.combatStats,
          slotsIn: item.slotsIn
        }
      };
    }, true);

    container.addEventListener('mouseleave', (e) => {
      const row = e.target.closest('[vendor-row]');
      if (row && $.tooltip) $.tooltip.visible = false;
    }, true);
  };

  setTimeout(vendorTooltipInit, 500);
</script>

<page-vendor>
<crow justify-between left>
  <h3>Vendor</h3>
</crow>
<hr headline-hr />

<crow vendor-filters g-1>
  <button
    tertiary vendor-filter-btn
    data-active="@[$.vendorFilter === 'all']"
    onclick="vendorFilterBy('all')"
  >All (@[$.vendorItems.length])</button>
  <button
    tertiary vendor-filter-btn
    data-active="@[$.vendorFilter === 'oneHand']"
    onclick="vendorFilterBy('oneHand')"
  >One-Handed (@[vendorCounts.oneHand])</button>
  <button
    tertiary vendor-filter-btn
    data-active="@[$.vendorFilter === 'offHand']"
    onclick="vendorFilterBy('offHand')"
  >Off-Hand (@[vendorCounts.offHand])</button>
  <button
    tertiary vendor-filter-btn
    data-active="@[$.vendorFilter === 'twoHand']"
    onclick="vendorFilterBy('twoHand')"
  >Two-Handed (@[vendorCounts.twoHand])</button>
  <button
    tertiary vendor-filter-btn
    data-active="@[$.vendorFilter === 'armor']"
    onclick="vendorFilterBy('armor')"
  >Armor (@[vendorCounts.armor])</button>
  <button
    tertiary vendor-filter-btn
    data-active="@[$.vendorFilter === 'accessory']"
    onclick="vendorFilterBy('accessory')"
  >Accessory (@[vendorCounts.accessory])</button>
  <button
    tertiary vendor-filter-btn
    data-active="@[$.vendorFilter === 'trinket']"
    onclick="vendorFilterBy('trinket')"
  >Trinket (@[vendorCounts.trinket])</button>
</crow>

<crow vertical up left vendor-table mt-4>
  <crow up left vendor-header>
    <vendor-col-name cinzel>Name</vendor-col-name>
    <vendor-col-slot cinzel>Slots in</vendor-col-slot>
    <vendor-col-cost cinzel>Cost</vendor-col-cost>
    <vendor-col-action></vendor-col-action>
  </crow>

  <!-- each vendorFiltered as item, i -->
  <crow left vendor-row data-even="@[i % 2 === 0]">
    <crow left vendor-col-name>
      <eq-link data-tier="@[item.level >= 25 ? 'red' : item.level >= 20 ? 'orange' : item.level >= 15 ? 'purple' : item.level >= 10 ? 'blue' : item.level >= 5 ? 'green' : 'gray']">
        <eq-bg-center></eq-bg-center>
        <eq-bg-left></eq-bg-left>
        <eq-bg-right></eq-bg-right>
        <crow eq-name left>@[item.name]</crow>
      </eq-link>
    </crow>
    <vendor-col-slot text-sm text-muted>@[item.slotLabel]</vendor-col-slot>
    <vendor-col-cost>
      <crow g-1 text-sm right>
        <!-- if Math.floor(item.cost / 100) > 0 -->
        <span>@[Math.floor(item.cost / 100)]×</span><coin-icon coin-silver></coin-icon>
        <!-- /if -->
        <!-- if item.cost % 100 > 0 -->
        <span>@[item.cost % 100]×</span><coin-icon coin-copper></coin-icon>
        <!-- /if -->
      </crow>
    </vendor-col-cost>
    <crow vendor-col-action right>
      <button
        tertiary text-sm
        onclick="vendorAcquire('@[item.id]')"
        data-disabled="@[$.coins < item.cost]"
      >Acquire</button>
    </crow>
  </crow>
  <!-- /each -->
</crow>
</page-vendor>

<style>
page-vendor [vendor-filters] { display: flex; flex-wrap: wrap; align-items: stretch; justify-content: stretch; }
page-vendor [vendor-filter-btn] { flex: 1; }
page-vendor [vendor-filter-btn][data-active="true"] { opacity: 1; background: var(--accent); }
page-vendor [vendor-table] { margin-left: -16px; margin-right: -16px; width: auto; }
page-vendor [vendor-header] { gap: 16px; padding: 8px 24px; }
page-vendor [vendor-row] { width: 100%; gap: 16px; padding: 8px 24px; font-size: 0.875rem; }
page-vendor [vendor-row][data-even="true"] { background: #fafaf9; }
page-vendor [vendor-row][data-even="false"] { background: white; }
page-vendor vendor-col-name { display: block; }
page-vendor [vendor-col-name] { flex: 1; }
page-vendor vendor-col-slot { display: block; flex: 1; }
page-vendor vendor-col-cost { display: block; flex: 1; }
page-vendor vendor-col-action { display: block; }
page-vendor [vendor-col-action] { width: 80px; flex: none; }
page-vendor coin-icon { display: inline-block; width: 16px; height: 16px; border-radius: 50%; border: 0.5px solid rgba(0,0,0,0.3); box-shadow: 0.5px 0.5px 0 rgba(0,0,0,0.5); vertical-align: middle; }
page-vendor [coin-silver] { background: oklch(0.7 0.1 200); }
page-vendor [coin-copper] { background: oklch(0.65 0.12 60); }
</style>
