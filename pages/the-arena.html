<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Brawlers</title>
  <link rel="icon" href="/static/favicon.png" />
  <link rel="stylesheet" href="/css/index.css" />
</head>

<body battle-brawlers vibe vibe-fouc stylecheat>
  <script type="module">
    import boot from '/js/boot.js';
    boot();

    import { ALL_FIGHTS } from '/js/constants/FIGHTS.js';
    import CHARACTERS from '/js/constants/CHARACTERS.js';
    import { getExperienceReward, getLevelByExperience } from '/js/level.js';

    // Hydrate once — constant display data, not on $.
    // Sorted and enriched from the FIGHTS + CHARACTERS registries.
    const hideTreshold = $.bossHighscore + 5;
    const ludusLevel = getLevelByExperience($.experience);

    window.arenaFights = [...ALL_FIGHTS].sort((a, b) => {
      if (a.minLevel !== b.minLevel) return a.minLevel - b.minLevel;
      if (a.boss !== b.boss) return a.boss ? 1 : -1;
      return a.maxLevel - b.maxLevel;
    }).map((fight, i) => {
      const enemies = fight.characters.map(charRef => {
        try {
          const hydrated = CHARACTERS({
            ...charRef,
            overrides: {
              ...charRef?.overrides, level: fight.minLevel,
              equipment: {
                mainHand: { overrides: { level: fight.minLevel } },
                offHand: { overrides: { level: fight.minLevel } },
                armor: { overrides: { level: fight.minLevel } }
              }
            }
          }, true);
          return { image: hydrated.image, name: hydrated.name };
        } catch { return { image: '', name: '?' }; }
      });
      return {
        id: fight.id, name: fight.name,
        minLevel: fight.minLevel, maxLevel: fight.maxLevel,
        levelText: fight.minLevel === fight.maxLevel ? String(fight.minLevel) : `${fight.minLevel} - ${fight.maxLevel}`,
        boss: fight.boss,
        xp: getExperienceReward(fight.characters.length, fight.minLevel, fight.maxLevel, fight.boss),
        isLocked: hideTreshold < fight.minLevel,
        bossCompleted: fight.boss && $.bossHighscore >= fight.minLevel,
        xpDimmed: ludusLevel > fight.maxLevel,
        even: i % 2 === 0,
        enemies,
      };
    });

    window.arenaClick = (e, id, isLocked, bossCompleted) => {
      if (isLocked || bossCompleted) {
        e.preventDefault();
        e.stopPropagation();
        return;
      }
    };
  </script>

  <component src="/components/Layout.html">
    <page-content>

      <component src="/components/TitleBar.html" title="The arena"></component>
      <hr />

      <crow vertical up left arena-table mx="-6" w="auto" mt-4>
        <crow up left g-4 arena-header>
          <arena-col-name>name</arena-col-name>
          <arena-col-level text-center>level</arena-col-level>
          <arena-col-loot>loot</arena-col-loot>
          <crow arena-col-preview right></crow>
        </crow>

        <!-- each window.arenaFights as fight, i -->
        <a href="/the-arena/@[fight.id]"
          onclick="arenaClick(event, '@[fight.id]', @[fight.isLocked], @[fight.bossCompleted])"
          arena-row even="@[fight.even]" boss="@[fight.boss]" locked="@[fight.isLocked]"
          completed="@[fight.bossCompleted]">
          <crow left arena-col-name cinzel g-2>
            <!-- if fight.isLocked -->
            <span>?</span>
            <!-- /if -->
            <!-- if !fight.isLocked -->
            <span fight-name>@[fight.name]</span>
            <!-- /if -->
            <!-- if fight.boss -->
            <badge bg="var(--red)">Bossfight</badge>
            <!-- /if -->
          </crow>

          <arena-col-level text-center text-sm>
            @[fight.levelText]
          </arena-col-level>

          <arena-col-loot text-sm>
            <!-- if fight.xpDimmed -->
            <span arena-xp-dimmed>@[fight.xp] XP</span>
            <!-- /if -->
            <!-- if !fight.xpDimmed -->
            <span>@[fight.xp] XP</span>
            <!-- /if -->
          </arena-col-loot>

          <crow arena-col-preview right>
            <!-- each fight.enemies as enemy -->
            <arena-enemy-wrap boss="@[fight.boss]">
              <crow arena-enemy-box glass locked="@[fight.isLocked]">
                <!-- if fight.isLocked -->
                <crow arena-enemy-locked>?</crow>
                <!-- /if -->
                <!-- if !fight.isLocked -->
                <img data-src="/static/images/races/@[enemy.image]" alt="" arena-enemy-img
                  completed="@[fight.bossCompleted]" />
                <!-- /if -->
              </crow>
            </arena-enemy-wrap>
            <!-- /each -->
          </crow>
        </a>
        <!-- /each -->
      </crow>

    </page-content>
  </component>
  <style>
    page[the-arena] [arena-header] {
      display: flex;
      align-items: center;
      gap: calc(var(--unit) * 4);
      padding: calc(var(--unit) * 3) calc(var(--unit) * 6);
      width: 100%;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: oklch(from var(--foreground) l c h / 0.5);
      border-bottom: 1px solid oklch(from var(--bb-brown) l c h / 0.2);
    }


    page[the-arena] arena-col-name,
    page[the-arena] [arena-col-name] {
      display: flex;
      flex: 1;
    }

    page[the-arena] [arena-col-name] [fight-name] {
      line-height: 0;
    }

    page[the-arena] arena-col-level {
      display: block;
      width: calc(var(--unit) * 12);
      flex: none;
    }

    page[the-arena] badge {
      font-weight: 300;
    }

    page[the-arena] arena-col-loot {
      display: block;
      width: calc(var(--unit) * 12);
      flex: none;
    }

    page[the-arena] [arena-col-preview] {
      width: calc(var(--unit) * 30);
      flex: none;
    }

    page[the-arena] [arena-row] {
      display: flex;
      align-items: center;
      gap: calc(var(--unit) * 4);
      padding: calc(var(--unit) * 3) calc(var(--unit) * 6);
      text-decoration: none;
      color: var(--foreground);
      font-size: 0.875rem;
      transition: background 200ms ease;
      width: 100%;
    }

    page[the-arena] [arena-row] arena-col-level,
    page[the-arena] [arena-row] arena-col-loot {
      font-variant-numeric: tabular-nums;
      color: var(--muted-foreground);
    }

    page[the-arena] [arena-row][even] {
      background: oklch(from var(--foreground) l c h / 0.04);
    }

    [dark] page[the-arena] [arena-row][even] {
      background: oklch(from var(--foreground) l c h / 0.08);
    }

    page[the-arena] [arena-row]:not([even]) {
      background: transparent;
    }

    page[the-arena] [arena-row][boss] {
      margin-top: calc(var(--unit) * 12);
      padding-top: calc(var(--unit) * 8);
      padding-bottom: calc(var(--unit) * 8);
    }

    page[the-arena] [arena-row][boss]+[arena-row][boss] {
      margin-top: 0;
    }

    page[the-arena] [arena-row]:not([locked]):not([completed]):hover {
      background: oklch(from var(--bb-brown) l c h / 0.08);
    }

    page[the-arena] [arena-row][locked] {
      opacity: 0.5;
      cursor: default;
    }

    page[the-arena] [arena-row][completed] {
      cursor: default;
    }

    page[the-arena] [arena-xp-dimmed] {
      color: var(--muted-foreground);
      text-decoration: line-through;
    }

    page[the-arena] arena-enemy-wrap {
      display: block;
      width: calc(var(--unit) * 7);
      flex: none;
    }

    page[the-arena] arena-enemy-wrap[boss] {
      width: calc(var(--unit) * 14);
    }

    page[the-arena] [arena-enemy-box] {
      width: calc(var(--unit) * 11);
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 0;
      margin: calc(var(--unit) * -3) 0 calc(var(--unit) * -3) calc(var(--unit) * 2);
      position: relative;
    }

    page[the-arena] arena-enemy-wrap[boss] [arena-enemy-box] {
      width: calc(var(--unit) * 18);
      margin-top: calc(var(--unit) * -8);
      margin-bottom: calc(var(--unit) * -8);
    }

    page[the-arena] [arena-enemy-box]:not([locked]) {
      align-items: flex-start;
    }

    page[the-arena] [arena-enemy-locked] {
      width: calc(var(--unit) * 5);
      flex: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.25);
      font-weight: bold;
      color: white;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
    }

    page[the-arena] [arena-enemy-img] {
      width: 120%;
      max-width: none;
      height: auto;
      transform: scaleX(-1);
    }

    page[the-arena] [arena-enemy-img][completed] {
      filter: grayscale(1);
    }

    @media (width <= 768px) {
      page[the-arena] [arena-header],
      page[the-arena] [arena-row] {
        gap: calc(var(--unit) * 2);
        padding: calc(var(--unit) * 3) calc(var(--unit) * 3);
      }

      page[the-arena] arena-col-level,
      page[the-arena] arena-col-loot {
        width: calc(var(--unit) * 10);
      }

      page[the-arena] [arena-col-preview] {
        width: calc(var(--unit) * 14);
      }

      page[the-arena] arena-enemy-wrap {
        width: calc(var(--unit) * 4);
      }

      page[the-arena] arena-enemy-wrap[boss] {
        width: calc(var(--unit) * 8);
      }

      page[the-arena] [arena-enemy-box] {
        width: calc(var(--unit) * 6);
        margin: calc(var(--unit) * -1.5) 0 calc(var(--unit) * -1.5) var(--unit);
      }

      page[the-arena] arena-enemy-wrap[boss] [arena-enemy-box] {
        width: calc(var(--unit) * 10);
        margin-top: calc(var(--unit) * -3);
        margin-bottom: calc(var(--unit) * -3);
      }

      page[the-arena] [arena-row][boss] {
        margin-top: calc(var(--unit) * 6);
        padding-top: calc(var(--unit) * 4);
        padding-bottom: calc(var(--unit) * 4);
      }
    }
  </style>
</body>

</html>
