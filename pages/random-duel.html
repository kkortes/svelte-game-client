<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battle Brawlers</title>
    <link rel="icon" href="/static/favicon.png" />
    <link rel="stylesheet" href="/css/index.css" />
  </head>

  <body battle-brawlers vibe vibe-fouc stylecheat>
    <script type="module">
      import boot from '/js/boot.js';
      boot();

      import { getLevelByExperience, getExperienceRangeForLevel } from '/js/level.js';
      import { generateCombat, healFull, prepareTeams } from '/js/combat.js';
      import CHARACTERS from '/js/constants/CHARACTERS.js';
      import ABILITIES from '/js/constants/ABILITIES.js';
      import {
        calculateAvailableAbilitiesByCharacter,
        calculateCombatStatsByCharacter,
      } from '/js/utils.js';

      const count = Math.floor(getLevelByExperience($.experience) / 5) + 1;
      $.maxBrawlers = count;

      window.updateFightSlots = () => {
        const C = window.CHARACTERS || CHARACTERS;
        const A = window.ABILITIES_FN || ABILITIES;
        $.brawlerSlots = Array.from({ length: count }, (_, i) => {
          const uuid = $.selectedBrawlers[i];
          if (!uuid) return { empty: true, index: i };
          const ref = $.characters.find((c) => c.uuid === uuid);
          if (!ref) return { empty: true, index: i };
          try {
            const char = C(ref, true);
            const stats = calculateCombatStatsByCharacter(char);
            let tickCursor = 0;
            const abilities = char.abilities
              .map((a) => {
                try {
                  const h = A(a, true);
                  const tickStart = tickCursor;
                  tickCursor += h.ticks;
                  return {
                    id: h.id,
                    name: h.name,
                    ticks: h.ticks,
                    icon: h.icon,
                    basic: !!h.basic,
                    tickStart,
                    overflow: tickStart >= char.maxTicks,
                    statusEffects: h.statusEffects || [],
                  };
                } catch {
                  return null;
                }
              })
              .filter(Boolean);
            const availableAbilities = calculateAvailableAbilitiesByCharacter(char)
              .map((a) => {
                try {
                  const h = A(a, true);
                  return {
                    uuid: a.uuid,
                    id: h.id,
                    name: h.name,
                    ticks: h.ticks,
                    icon: h.icon,
                    basic: !!h.basic,
                    statusEffects: h.statusEffects || [],
                  };
                } catch {
                  return null;
                }
              })
              .filter((a) => a && !a.basic);
            const characterIndex = $.characters.findIndex((c) => c.uuid === char.uuid);
            return {
              empty: false,
              uuid: char.uuid,
              characterIndex,
              name: char.name,
              image: char.image,
              mugshot: char.image.replace('.png', '-mugshot.png'),
              hp: stats.maxHealth,
              armor: stats.maxArmor,
              damage: stats.damage,
              abilities,
              availableAbilities,
              lastTick: tickCursor,
              index: i,
            };
          } catch {
            return { empty: true, index: i };
          }
        });
      };
      window.updateFightSlots();

      import('/js/dnd.js').then(({ default: dnd }) => {
        dnd.init();
        const registered = new WeakSet();

        const registerSlotZones = () => {
          document
            .querySelectorAll('brawler-slot[data-brawler-uuid] ability-overlay')
            .forEach((overlay) => {
              if (registered.has(overlay)) return;
              const uuid = overlay.closest('brawler-slot')?.dataset?.brawlerUuid;
              if (!uuid) return;
              registered.add(overlay);
              dnd.abilityBarZone(overlay, {
                items: () => {
                  const ref = $.characters.find((c) => c.uuid === uuid);
                  return (ref?.overrides?.abilities || []).map((a) => {
                    try {
                      return { ...a, basic: !!ABILITIES(a, true).basic };
                    } catch {
                      return { ...a, basic: false };
                    }
                  });
                },
                type: 'fight-slot-' + uuid,
                onReorder: (newItems) => {
                  const ref = $.characters.find((c) => c.uuid === uuid);
                  if (!ref) return;
                  ref.overrides.abilities = newItems.map((a) => ({
                    id: a.id,
                    uuid: a.uuid,
                    overrides: a.overrides,
                  }));
                  window.updateFightSlots();
                },
              });
            });
        };

        $.on('afterDomMutation', registerSlotZones);
        $.on('ready', registerSlotZones);
        queueMicrotask(registerSlotZones);
      });

      window.runPvpCombat = async () => {
        const selected = $.characters.filter((c) => $.selectedBrawlers.includes(c.uuid));

        if (selected.length === 0) {
          notify({ warning: 'Select at least one brawler.' });
          return;
        }

        try {
          const level = getLevelByExperience($.experience);
          const { minXp, maxXp } = getExperienceRangeForLevel(level);

          const opponents = await $.socket.sendAsync('pvp/get-random-opponent', {
            count: selected.length,
            minXp,
            maxXp,
          });

          if (!opponents?.length) {
            notify({ warning: 'No opponents found.' });
            return;
          }

          const myCharacters = JSON.parse(JSON.stringify(selected));
          $.selectedBrawlers = [];
          $.combat = generateCombat(
            prepareTeams(myCharacters, healFull(opponents.slice(0, myCharacters.length))),
          );
          $.overlay = { name: 'Combat' };
        } catch (e) {
          notify({ error: 'Failed to find opponent' });
        }
      };
    </script>

    <component src="/components/Layout.html">
      <page-content>
        <component src="/components/TitleBar.html" title="Random duel">
          <badge
            >@[selectedBrawlers.length || maxBrawlers]&nbsp;vs&nbsp;@[selectedBrawlers.length ||
            maxBrawlers]</badge
          >
        </component>
        <hr />

        <crow py="4">
          <crow pvp-mystery f="none"> ? </crow>
        </crow>

        <crow vertical w="full" g="2" mt="4">
          <!-- each brawlerSlots as slot, i -->
          <component src="/components/BrawlerSlot.html" slot="@[slot]"></component>
          <!-- /each -->
        </crow>
      </page-content>

      <stay reverse w="full" sm:b="8" p="3">
        <button
          mx="auto"
          primary
          onclick="runPvpCombat()"
          disabled="@[selectedBrawlers.length === 0 || combat.duration !== 0]"
        >
          Fight
        </button>
      </stay>
    </component>
    <style>
      page[random-duel] [pvp-mystery] {
        width: calc(var(--unit) * 40);
        height: calc(var(--unit) * 40);
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.25);
        font-size: calc(var(--unit) * 24);
        color: white;
      }

      page[random-duel] stay {
        background: var(--background);
      }

      page[random-duel] stay button {
        min-width: calc(var(--unit) * 50);
      }
    </style>
  </body>
</html>
