<script type="module">
  import { getLevelByExperience, getExperienceRangeForLevel } from '/js/level.js';
  import { generateCombat, healFull, prepareTeams } from '/js/combat.js';
  import CHARACTERS from '/js/constants/CHARACTERS.js';
  import { notify } from '/js/actions.js';

  const count = Math.floor(getLevelByExperience($.experience) / 5) + 1;
  $.maxBrawlers = count;

  // Build selection slots
  $.pvpSlots = Array.from({ length: count }, (_, i) => {
    const uuid = $.selectedBrawlers[i];
    if (!uuid) return { empty: true, index: i };
    const ref = $.characters.find(c => c.uuid === uuid);
    if (!ref) return { empty: true, index: i };
    try {
      const char = CHARACTERS(ref, true);
      return { empty: false, name: char.name, index: i };
    } catch {
      return { empty: true, index: i };
    }
  });

  window.runPvpCombat = async () => {
    const selected = $.characters.filter(c => $.selectedBrawlers.includes(c.uuid));

    if (selected.length === 0) {
      notify({ warning: 'Select at least one brawler.' });
      return;
    }

    try {
      const level = getLevelByExperience($.experience);
      const { minXp, maxXp } = getExperienceRangeForLevel(level);

      const opponents = await $.socket.sendAsync('pvp/get-random-opponent', {
        count: selected.length,
        minXp,
        maxXp
      });

      if (!opponents?.length) {
        notify({ warning: 'No opponents found.' });
        return;
      }

      const seed = `${Math.random()}`;
      const combat = generateCombat(prepareTeams(selected, healFull(opponents.slice(0, selected.length))));
      $.combat = combat;
      $.elapsedMilliseconds = 0;
      $.overlay = 'Combat';
    } catch (e) {
      notify({ error: 'Failed to find opponent' });
    }
  };
</script>

<page-pvp>

<crow justify-between left>
  <h3>Random duel</h3>
  <crow left g-2>
    <badge>@[selectedBrawlers.length || maxBrawlers]&nbsp;vs&nbsp;@[selectedBrawlers.length || maxBrawlers]</badge>
  </crow>
</crow>
<hr pvp-headline-hr />

<crow pvp-opponent>
  <crow pvp-mystery>
    ?
  </crow>
</crow>

<crow vertical w-full g-2 mt-4>
  <!-- each pvpSlots as slot -->
  <!-- if slot.empty -->
  <crow pvp-slot-empty>
    <!-- if slot.index === 0 -->
    <h5>select a brawler</h5>
    <!-- /if -->
    <!-- if slot.index > 0 -->
    <h5>slot @[slot.index + 1]</h5>
    <!-- /if -->
  </crow>
  <!-- /if -->
  <!-- if !slot.empty -->
  <crow pvp-slot-filled>
    <span font-medium>@[slot.name]</span>
  </crow>
  <!-- /if -->
  <!-- /each -->
</crow>

</page-pvp>
