<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Brawlers</title>
  <link rel="icon" href="/static/favicon.png" />
  <link rel="stylesheet" href="/css/index.css" />
</head>

<body battle-brawlers vibe vibe-fouc stylecheat>
  <script type="module">
    import boot from '/js/boot.js';
    boot();

    import { getLevelByExperience, getExperienceRangeForLevel } from '/js/level.js';
    import { generateCombat, healFull, prepareTeams } from '/js/combat.js';
    import CHARACTERS from '/js/constants/CHARACTERS.js';
    import { notify } from '/js/actions.js';

    const count = Math.floor(getLevelByExperience($.experience) / 5) + 1;
    $.maxBrawlers = count;

    window.updateFightSlots = () => {
      const C = window.CHARACTERS || CHARACTERS;
      const A = window.ABILITIES_FN;
      $.pvpSlots = Array.from({ length: count }, (_, i) => {
        const uuid = $.selectedBrawlers[i];
        if (!uuid) return { empty: true, index: i };
        const ref = $.characters.find(c => c.uuid === uuid);
        if (!ref) return { empty: true, index: i };
        try {
          const char = C(ref, true);
          const abilities = A ? char.abilities.map(a => {
            try { const h = A(a, true); return { icon: h.icon, ticks: h.ticks }; }
            catch { return null; }
          }).filter(Boolean) : [];
          return { empty: false, name: char.name, image: char.image, mugshot: char.image.replace('.png', '-mugshot.png'), abilities, index: i };
        } catch {
          return { empty: true, index: i };
        }
      });
    };
    window.updateFightSlots();

    window.runPvpCombat = async () => {
      const selected = $.characters.filter(c => $.selectedBrawlers.includes(c.uuid));

      if (selected.length === 0) {
        notify({ warning: 'Select at least one brawler.' });
        return;
      }

      try {
        const level = getLevelByExperience($.experience);
        const { minXp, maxXp } = getExperienceRangeForLevel(level);

        const opponents = await $.socket.sendAsync('pvp/get-random-opponent', {
          count: selected.length,
          minXp,
          maxXp
        });

        if (!opponents?.length) {
          notify({ warning: 'No opponents found.' });
          return;
        }

        const myCharacters = JSON.parse(JSON.stringify(selected));
        $.selectedBrawlers = [];
        $.combat = generateCombat(prepareTeams(myCharacters, healFull(opponents.slice(0, myCharacters.length))));
        $.overlay = 'Combat';
      } catch (e) {
        notify({ error: 'Failed to find opponent' });
      }
    };
  </script>

  <component src="/components/Layout.html">
    <page-content>

      <crow justify-between left>
        <h3>Random duel</h3>
        <!-- @[Math.random()] -->
        <crow left g-2>
          <badge>@[selectedBrawlers.length || maxBrawlers]&nbsp;vs&nbsp;@[selectedBrawlers.length ||
            maxBrawlers]</badge>
        </crow>
      </crow>
      <hr />

      <crow pvp-opponent>
        <crow pvp-mystery>
          ?
        </crow>
      </crow>

      <crow vertical w-full g-2 mt-4>
        <!-- each pvpSlots as slot -->
        <!-- if slot.empty -->
        <crow pvp-slot-empty>
          <!-- if slot.index === 0 -->
          <h5>select a brawler</h5>
          <!-- /if -->
          <!-- if slot.index > 0 -->
          <h5>slot @[slot.index + 1]</h5>
          <!-- /if -->
        </crow>
        <!-- /if -->
        <!-- if !slot.empty -->
        <crow pvp-slot-filled left g-2>
          <pvp-slot-avatar glass>
            <img data-src="/static/images/races/@[slot.mugshot]" alt="" pvp-slot-img />
          </pvp-slot-avatar>
          <crow vertical left pvp-slot-info>
            <span font-medium text-sm>@[slot.name]</span>
            <pvp-slot-abilities>
              <!-- each slot.abilities as ab -->
              <pvp-slot-ability style="width: calc(12px * @[ab.ticks])">
                <icon @[ab.icon]></icon>
              </pvp-slot-ability>
              <!-- /each -->
            </pvp-slot-abilities>
          </crow>
        </crow>
        <!-- /if -->
        <!-- /each -->
      </crow>
    </page-content>

    <stay reverse w-full sm:b="8" p="3">
      <button primary big onclick="runPvpCombat()"
        disabled="@[selectedBrawlers.length === 0 || combat.duration !== 0]">Fight</button>
    </stay>
  </component>
  <style>
    page[random-duel] [pvp-opponent] {
      justify-content: center;
      padding: calc(var(--unit) * 4) 0;
    }

    page[random-duel] [pvp-mystery] {
      width: calc(var(--unit) * 40);
      height: calc(var(--unit) * 40);
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      color: white;
      flex: none;
    }

    page[random-duel] [pvp-slot-empty] {
      width: 100%;
      height: calc(var(--unit) * 19.5);
      flex: none;
      border: 1px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    page[random-duel] [pvp-slot-filled] {
      width: 100%;
      height: calc(var(--unit) * 19.5);
      flex: none;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: calc(var(--unit) * 2) calc(var(--unit) * 4);
      background: rgba(255, 255, 255, 0.3);
    }

    page[random-duel] pvp-slot-avatar {
      display: block;
      width: calc(var(--unit) * 12);
      height: calc(var(--unit) * 12);
      flex: none;
      border-radius: var(--unit);
      overflow: hidden;
      border: 1px solid rgba(75, 85, 99, 1);
    }

    page[random-duel] [pvp-slot-img] {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    page[random-duel] [pvp-slot-info] {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    page[random-duel] pvp-slot-abilities {
      display: flex;
      border: 0.5px solid rgb(120, 113, 108);
      border-radius: 0 0 var(--unit) var(--unit);
      background: rgb(214, 211, 209);
      overflow: hidden;
      max-width: calc(var(--unit) * 45);
    }

    page[random-duel] pvp-slot-ability {
      display: flex;
      align-items: center;
      justify-content: center;
      height: calc(var(--unit) * 5);
      flex: none;
      border-right: 0.5px solid rgb(120, 113, 108);
      color: rgb(120, 113, 108);
      font-size: 0.75rem;
    }

    page[random-duel] pvp-slot-ability:last-child {
      border-right: none;
    }

    page[random-duel] stay {
      justify-content: center;
      background: #fafafa;
    }

    page[random-duel] stay button {
      min-width: calc(var(--unit) * 50);
    }

    page[random-duel] stay button[disabled] {
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</body>

</html>
