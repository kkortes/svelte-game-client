<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Brawlers</title>
  <link rel="icon" href="/static/favicon.png" />
  <link rel="stylesheet" href="/css/index.css" />
</head>
<body battle-brawlers vibe vibe-fouc stylecheat>
  <script type="module">
    import boot from '/js/boot.js';
    boot();

    import { notify } from '/js/actions.js';

    const checkEligibility = async () => {
      $.resetEligible = false;
      $.resetError = '';
      try {
        await $.socket.sendAsync('user/password/reset-eligibility', { secret: $.routeParams.secret });
        $.resetEligible = true;
      } catch (e) {
        $.resetError = e.message || 'This reset link is invalid or expired';
      }
    };

    window.submitNewPassword = async () => {
      const pw = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      if (!pw) return;
      if (pw !== confirm) return notify({ error: 'Passwords do not match' });

      try {
        await $.socket.sendAsync('user/password/set-new', { secret: $.routeParams.secret, password: pw });
        notify({ success: 'Password updated successfully' });
        window.location.href = '/';
      } catch (e) {
        notify({ error: e.message || 'Failed to reset password' });
      }
    };

    checkEligibility();
  </script>

  <component src="/components/Layout.html">
    <page-content>
    <crow vertical g-4 left>
      <h3 cinzel m-0>Reset Password</h3>

      <!-- if resetError -->
      <span text-sm text-error>@[resetError]</span>
      <!-- /if -->

      <!-- if resetEligible -->
      <label pw-label w-full>
        <span text-sm text-muted>New password</span>
        <input type="password" id="new-password" placeholder="Enter new password" pw-input w-full mt-1 />
      </label>

      <label pw-label w-full>
        <span text-sm text-muted>Confirm password</span>
        <input type="password" id="confirm-password" placeholder="Confirm new password" pw-input w-full mt-1 />
      </label>

      <button primary onclick="submitNewPassword()">Confirm</button>
      <!-- /if -->

      <!-- if !resetEligible && !resetError -->
      <span text-sm text-muted>Checking reset link...</span>
      <!-- /if -->
    </crow>
    </page-content>
  </component>
  <style>
page[reset-password-secret] { display: block; max-width: calc(var(--unit) * 100); }
  </style>
</body>
</html>
