<page-reset-pw>
<crow vertical g-4 left>
  <h3 cinzel m-0>Reset Password</h3>

  <span text-xs text-muted>Token: @[routeParams.secret]</span>

  <label pw-label>
    <span text-sm text-muted>New password</span>
    <input type="password" id="new-password" placeholder="Enter new password" pw-input />
  </label>

  <label pw-label>
    <span text-sm text-muted>Confirm password</span>
    <input type="password" id="confirm-password" placeholder="Confirm new password" pw-input />
  </label>

  <button primary onclick="
    const pw = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    if (!pw) return;
    if (pw !== confirm) { alert('Passwords do not match'); return; }
    alert('Password reset not yet implemented');
  ">Confirm</button>
</crow>
</page-reset-pw>

<style>
page-reset-pw { display: block; max-width: 400px; }
page-reset-pw [pw-label] { width: 100%; }
page-reset-pw [pw-input] { width: 100%; margin-top: 4px; }
</style>
