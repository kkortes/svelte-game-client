<script type="module">
import { notify } from '/js/actions.js';
import { navigate } from '/js/router.js';

const checkEligibility = async () => {
  $.resetEligible = false;
  $.resetError = '';
  try {
    await $.socket.sendAsync('user/password/reset-eligibility', { secret: $.routeParams.secret });
    $.resetEligible = true;
  } catch (e) {
    $.resetError = e.message || 'This reset link is invalid or expired';
  }
};

window.submitNewPassword = async () => {
  const pw = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;
  if (!pw) return;
  if (pw !== confirm) return notify({ error: 'Passwords do not match' });

  try {
    await $.socket.sendAsync('user/password/set-new', { secret: $.routeParams.secret, password: pw });
    notify({ success: 'Password updated successfully' });
    navigate('/');
  } catch (e) {
    notify({ error: e.message || 'Failed to reset password' });
  }
};

checkEligibility();
</script>

<page-reset-pw>
<crow vertical g-4 left>
  <h3 cinzel m-0>Reset Password</h3>

  <!-- if resetError -->
  <span text-sm text-error>@[resetError]</span>
  <!-- /if -->

  <!-- if resetEligible -->
  <label pw-label>
    <span text-sm text-muted>New password</span>
    <input type="password" id="new-password" placeholder="Enter new password" pw-input />
  </label>

  <label pw-label>
    <span text-sm text-muted>Confirm password</span>
    <input type="password" id="confirm-password" placeholder="Confirm new password" pw-input />
  </label>

  <button primary onclick="submitNewPassword()">Confirm</button>
  <!-- /if -->

  <!-- if !resetEligible && !resetError -->
  <span text-sm text-muted>Checking reset link...</span>
  <!-- /if -->
</crow>
</page-reset-pw>

<style>
page-reset-pw { display: block; max-width: calc(var(--unit) * 100); }
page-reset-pw [pw-label] { width: 100%; }
page-reset-pw [pw-input] { width: 100%; margin-top: var(--unit); }
</style>
