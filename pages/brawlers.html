<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Brawlers</title>
  <link rel="icon" href="/static/favicon.png" />
  <link rel="stylesheet" href="/css/index.css" />
</head>

<body battle-brawlers vibe vibe-fouc stylecheat>
  <script type="module">
    import boot from '/js/boot.js';
    boot();

    import CHARACTERS, { DEFAULT_LUCKY_STATS, DEFAULT_MODIFIERS } from '/js/constants/CHARACTERS.js';
    import { RECRUITABLE_CHARACTERS } from '/js/constants/RECRUITABLE_CHARACTERS.js';
    import { ALL_ELEMENTS } from '/js/constants/ELEMENTS.js';
    import { correctHealth } from '/js/equipment.js';
    import { saveNow } from '/js/connectSocket.js';
    import { allowedNumberOfCharacters } from '/js/level.js';
    import { notify } from '/js/actions.js';
    import { calculateCombatStatsByCharacter } from '/js/utils.js';

    $.recruitableCharacters = RECRUITABLE_CHARACTERS.map(ref => {
      const char = CHARACTERS(ref, true);
      const element = ALL_ELEMENTS[char.element] || { color: { primary: '#888', secondary: '#aaa' } };
      const stats = calculateCombatStatsByCharacter(char);
      const isRecruited = $.characters.some(c => c.id === char.id);

      const luckyBonuses = [];
      const cs = char.combatStats;
      if (cs.criticalChance !== DEFAULT_LUCKY_STATS.criticalChance) luckyBonuses.push({ label: 'Crit%', value: '+' + Math.round((cs.criticalChance - DEFAULT_LUCKY_STATS.criticalChance) * 100) + '%' });
      if (cs.criticalDamage !== DEFAULT_LUCKY_STATS.criticalDamage) luckyBonuses.push({ label: 'CritDmg', value: '+' + Math.round((cs.criticalDamage - DEFAULT_LUCKY_STATS.criticalDamage) * 100) + '%' });
      if (cs.dodgeChance !== DEFAULT_LUCKY_STATS.dodgeChance) luckyBonuses.push({ label: 'Dodge', value: '+' + Math.round((cs.dodgeChance - DEFAULT_LUCKY_STATS.dodgeChance) * 100) + '%' });
      if (cs.blockChance !== DEFAULT_LUCKY_STATS.blockChance) luckyBonuses.push({ label: 'Block', value: '+' + Math.round((cs.blockChance - DEFAULT_LUCKY_STATS.blockChance) * 100) + '%' });
      if (cs.magicChance !== DEFAULT_LUCKY_STATS.magicChance) luckyBonuses.push({ label: 'Magic', value: '+' + Math.round((cs.magicChance - DEFAULT_LUCKY_STATS.magicChance) * 100) + '%' });

      const modBonuses = [];
      const mods = cs.modifiers || {};
      if (mods.maxHealth !== DEFAULT_MODIFIERS.maxHealth) modBonuses.push({ label: 'HP', value: '+' + Math.round((mods.maxHealth - DEFAULT_MODIFIERS.maxHealth) * 100) + '%' });
      if (mods.maxArmor !== DEFAULT_MODIFIERS.maxArmor) modBonuses.push({ label: 'Armor', value: '+' + Math.round((mods.maxArmor - DEFAULT_MODIFIERS.maxArmor) * 100) + '%' });
      if (mods.damage !== DEFAULT_MODIFIERS.damage) modBonuses.push({ label: 'Dmg', value: '+' + Math.round((mods.damage - DEFAULT_MODIFIERS.damage) * 100) + '%' });
      if (mods.resistance !== DEFAULT_MODIFIERS.resistance) modBonuses.push({ label: 'Res', value: '+' + Math.round((mods.resistance - DEFAULT_MODIFIERS.resistance) * 100) + '%' });

      return {
        ref,
        name: char.name,
        race: char.race,
        image: char.image,
        element: char.element,
        primary: element.color.primary,
        secondary: element.color.secondary,
        id: char.id,
        isRecruited,
        hp: stats.maxHealth,
        armor: stats.maxArmor,
        damage: stats.damage,
        size: char.size || 1,
        luckyBonuses,
        modBonuses
      };
    });

    $.brawlerCharCount = $.characters.length;
    $.brawlerCharMax = allowedNumberOfCharacters();
    $.brawlerCharCapped = $.characters.length >= allowedNumberOfCharacters();

    window.pickCharacter = (index) => {
      const capped = $.characters.length >= allowedNumberOfCharacters();
      if (capped) {
        notify({ warning: 'You cannot recruit more brawlers. Level up your ludus first.' });
        return;
      }

      const ref = RECRUITABLE_CHARACTERS[index];
      const char = CHARACTERS(ref, true);
      const isRecruited = $.characters.find(c => c.id === char.id);
      if (isRecruited) {
        notify({ warning: `${char.name} is already recruited` });
        return;
      }

      $.dialogProps = {
        text: `Recruiting ${char.name} to your Ludus.`,
        confirm: async () => {
          $.characters.push(correctHealth(ref));
          const targetIndex = $.characters.length - 1;
          await saveNow();
          window.location.href = `/brawlers/${targetIndex}`;
        }
      };
      $.overlay = 'confirm';
    };
  </script>

  <component src="/components/Layout.html">
    <page-content>
      <component src="/components/TitleBar.html" title="Brawlers"></component>
      <hr />

      <crow vertical cinzel brawlers-heading>
        <!-- if characters.length === 0 -->
        <span>Select your first brawler</span>
        <!-- /if -->
        <!-- if brawlerCharCapped -->
        <span>Level up your ludus in order<br />to recruit new brawlers</span>
        <!-- /if -->
        <!-- if characters.length > 0 && !brawlerCharCapped -->
        <span>Select a brawler</span>
        <!-- /if -->
      </crow>

      <crow brawlers-grid>
        <!-- each recruitableCharacters as char, idx -->
        <brawler-card onclick="pickCharacter(@[idx])"
          style="--card-primary: @[char.primary]; --card-secondary: @[char.secondary]"
          recruited="@[char.isRecruited]">
          <span cinzel brawler-name>@[char.name]</span>
          <hr />
          <crow left brawler-row>
            <char-portrait style="--char-size: @[char.size]">
              <img data-src="/static/images/races/@[char.image]" alt="@[char.name]" portrait-img />
            </char-portrait>
            <crow vertical left brawler-info>
              <component src="/components/CoreStats.html" hp="@[char.hp]" armor="@[char.armor]"
                damage="@[char.damage]" vertical></component>
              <crow vertical left>
                <!-- if char.luckyBonuses.length > 0 -->
                <crow bonus-row>
                  <!-- each char.luckyBonuses as bonus -->
                  <span bonus-stat>@[bonus.label] @[bonus.value]</span>
                  <!-- /each -->
                </crow>
                <!-- /if -->
                <!-- if char.modBonuses.length > 0 -->
                <crow bonus-row>
                  <!-- each char.modBonuses as bonus -->
                  <span bonus-stat>@[bonus.label] @[bonus.value]</span>
                  <!-- /each -->
                </crow>
                <!-- /if -->
              </crow>
            </crow>
          </crow>
        </brawler-card>
        <!-- /each -->
      </crow>
    </page-content>
  </component>
  <style>
    page[brawlers] [brawlers-heading] {
      align-items: center;
      margin: calc(var(--unit) * 12) 0;
    }

    page[brawlers] [brawlers-grid] {
      flex-wrap: wrap;
      gap: calc(var(--unit) * 4);
      align-items: flex-start;
      justify-content: flex-start;
    }

    /* brawler-card = main's <Clickable class="crow vertical up !h-70 w-90 !flex-none overflow-hidden bg-gray-100 p-2">
       Border + element gradient come from --card-primary / --card-secondary inline style, populated from ELEMENTS.js. */
    page[brawlers] brawler-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: calc(var(--unit) * 90);
      height: calc(var(--unit) * 70);
      flex: none;
      overflow: hidden;
      padding: calc(var(--unit) * 2);
      cursor: pointer;
      border: 0.5px solid var(--card-primary, var(--border));
      background:
        linear-gradient(135deg,
          oklch(from var(--card-primary, transparent) l c h / 0.2),
          oklch(from var(--card-secondary, transparent) l c h / 0.2)),
        oklch(0.96 0.005 85);
    }



    page[brawlers] brawler-card[recruited] {
      opacity: 0.5;
      filter: grayscale(1);
      cursor: not-allowed;
    }

    page[brawlers] [brawler-name] {
      font-size: 1.5rem;
      text-align: center;
      width: 100%;
      position: relative;
    }

    page[brawlers] [divider] {
      width: 100%;
      border: none;
      border-top: 1px solid oklch(from var(--bb-brown) l c h / 0.35);
      margin: 0;
      position: relative;
      z-index: 1;
    }

    page[brawlers] [brawler-row] {
      align-items: flex-start;
    }

    page[brawlers] char-portrait {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      width: calc(var(--unit) * 30);
      height: calc(var(--unit) * 33);
      flex: none;
      overflow: visible;
      background: var(--slate)
    }

    page[brawlers] [portrait-img] {
      max-width: none;
      width: auto;
      height: calc(100% * var(--char-size, 1));
      object-fit: contain;
      pointer-events: none;
    }


    page[brawlers] [bonus-stat] {
      color: oklch(from var(--bb-green) 0.58 0.2 h);
    }

    page[brawlers] [bonus-row] {
      flex-wrap: wrap;
    }
  </style>
</body>

</html>
