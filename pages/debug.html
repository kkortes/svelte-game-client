<script type="module">
  import { generateCombat, prepareTeams } from '/js/combat.js';
  import { prepareCombatant, seededRandom, calculateCombatStatsByCharacter } from '/js/utils.js';
  import CHARACTERS from '/js/constants/CHARACTERS.js';
  import { ALL_CHARACTERS } from '/js/constants/CHARACTERS.js';
  import { INITIAL_COMBAT } from '/js/app.js';

  $.debugTeamCount = 2;
  $.debugCombatantCount = 1;

  const npcKeys = Object.keys(ALL_CHARACTERS).filter(k => ALL_CHARACTERS[k].race === 'creature');

  window.initializeCombat = () => {
    const teamCount = $.debugTeamCount;
    const combatantCount = $.debugCombatantCount;

    const teams = Array.from({ length: teamCount }, (_, teamIndex) =>
      Array.from({ length: combatantCount }, (_, i) => {
        const key = npcKeys[seededRandom(0, npcKeys.length - 1, `debug_${teamIndex}_${i}`)];
        return CHARACTERS(key);
      })
    );

    if ($.characters[0]) teams[0][0] = $.characters[0];

    const prepared = prepareTeams(...teams);
    $.combat = { ...structuredClone(INITIAL_COMBAT), teamsStartState: prepared };
  };

  window.startCombat = () => {
    const combat = generateCombat($.combat.teamsStartState, 'myseed');
    $.combat = combat;
  };

  window.resetState = () => {
    if ($.characters[0]) {
      const combatStats = calculateCombatStatsByCharacter(CHARACTERS($.characters[0], true));
      $.characters = $.characters.map((c, i) =>
        i === 0
          ? { ...c, overrides: { ...c.overrides, combatStats: { ...c.overrides?.combatStats, currentHealth: combatStats.maxHealth } } }
          : c
      );
    }
    $.combat = structuredClone(INITIAL_COMBAT);
    $.liveTeams = [];
    $.elapsedMilliseconds = 0;
    $.inventory = [];
    $.coins = 400;
  };
</script>

<page-debug>
<crow vertical g-4 left>
  <crow justify-between left>
    <h3>Debug</h3>
  </crow>
  <hr headline-hr />

  <card debug-card>
    <crow vertical g-4>
      <crow justify-between align-center>
        <span text-sm text-muted>Teams</span>
        <crow g-2 align-center>
          <span text-sm font-medium>@[debugTeamCount]</span>
          <input type="range" min="1" max="8" value="@[debugTeamCount]" oninput="$.debugTeamCount = +this.value" />
        </crow>
      </crow>
      <crow justify-between align-center>
        <span text-sm text-muted>Combatants per team</span>
        <crow g-2 align-center>
          <span text-sm font-medium>@[debugCombatantCount]</span>
          <input type="range" min="1" max="6" value="@[debugCombatantCount]" oninput="$.debugCombatantCount = +this.value" />
        </crow>
      </crow>
      <crow g-2>
        <button primary onclick="initializeCombat()">Initialize Combat</button>
        <button primary onclick="startCombat()" data-disabled="@[combat?.duration !== 0]">Start Combat</button>
        <button destructive onclick="resetState()">Reset</button>
      </crow>
    </crow>
  </card>

  <card debug-card>
    <crow vertical g-4>
      <crow justify-between>
        <span text-sm text-muted>Characters</span>
        <span text-sm font-medium>@[characters.length]</span>
      </crow>
      <crow justify-between>
        <span text-sm text-muted>Inventory</span>
        <span text-sm font-medium>@[inventory.length]</span>
      </crow>
      <crow justify-between>
        <span text-sm text-muted>Coins</span>
        <span text-sm font-medium>@[coins]</span>
      </crow>
      <crow justify-between>
        <span text-sm text-muted>Experience</span>
        <span text-sm font-medium>@[experience]</span>
      </crow>
      <crow justify-between>
        <span text-sm text-muted>Combat duration</span>
        <span text-sm font-medium>@[combat?.duration ?? 'N/A']</span>
      </crow>
    </crow>
  </card>
</crow>
</page-debug>

<style>
page-debug [debug-card] { width: 100%; max-width: calc(var(--unit) * 125); }
</style>
