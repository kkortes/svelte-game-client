<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battle Brawlers</title>
    <link rel="icon" href="/static/favicon.png" />
    <link rel="stylesheet" href="/css/index.css" />
  </head>

  <body battle-brawlers vibe vibe-fouc stylecheat>
    <script type="module">
      import boot from '/js/boot.js';
      boot();
    </script>

    <component src="/components/Layout.html">
      <component src="/components/BrawlerDetailContent.html"></component>
    </component>
    <style>
      [animate-flip] {
        transition: transform 200ms ease;
      }

      [flip] {
        transform: scaleY(-1);
      }

      page[brawlers-characterIndex] [core-stats] {
        font-size: calc(calc(var(--unit) * 4));
        color: var(--muted-foreground);
        translate: 0 1px;
      }

      page[brawlers-characterIndex] [stat-sep] {
        color: var(--border);
      }

      page[brawlers-characterIndex] char-portrait {
        aspect-ratio: 11/12;
        width: calc(calc(var(--unit) * 36));
      }

      page[brawlers-characterIndex] [avatar-col] {
        width: calc(calc(var(--unit) * 36));
      }

      page[brawlers-characterIndex] [detail-col] {
        min-width: 0;
      }

      page[brawlers-characterIndex] equipment-heading {
        display: grid;
        grid-template-rows: 0fr;
        transition: grid-template-rows 200ms ease-out;
        width: 100%;
      }

      page[brawlers-characterIndex] equipment-heading[open] {
        grid-template-rows: 1fr;
      }

      page[brawlers-characterIndex] equipment-heading-content {
        overflow: hidden;
        min-height: 0;
      }

      page[brawlers-characterIndex] [stat-list] {
        min-width: calc(calc(var(--unit) * 45));
      }

      page[brawlers-characterIndex] [stats-col] h5 {
        margin: 0;
      }

      page[brawlers-characterIndex] [stats-col] hr {
        width: 100%;
        margin: calc(calc(var(--unit) * 1)) 0 calc(calc(var(--unit) * 2)) 0;
      }

      page[brawlers-characterIndex] [icon-cell] {
        width: calc(calc(var(--unit) * 5));
        justify-content: center;
      }

      page[brawlers-characterIndex] equipment-heading h5 {
        margin: 0;
      }

      page[brawlers-characterIndex] equipment-heading hr {
        width: 100%;
        margin: calc(calc(var(--unit) * 1)) 0 calc(calc(var(--unit) * 2)) 0;
      }

      page[brawlers-characterIndex] [eq-slot-label] {
        width: calc(calc(var(--unit) * 20));
      }

      page[brawlers-characterIndex] [eq-row] {
        min-height: calc(calc(var(--unit) * 7));
      }

      page[brawlers-characterIndex] [available-grid] {
        flex-wrap: wrap;
        justify-content: flex-start;
        align-items: flex-start;
        min-height: calc(calc(calc(var(--unit) * 24.5)) * 3);
        border: 1px solid var(--border);
        border-radius: calc(calc(var(--unit) * 2));
        background: rgb(249, 250, 251);
        box-shadow: inset 0 1px calc(calc(var(--unit) * 0.5)) rgba(0, 0, 0, 0.05);
      }

      page[brawlers-characterIndex] available-ability {
        width: calc(calc(var(--unit) * 20));
        height: calc(calc(var(--unit) * 20));
        border: 0.5px solid rgb(156, 163, 175);
        border-radius: calc(calc(var(--unit) * 1));
        background: white;
        align-items: center;
        justify-content: center;
      }

      page[brawlers-characterIndex] available-ability[basic] {
        background: rgb(243, 244, 246);
        border-color: var(--border);
      }

      page[brawlers-characterIndex] available-ability[basic] icon {
        color: rgb(156, 163, 175);
      }

      page[brawlers-characterIndex] available-ability icon {
        font-size: clamp(calc(calc(var(--unit) * 4)), 3vw, calc(calc(var(--unit) * 8)));
      }

      page[brawlers-characterIndex] available-ability ability-tick-count {
        left: 50%;
        translate: -50% 0;
        width: calc(calc(var(--unit) * 6));
        height: calc(calc(var(--unit) * 4));
        align-items: center;
        justify-content: center;
        font-size: calc(calc(var(--unit) * 3));
        font-weight: bold;
        border-radius: calc(calc(var(--unit) * 0.5));
        border: 0.5px solid rgb(156, 163, 175);
        background: white;
      }

      @media (width <= 768px) {
        page[brawlers-characterIndex] [main-content] {
          flex-direction: column;
          align-items: stretch;
        }

        page[brawlers-characterIndex] [avatar-col] {
          width: 100%;
          align-items: center;
        }

        page[brawlers-characterIndex] [stats-panel] {
          flex-direction: column;
          gap: calc(calc(var(--unit) * 4));
        }

        page[brawlers-characterIndex] [stat-list] {
          min-width: 0;
          width: 100%;
        }

        page[brawlers-characterIndex] available-ability {
          width: calc(calc(var(--unit) * 14));
          height: calc(calc(var(--unit) * 14));
        }
      }
    </style>
  </body>
</html>
