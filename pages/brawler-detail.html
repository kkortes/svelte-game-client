<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battle Brawlers</title>
    <link rel="icon" href="/static/favicon.png" />
    <link rel="stylesheet" href="/css/index.css" />
  </head>

  <body battle-brawlers vibe vibe-fouc stylecheat>
    <script type="module">
      import boot from '/js/boot.js';
      boot();
    </script>

    <component src="/components/Layout.html">
      <component src="/components/BrawlerDetailContent.html"></component>
    </component>
    <style>
      [animate-flip] {
        transition: transform 200ms ease;
      }

      [flip] {
        transform: scaleY(-1);
      }

      page[brawlers-characterIndex] char-portrait {
        aspect-ratio: 11/12;
        width: calc(var(--unit) * 36);
      }

      page[brawlers-characterIndex] [avatar-col] {
        width: calc(var(--unit) * 36);
      }

      page[brawlers-characterIndex] [detail-col] {
        min-width: 0;
      }

      page[brawlers-characterIndex] equipment-heading {
        display: grid;
        grid-template-rows: 0fr;
        transition: grid-template-rows 200ms ease-out;
        width: 100%;
      }

      page[brawlers-characterIndex] equipment-heading[open] {
        grid-template-rows: 1fr;
      }

      @media (width <= 768px) {
        page[brawlers-characterIndex] [avatar-col] {
          width: 100%;
          align-items: center;
        }
      }
    </style>
  </body>
</html>
